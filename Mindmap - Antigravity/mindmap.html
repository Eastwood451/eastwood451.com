    // ─── RENDER GROUP (Braindump) ───
    function renderGroup(data) {
      const el = document.createElement('div');
      el.className = 'group' + (data.collapsed ? ' collapsed' : '');
      el.dataset.id = data.id; el.dataset.type = 'group';
      el.style.left = data.x + 'px'; el.style.top = data.y + 'px';

      // Header
      const header = document.createElement('div');
      header.className = 'group-header';

      const collapseBtn = document.createElement('button');
      collapseBtn.className = 'collapse-toggle';
      collapseBtn.textContent = data.collapsed ? '\u25B6' : '\u25BC';
      collapseBtn.addEventListener('click', e => {
        e.stopPropagation();
        data.collapsed = !data.collapsed;
        renderAll();
      });
      header.appendChild(collapseBtn);

      const titleEl = document.createElement('div');
      titleEl.className = 'group-title'; titleEl.contentEditable = true;
      titleEl.textContent = data.title || '';
      titleEl.spellcheck = false;
      titleEl.addEventListener('input', () => { data.title = titleEl.textContent; });
      titleEl.addEventListener('mousedown', e => e.stopPropagation());
      titleEl.addEventListener('keydown', e => { if (e.key === 'Escape') titleEl.blur(); });
      header.appendChild(titleEl);
      el.appendChild(header);

      // Children container
      const childrenContainer = document.createElement('div');
      childrenContainer.className = 'group-children';

      if (data.children) {
        data.children.forEach((child, idx) => {
          const childEl = renderGroupChild(child, data, idx);
          if (childEl) childrenContainer.appendChild(childEl);
        });
      }
      el.appendChild(childrenContainer);

      // Group drag by header
      header.addEventListener('mousedown', e => {
        if (e.target.closest('[contenteditable="true"]')) return;
        if (e.target.classList.contains('collapse-toggle')) return;
        e.stopPropagation(); e.preventDefault();
        if (e.shiftKey) {
          if (isInMultiSelect(data)) removeFromMultiSelect(data);
          else addToMultiSelect(data, 'group');
          return;
        }
        if (isInMultiSelect(data)) { startGroupDrag(e); return; }
        clearMultiSelect();
        selectElement(el, data, 'group');
        startDrag(e, data, el);
      });

      el.addEventListener('dblclick', e => {
        if (e.target === titleEl) return;
        e.stopPropagation(); titleEl.focus();
      });

      el.addEventListener('contextmenu', e => {
        e.preventDefault(); e.stopPropagation();
        selectElement(el, data, 'group');
        contextNodeData = null;
        contextWorldPos = screenToWorld(e.clientX, e.clientY - 48);
        showContextMenu(e.clientX, e.clientY);
      });

      if (selectedData && selectedData.id === data.id && selectedType === 'group') {
        el.classList.add('selected'); selectedElement = el;
      }
      infiniteCanvas.appendChild(el);
    }

    function renderGroupChild(childData, groupData, childIdx) {
      if (childData.type === 'card') {
        const el = document.createElement('div');
        el.className = 'card-child'; el.dataset.childIdx = childIdx;
        el.dataset.groupId = groupData.id; el.dataset.childId = childData.id;

        const handle = document.createElement('div');
        handle.className = 'drag-handle';
        handle.addEventListener('mousedown', e => {
          e.stopPropagation(); e.preventDefault();
          startChildDrag(e, childData, 'card', groupData);
        });
        el.appendChild(handle);

        const content = document.createElement('div');
        content.className = 'card-content'; content.contentEditable = true;
        content.textContent = childData.content || '';
        content.spellcheck = false;
        content.addEventListener('input', () => { childData.content = content.textContent; });
        content.addEventListener('mousedown', e => e.stopPropagation());
        content.addEventListener('keydown', e => { if (e.key === 'Escape') content.blur(); });
        el.appendChild(content);
        return el;
      }
      if (childData.type === 'note') {
        const el = document.createElement('div');
        el.className = 'note-child'; el.dataset.childIdx = childIdx;
        el.dataset.groupId = groupData.id; el.dataset.childId = childData.id;

        const handle = document.createElement('div');
        handle.className = 'drag-handle';
        handle.addEventListener('mousedown', e => {
          e.stopPropagation(); e.preventDefault();
          startChildDrag(e, childData, 'note', groupData);
        });
        el.appendChild(handle);

        const text = document.createElement('div');
        text.className = 'note-text'; text.contentEditable = true;
        text.innerHTML = childData.text || '';
        text.addEventListener('input', () => { childData.text = text.innerHTML; });
        text.addEventListener('mousedown', e => e.stopPropagation());
        text.addEventListener('keydown', e => { if (e.key === 'Escape') text.blur(); });
        el.appendChild(text);
        return el;
      }
      return null;
    }

    // ─── SELECTION ───
    function selectElement(el, data, type) {
      if (selectedElement) selectedElement.classList.remove('selected');
      selectedElement = el; selectedData = data; selectedType = type;
      if (el) el.classList.add('selected');
    }
    function deselectAll() {
      if (selectedElement) selectedElement.classList.remove('selected');
      selectedElement = null; selectedData = null; selectedType = null;
      clearMultiSelect();
    }

    function clearMultiSelect() {
      multiSelected.forEach(item => {
        const el = infiniteCanvas.querySelector(`[data-id="${item.data.id}"]`);
        if (el) el.classList.remove('multi-selected');
      });
      multiSelected = [];
    }

    function addToMultiSelect(data, type) {
      if (multiSelected.some(m => m.data.id === data.id)) return;
      multiSelected.push({ data, type });
      const el = infiniteCanvas.querySelector(`[data-id="${data.id}"]`);
      if (el) el.classList.add('multi-selected');
    }

    function removeFromMultiSelect(data) {
      multiSelected = multiSelected.filter(m => m.data.id !== data.id);
      const el = infiniteCanvas.querySelector(`[data-id="${data.id}"]`);
      if (el) el.classList.remove('multi-selected');
    }

    function isInMultiSelect(data) {
      return multiSelected.some(m => m.data.id === data.id);
    }

    function applyMultiSelectFromRect(x1, y1, x2, y2) {
      const left = Math.min(x1, x2), right = Math.max(x1, x2);
      const top = Math.min(y1, y2), bottom = Math.max(y1, y2);

      function intersects(data) {
        const el = infiniteCanvas.querySelector(`[data-id="${data.id}"]`);
        if (!el) return false;
        const ew = el.offsetWidth, eh = el.offsetHeight;
        return data.x + ew > left && data.x < right && data.y + eh > top && data.y < bottom;
      }

      state.nodes.forEach(n => { if (intersects(n)) addToMultiSelect(n, 'node'); });
      state.notes.forEach(n => { if (intersects(n)) addToMultiSelect(n, 'note'); });
      state.images.forEach(n => { if (intersects(n)) addToMultiSelect(n, 'image'); });
      state.cards.forEach(n => { if (intersects(n)) addToMultiSelect(n, 'card'); });
      state.groups.forEach(n => { if (intersects(n)) addToMultiSelect(n, 'group'); });
    }

    // ─── DRAG ───
    function startDrag(e, data, el) {
      isDragging = true;
      dragTarget = { data, el, type: el.dataset.type };
      const w = screenToWorld(e.clientX, e.clientY - 48);
      dragOffset.x = w.x - data.x; dragOffset.y = w.y - data.y;
    }

    // ─── GROUP DRAG (multi-select) ───
    function startGroupDrag(e) {
      isGroupDragging = true;
      groupDragStart = screenToWorld(e.clientX, e.clientY - 48);
    }

    // ─── CHILD DRAG (drag out of group) ───
    function startChildDrag(e, childData, childType, groupData) {
      isChildDragging = true;
      const world = screenToWorld(e.clientX, e.clientY - 48);
      childDragState = {
        childData, childType, groupData,
        startMouseX: e.clientX, startMouseY: e.clientY,
        worldX: world.x - 120, worldY: world.y - 20,
        floaterEl: null, hasMovedEnough: false
      };
    }

    // ─── RESIZE (images) ───
    function startResize(e, data, el, handle) {
      isResizing = true; resizeTarget = { data, el }; resizeHandle = handle;
      resizeStart = { x: data.x, y: data.y, w: data.w, h: data.h, ex: e.clientX, ey: e.clientY, ar: data.w / data.h };
      selectElement(el, data, 'image');
    }

    // ─── CONNECT ───
    function startConnection(nodeData, side) {
      isConnecting = true; connectFromNode = nodeData; connectFromSide = side;
      container.classList.add('crosshair');
    }
    function cancelConnection() {
      isConnecting = false; connectFromNode = null; connectFromSide = '';
      container.classList.remove('crosshair');
      drawConnections();
    }

    // ─── ADD ELEMENTS ───
    function getCenterWorld() { return screenToWorld(window.innerWidth / 2, (window.innerHeight - 48) / 2 + 48); }

    function addNode(x, y) {
      const c = getCenterWorld();
      const data = { id: genId(), x: x !== undefined ? x : c.x - 80, y: y !== undefined ? y : c.y - 20, text: '' };
      state.nodes.push(data);
      renderAll();
      const el = infiniteCanvas.querySelector(`.node[data-id="${data.id}"]`);
      selectElement(el, data, 'node');
      setTimeout(() => el.querySelector('.node-text').focus(), 50);
    }

    function addChildNode(parentData) {
      const parentEl = infiniteCanvas.querySelector(`.node[data-id="${parentData.id}"]`);
      if (!parentEl) return;
      const pw = parentEl.offsetWidth, ph = parentEl.offsetHeight;
      const existing = state.connections.filter(c => c.from === parentData.id);
      const yOff = (existing.length - existing.length / 2) * 60;

      const child = { id: genId(), x: parentData.x + pw + 150, y: parentData.y + ph / 2 - 20 + yOff, text: '' };
      state.nodes.push(child);
      state.connections.push({ from: parentData.id, to: child.id });

      renderAll();
      const el = infiniteCanvas.querySelector(`.node[data-id="${child.id}"]`);
      selectElement(el, child, 'node');
      setTimeout(() => el.querySelector('.node-text').focus(), 50);
    }

    function addNote(x, y) {
      const c = getCenterWorld();
      const data = { id: genId(), x: x !== undefined ? x : c.x - 60, y: y !== undefined ? y : c.y - 18, text: '' };
      state.notes.push(data);
      renderAll();
      const el = infiniteCanvas.querySelector(`.note[data-id="${data.id}"]`);
      selectElement(el, data, 'note');
      setTimeout(() => el.querySelector('.note-text').focus(), 50);
    }

    function addCard(x, y) {
      const c = getCenterWorld();
      const data = { id: genId(), x: x !== undefined ? x : c.x - 120, y: y !== undefined ? y : c.y - 30, content: '' };
      state.cards.push(data);
      renderAll();
      const el = infiniteCanvas.querySelector(`.card[data-id="${data.id}"]`);
      selectElement(el, data, 'card');
      setTimeout(() => {
        const ce = el.querySelector('.card-content');
        if (ce) ce.focus();
      }, 50);
    }

    function addGroup(x, y) {
      const c = getCenterWorld();
      const data = { id: genId(), x: x !== undefined ? x : c.x - 140, y: y !== undefined ? y : c.y - 40, title: 'Ny gruppe', children: [], collapsed: false };
      state.groups.push(data);
      renderAll();
      const el = infiniteCanvas.querySelector(`.group[data-id="${data.id}"]`);
      selectElement(el, data, 'group');
      setTimeout(() => {
        const titleEl = el.querySelector('.group-title');
        if (titleEl) {
          titleEl.focus();
          const range = document.createRange();
          range.selectNodeContents(titleEl);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        }
      }, 50);
    }

    function addImage(src, x, y, w, h) {
      const data = { id: genId(), x, y, w: w || 300, h: h || 200, src };
      state.images.push(data);
      renderAll();
      const el = infiniteCanvas.querySelector(`.canvas-image[data-id="${data.id}"]`);
      selectElement(el, data, 'image');
    }

    // ─── COPY ELEMENT ───
    function copySelected() {
      if (!selectedData || !selectedType) return;
      const offset = 30;
      if (selectedType === 'node') {
        const d = { id: genId(), x: selectedData.x + offset, y: selectedData.y + offset, text: selectedData.text };
        state.nodes.push(d); renderAll();
      } else if (selectedType === 'note') {
        const d = { id: genId(), x: selectedData.x + offset, y: selectedData.y + offset, text: selectedData.text };
        state.notes.push(d); renderAll();
      } else if (selectedType === 'card') {
        const d = { id: genId(), x: selectedData.x + offset, y: selectedData.y + offset, content: selectedData.content };
        state.cards.push(d); renderAll();
      } else if (selectedType === 'group') {
        const newGroup = copyGroup(selectedData);
        newGroup.x += offset; newGroup.y += offset;
        state.groups.push(newGroup); renderAll();
      } else if (selectedType === 'image') {
        const d = { id: genId(), x: selectedData.x + offset, y: selectedData.y + offset, w: selectedData.w, h: selectedData.h, src: selectedData.src };
        state.images.push(d); renderAll();
      }
    }

    function copyGroup(groupData) {
      const newGroup = {
        id: genId(), x: groupData.x, y: groupData.y,
        title: groupData.title, collapsed: groupData.collapsed,
        children: groupData.children.map(child => ({ ...child, id: genId() }))
      };
      return newGroup;
    }

    // ─── DELETE ───
    function deleteSelected() {
      if (!selectedData) return;
      const id = selectedData.id;
      if (selectedType === 'node') {
        state.nodes = state.nodes.filter(n => n.id !== id);
        state.connections = state.connections.filter(c => c.from !== id && c.to !== id);
      } else if (selectedType === 'note') {
        state.notes = state.notes.filter(n => n.id !== id);
      } else if (selectedType === 'image') {
        state.images = state.images.filter(i => i.id !== id);
      } else if (selectedType === 'card') {
        state.cards = state.cards.filter(c => c.id !== id);
      } else if (selectedType === 'group') {
        state.groups = state.groups.filter(g => g.id !== id);
      }
      deselectAll(); renderAll();
    }

    function deleteMultiSelected() {
      const ids = new Set(multiSelected.map(m => m.data.id));
      state.nodes = state.nodes.filter(n => !ids.has(n.id));
      state.notes = state.notes.filter(n => !ids.has(n.id));
      state.images = state.images.filter(n => !ids.has(n.id));
      state.cards = state.cards.filter(n => !ids.has(n.id));
      state.groups = state.groups.filter(n => !ids.has(n.id));
      state.connections = state.connections.filter(c => !ids.has(c.from) && !ids.has(c.to));
      multiSelected = [];
      deselectAll(); renderAll();
    }

    // ─── GROUP DROP TARGET ───
    function findGroupDropTarget(screenX, screenY, excludeId) {
      const groupEls = infiniteCanvas.querySelectorAll('.group');
      let best = null, bestArea = Infinity;
      for (const gel of groupEls) {
        const gid = parseInt(gel.dataset.id);
        if (gid === excludeId) continue;
        const rect = gel.getBoundingClientRect();
        if (screenX >= rect.left && screenX <= rect.right && screenY >= rect.top && screenY <= rect.bottom) {
          const area = rect.width * rect.height;
          if (area < bestArea) { bestArea = area; best = { el: gel, id: gid }; }
        }
      }
      return best;
    }

    function clearDropTargets() {
      infiniteCanvas.querySelectorAll('.group.drop-target').forEach(el => el.classList.remove('drop-target'));
      currentDropTarget = null;
    }

    function moveItemToGroup(itemData, itemType, groupData) {
      // Remove from canvas arrays
      if (itemType === 'card') {
        state.cards = state.cards.filter(c => c.id !== itemData.id);
        groupData.children.push({ type: 'card', id: itemData.id, content: itemData.content });
      } else if (itemType === 'note') {
        state.notes = state.notes.filter(n => n.id !== itemData.id);
        groupData.children.push({ type: 'note', id: itemData.id, text: itemData.text });
      }
      renderAll();
    }

    function moveChildToCanvas(childData, childType, groupData, worldX, worldY) {
      // Remove from group
      groupData.children = groupData.children.filter(c => c.id !== childData.id);
      // Add to canvas
      if (childType === 'card') {
        state.cards.push({ id: childData.id, x: snap(worldX), y: snap(worldY), content: childData.content });
      } else if (childType === 'note') {
        state.notes.push({ id: childData.id, x: snap(worldX), y: snap(worldY), text: childData.text });
      }
      renderAll();
    }

    function moveChildToGroup(childData, childType, fromGroup, toGroup) {
      fromGroup.children = fromGroup.children.filter(c => c.id !== childData.id);
      toGroup.children.push({ ...childData });
      renderAll();
    }

    // ─── AUTO LAYOUT ───
    function autoLayout() {
      if (state.nodes.length === 0) return;

      const hasIncoming = new Set(state.connections.map(c => c.to));
      const roots = state.nodes.filter(n => !hasIncoming.has(n.id));
      const orphans = roots.length > 0 ? roots : [state.nodes[0]];

      const placed = new Set();
      const H_GAP = 200, V_GAP = 70;
      let globalY = 0;

      function getChildren(nodeId) {
        return state.connections.filter(c => c.from === nodeId).map(c => state.nodes.find(n => n.id === c.to)).filter(Boolean);
      }

      function layoutTree(root, startX, startY) {
        function subtreeHeight(nodeId) {
          if (placed.has(nodeId)) return 0;
          const children = getChildren(nodeId).filter(c => !placed.has(c.id));
          if (children.length === 0) return V_GAP;
          return children.reduce((sum, c) => sum + subtreeHeight(c.id), 0);
        }

        function placeNode(node, x, yStart, yEnd) {
          if (placed.has(node.id)) return;
          placed.add(node.id);
          node.x = snap(x);
          node.y = snap((yStart + yEnd) / 2 - 20);

          const children = getChildren(node.id).filter(c => !placed.has(c.id));
          if (children.length === 0) return;

          const el = infiniteCanvas.querySelector(`.node[data-id="${node.id}"]`);
          const nw = el ? el.offsetWidth : 140;
          const childX = x + nw + H_GAP;

          let childY = yStart;
          children.forEach(child => {
            const h = subtreeHeight(child.id);
            placeNode(child, childX, childY, childY + h);
            childY += h;
          });
        }

        const h = subtreeHeight(root.id);
        placeNode(root, startX, startY, startY + h);
        return h;
      }

      orphans.forEach(root => {
        const h = layoutTree(root, 0, globalY);
        globalY += h + V_GAP;
      });

      state.nodes.filter(n => !placed.has(n.id)).forEach((n, i) => {
        n.x = snap(0);
        n.y = snap(globalY + i * V_GAP);
        placed.add(n.id);
      });

      renderAll();
    }

    // ─── DIMENSION FUNCTIONS ───
    function addDimension() {
      const c = getCenterWorld();
      const id = 'dim-' + (nextDimId++);
      const dim = { id, label: 'Dimension ' + nextDimId, minValue: 0, maxValue: 100, length: 300,
        position: { x: c.x, y: c.y }, rotation: 0, color: '#7c8aaa' };
      state.dimensions.push(dim);
      selectedDimId = dim.id; selectedMarkId = null;
      drawConnections();
    }

    function addDimMarker() {
      if (!selectedDimId) { alert('Vælg en dimension først (klik på en linje)'); return; }
      const dim = state.dimensions.find(d => d.id === selectedDimId);
      if (!dim) return;
      const colors = ['#FF6600','#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899'];
      const n = state.dimMarkers.filter(m => m.dimensionId === selectedDimId).length;
      const mark = { id: 'mark-' + (nextDimId++), dimensionId: selectedDimId, label: '',
        value: Math.round(dim.minValue + (dim.maxValue - dim.minValue) * 0.5),
        color: colors[n % colors.length], radius: 8 };
      state.dimMarkers.push(mark);
      selectedMarkId = mark.id;
      drawConnections();
    }

    function toggleDimConnect() {
      if (!selectedMarkId) { alert('Vælg en markør først (klik på en cirkel)'); return; }
      isDimConnecting = !isDimConnecting;
      dimConnectFrom = isDimConnecting ? selectedMarkId : null;
      document.getElementById('dim-conn-toggle').classList.toggle('active', isDimConnecting);
      document.getElementById('canvas-container').classList.toggle('crosshair', isDimConnecting);
      drawConnections();
    }

    function cancelDimConnect() {
      isDimConnecting = false; dimConnectFrom = null; dimConnectMouseWorld = null;
      document.getElementById('dim-conn-toggle').classList.remove('active');
      document.getElementById('canvas-container').classList.remove('crosshair');
    }

    // ─── SNAP TOGGLE ───
    function toggleSnap() {
      snapToGrid = !snapToGrid;
      document.getElementById('snap-toggle').classList.toggle('active', snapToGrid);
      if (snapToGrid) {
        state.nodes.forEach(n => { n.x = snap(n.x); n.y = snap(n.y); });
        state.notes.forEach(n => { n.x = snap(n.x); n.y = snap(n.y); });
        state.images.forEach(n => { n.x = snap(n.x); n.y = snap(n.y); });
        state.cards.forEach(n => { n.x = snap(n.x); n.y = snap(n.y); });
        state.groups.forEach(n => { n.x = snap(n.x); n.y = snap(n.y); });
        renderAll();
      }
    }

    // ─── ZOOM ───
    function zoomTo(nz, cx, cy) {
      const oz = zoom;
      zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, nz));
      pan.x = cx - (cx - pan.x) * (zoom / oz);
      pan.y = cy - (cy - pan.y) * (zoom / oz);
      updateTransform();
    }
    function zoomIn() { zoomTo(zoom * 1.2, innerWidth / 2, innerHeight / 2); }
    function zoomOut() { zoomTo(zoom / 1.2, innerWidth / 2, innerHeight / 2); }
    function resetView() { zoom = 1; pan = { x: innerWidth / 2, y: (innerHeight - 48) / 2 + 48 }; updateTransform(); }

    // ─── SAVE/LOAD ───
    function saveToFile() {
      const d = JSON.stringify({
        version: 3,
        nodes: state.nodes, notes: state.notes, images: state.images,
        cards: state.cards, groups: state.groups,
        connections: state.connections, nextId: state.nextId,
        dimensions: state.dimensions, dimMarkers: state.dimMarkers, dimConnections: state.dimConnections,
        nextDimId,
        view: { pan, zoom }, snapToGrid
      }, null, 2);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([d], { type: 'application/json' }));
      a.download = 'mindmap.json'; a.click();
    }
    function loadFromFile() {
      const inp = document.getElementById('file-input');
      inp.onchange = e => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = ev => {
          try {
            const d = JSON.parse(ev.target.result);
            state.nodes = d.nodes || []; state.notes = d.notes || []; state.images = d.images || [];
            state.cards = d.cards || []; state.groups = d.groups || [];
            state.connections = d.connections || []; state.nextId = d.nextId || 1;
            state.dimensions = d.dimensions || []; state.dimMarkers = d.dimMarkers || []; state.dimConnections = d.dimConnections || [];
            if (d.nextDimId) nextDimId = d.nextDimId;
            if (d.view) { pan = d.view.pan || { x: 0, y: 0 }; zoom = d.view.zoom || 1; }
            if (d.snapToGrid !== undefined) { snapToGrid = d.snapToGrid; document.getElementById('snap-toggle').classList.toggle('active', snapToGrid); }
            selectedDimId = null; selectedMarkId = null;
            deselectAll(); updateTransform(); renderAll();
          } catch (err) { alert('Fejl: ' + err.message); }
        };
        r.readAsText(f); inp.value = '';
      };
      inp.click();
    }

    // Import Braindump JSON format
    function importBraindump(braindumpData) {
      const items = braindumpData.items || {};
      const canvasNodes = braindumpData.canvasNodes || [];

      canvasNodes.forEach(cn => {
        const item = items[cn.itemId];
        if (!item) return;
        if (item.type === 'card') {
          state.cards.push({ id: genId(), x: cn.x, y: cn.y, content: item.content || '' });
        } else if (item.type === 'group') {
          const group = { id: genId(), x: cn.x, y: cn.y, title: item.title || '', children: [], collapsed: item.collapsed || false };
          // Recursively add children
          if (item.children) {
            item.children.forEach(childId => {
              const childItem = items[childId];
              if (!childItem) return;
              if (childItem.type === 'card') {
                group.children.push({ type: 'card', id: genId(), content: childItem.content || '' });
              }
            });
          }
          state.groups.push(group);
        }
      });
      renderAll();
    }

    // ═══════════════════════════════════
    // EVENT HANDLERS
    // ═══════════════════════════════════

    container.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      if (isConnecting) { cancelConnection(); return; }

      const world = screenToWorld(e.clientX, e.clientY - 48);

      // ─── DIMENSION / MARKER INTERACTION ───
      if (isDimConnecting) {
        const hitMark = hitTestMarker(world.x, world.y);
        if (hitMark && hitMark.id !== dimConnectFrom) {
          state.dimConnections.push({ id: 'dconn-' + (nextDimId++), fromMarkerId: dimConnectFrom, toMarkerId: hitMark.id, label: '', color: '#888888' });
        }
        cancelDimConnect(); drawConnections(); return;
      }

      // Marker hit (drag along dimension)
      const hitMark = hitTestMarker(world.x, world.y);
      if (hitMark) {
        selectedMarkId = hitMark.id; selectedDimId = hitMark.dimensionId;
        isMarkDragging = true; dimInteractState = { markId: hitMark.id };
        drawConnections(); return;
      }

      // Endpoint handle hit (rotate) — only on selected dimension
      if (selectedDimId) {
        const dim = state.dimensions.find(d => d.id === selectedDimId);
        if (dim) {
          const ep = getDimEndpoints(dim); const thresh = 12 / zoom;
          if (Math.hypot(world.x - ep.start.x, world.y - ep.start.y) < thresh) {
            isDimRotating = true; dimInteractState = { dimId: dim.id, fixedX: ep.end.x, fixedY: ep.end.y, flip: true }; return;
          }
          if (Math.hypot(world.x - ep.end.x, world.y - ep.end.y) < thresh) {
            isDimRotating = true; dimInteractState = { dimId: dim.id, fixedX: ep.start.x, fixedY: ep.start.y, flip: false }; return;
          }
        }
      }

      // Dimension line hit (select / move)
      const hitDim = hitTestDimension(world.x, world.y);
      if (hitDim) {
        selectedMarkId = null; selectedDimId = hitDim.id;
        isDimDragging = true;
        dimInteractState = { dimId: hitDim.id, startWx: world.x, startWy: world.y, origX: hitDim.position.x, origY: hitDim.position.y };
        drawConnections(); return;
      }

      // No dimension hit — clear dim selection
      if (selectedDimId || selectedMarkId) {
        selectedDimId = null; selectedMarkId = null; drawConnections();
      }

      // Shift+drag = marquee selection
      if (e.shiftKey) {
        isMarquee = true;
        marqueeStartWorld = screenToWorld(e.clientX, e.clientY - 48);
        marqueeEndWorld = { ...marqueeStartWorld };
        container.classList.add('crosshair');
        return;
      }

      deselectAll();
      isPanning = true;
      panStart = { x: e.clientX, y: e.clientY }; panStartOffset = { ...pan };
      container.classList.add('grabbing');
    });

    window.addEventListener('mousemove', e => {
      // ─── DIMENSION DRAGS ───
      if (isDimRotating && dimInteractState) {
        const world = screenToWorld(e.clientX, e.clientY - 48);
        const dim = state.dimensions.find(d => d.id === dimInteractState.dimId);
        if (dim) {
          const ang = Math.atan2(world.y - dim.position.y, world.x - dim.position.x) * 180 / Math.PI;
          dim.rotation = dimInteractState.flip ? ang + 180 : ang;
          drawConnections();
        }
        return;
      }
      if (isDimDragging && dimInteractState) {
        const world = screenToWorld(e.clientX, e.clientY - 48);
        const dim = state.dimensions.find(d => d.id === dimInteractState.dimId);
        if (dim) {
          dim.position.x = dimInteractState.origX + (world.x - dimInteractState.startWx);
          dim.position.y = dimInteractState.origY + (world.y - dimInteractState.startWy);
          drawConnections();
        }
        return;
      }
      if (isMarkDragging && dimInteractState) {
        const world = screenToWorld(e.clientX, e.clientY - 48);
        const mark = state.dimMarkers.find(m => m.id === dimInteractState.markId);
        if (mark) {
          const dim = state.dimensions.find(d => d.id === mark.dimensionId);
          if (dim) { mark.value = dimWorldToValue(dim, world.x, world.y); drawConnections(); }
        }
        return;
      }
      if (isDimConnecting) {
        dimConnectMouseWorld = screenToWorld(e.clientX, e.clientY - 48);
        drawConnections();
      }

      if (isPanning) {
        pan.x = panStartOffset.x + (e.clientX - panStart.x);
        pan.y = panStartOffset.y + (e.clientY - panStart.y);
        updateTransform(); return;
      }
      if (isMarquee) {
        marqueeEndWorld = screenToWorld(e.clientX, e.clientY - 48);
        drawConnections(); return;
      }
      if (isGroupDragging && groupDragStart) {
        const now = screenToWorld(e.clientX, e.clientY - 48);
        const dx = now.x - groupDragStart.x, dy = now.y - groupDragStart.y;
        multiSelected.forEach(item => {
          item.data.x = snap(item.data.x + dx);
          item.data.y = snap(item.data.y + dy);
          const el = infiniteCanvas.querySelector(`[data-id="${item.data.id}"]`);
          if (el) { el.style.left = item.data.x + 'px'; el.style.top = item.data.y + 'px'; }
        });
        groupDragStart = now;
        drawConnections(); return;
      }
      if (isChildDragging && childDragState) {
        const dx = e.clientX - childDragState.startMouseX;
        const dy = e.clientY - childDragState.startMouseY;
        if (!childDragState.hasMovedEnough) {
          if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
          childDragState.hasMovedEnough = true;
          // Create floating clone
          const floater = document.createElement('div');
          floater.className = 'child-drag-floater';
          if (childDragState.childType === 'card') {
            floater.innerHTML = `<div class="card" style="position:relative;"><div class="drag-handle"></div><div class="card-content">${childDragState.childData.content || ''}</div></div>`;
          } else {
            floater.innerHTML = `<div class="note" style="position:relative;min-width:120px;"><div class="note-text">${childDragState.childData.text || ''}</div></div>`;
          }
          floater.style.left = childDragState.worldX + 'px';
          floater.style.top = childDragState.worldY + 'px';
          infiniteCanvas.appendChild(floater);
          childDragState.floaterEl = floater;
        }
        if (childDragState.floaterEl) {
          const world = screenToWorld(e.clientX, e.clientY - 48);
          childDragState.worldX = world.x - 120;
          childDragState.worldY = world.y - 20;
          childDragState.floaterEl.style.left = childDragState.worldX + 'px';
          childDragState.floaterEl.style.top = childDragState.worldY + 'px';
        }
        // Check for group drop target
        clearDropTargets();
        const dt = findGroupDropTarget(e.clientX, e.clientY, childDragState.groupData.id);
        if (dt) { dt.el.classList.add('drop-target'); currentDropTarget = dt; }
        return;
      }
      if (isDragging && dragTarget) {
        const w = screenToWorld(e.clientX, e.clientY - 48);
        dragTarget.data.x = snap(w.x - dragOffset.x);
        dragTarget.data.y = snap(w.y - dragOffset.y);
        dragTarget.el.style.left = dragTarget.data.x + 'px';
        dragTarget.el.style.top = dragTarget.data.y + 'px';
        drawConnections();

        // Check for group drop target (only for cards and notes)
        clearDropTargets();
        if (dragTarget.type === 'card' || dragTarget.type === 'note') {
          const dt = findGroupDropTarget(e.clientX, e.clientY, dragTarget.data.id);
          if (dt) { dt.el.classList.add('drop-target'); currentDropTarget = dt; }
        }
        return;
      }
      if (isResizing && resizeTarget) {
        const dx = (e.clientX - resizeStart.ex) / zoom, dy = (e.clientY - resizeStart.ey) / zoom;
        const ar = resizeStart.ar;
        const delta = Math.abs(dx) > Math.abs(dy) ? dx : dy * ar;
        let nw, nh, nx, ny;
        switch (resizeHandle) {
          case 'br': nw = Math.max(50, resizeStart.w + delta); nh = nw / ar; nx = resizeStart.x; ny = resizeStart.y; break;
          case 'bl': nw = Math.max(50, resizeStart.w - delta); nh = nw / ar; nx = resizeStart.x + (resizeStart.w - nw); ny = resizeStart.y; break;
          case 'tr': nw = Math.max(50, resizeStart.w + delta); nh = nw / ar; nx = resizeStart.x; ny = resizeStart.y + (resizeStart.h - nh); break;
          case 'tl': nw = Math.max(50, resizeStart.w - delta); nh = nw / ar; nx = resizeStart.x + (resizeStart.w - nw); ny = resizeStart.y + (resizeStart.h - nh); break;
        }
        Object.assign(resizeTarget.data, { x: nx, y: ny, w: nw, h: nh });
        Object.assign(resizeTarget.el.style, { left: nx + 'px', top: ny + 'px', width: nw + 'px', height: nh + 'px' });
        return;
      }
      if (isConnecting) {
        connectMouseWorld = screenToWorld(e.clientX, e.clientY - 48);
        drawConnections();
      }
    });

    window.addEventListener('mouseup', e => {
      if (isDimRotating || isDimDragging || isMarkDragging) {
        isDimRotating = false; isDimDragging = false; isMarkDragging = false;
        dimInteractState = null; return;
      }
      if (isPanning) { isPanning = false; container.classList.remove('grabbing'); return; }
      if (isMarquee) {
        isMarquee = false;
        container.classList.remove('crosshair');
        marqueeEndWorld = screenToWorld(e.clientX, e.clientY - 48);
        clearMultiSelect();
        applyMultiSelectFromRect(marqueeStartWorld.x, marqueeStartWorld.y, marqueeEndWorld.x, marqueeEndWorld.y);
        marqueeStartWorld = null; marqueeEndWorld = null;
        drawConnections(); return;
      }
      if (isGroupDragging) { isGroupDragging = false; groupDragStart = null; return; }

      // Child drag end
      if (isChildDragging && childDragState) {
        if (childDragState.floaterEl) childDragState.floaterEl.remove();
        if (childDragState.hasMovedEnough) {
          if (currentDropTarget) {
            // Move to another group
            const targetGroup = state.groups.find(g => g.id === currentDropTarget.id);
            if (targetGroup) {
              moveChildToGroup(childDragState.childData, childDragState.childType, childDragState.groupData, targetGroup);
            }
          } else {
            // Move to canvas
            moveChildToCanvas(childDragState.childData, childDragState.childType, childDragState.groupData, childDragState.worldX, childDragState.worldY);
          }
        }
        clearDropTargets();
        isChildDragging = false; childDragState = null;
        return;
      }

      // Normal drag end - check for group drop
      if (isDragging && dragTarget) {
        if (currentDropTarget && (dragTarget.type === 'card' || dragTarget.type === 'note')) {
          const targetGroup = state.groups.find(g => g.id === currentDropTarget.id);
          if (targetGroup) {
            moveItemToGroup(dragTarget.data, dragTarget.type, targetGroup);
          }
        }
        clearDropTargets();
        isDragging = false; dragTarget = null;
        return;
      }
      if (isDragging) { isDragging = false; dragTarget = null; return; }
      if (isResizing) { isResizing = false; resizeTarget = null; return; }

      if (isConnecting) {
        const elUnder = document.elementFromPoint(e.clientX, e.clientY);

        if (elUnder && elUnder.classList.contains('connect-handle')) {
          const nodeEl = elUnder.closest('.node');
          if (nodeEl) {
            const tid = parseInt(nodeEl.dataset.id);
            const td = state.nodes.find(n => n.id === tid);
            if (td && td.id !== connectFromNode.id) {
              const exists = state.connections.some(c => (c.from === connectFromNode.id && c.to === td.id) || (c.from === td.id && c.to === connectFromNode.id));
              if (!exists) state.connections.push({ from: connectFromNode.id, to: td.id });
              cancelConnection(); return;
            }
          }
        }
        if (elUnder) {
          const nodeEl = elUnder.closest('.node');
          if (nodeEl) {
            const tid = parseInt(nodeEl.dataset.id);
            const td = state.nodes.find(n => n.id === tid);
            if (td && td.id !== connectFromNode.id) {
              const exists = state.connections.some(c => (c.from === connectFromNode.id && c.to === td.id) || (c.from === td.id && c.to === connectFromNode.id));
              if (!exists) state.connections.push({ from: connectFromNode.id, to: td.id });
              cancelConnection(); return;
            }
          }
        }
        // Empty space -> create sub-node
        const world = screenToWorld(e.clientX, e.clientY - 48);
        const child = { id: genId(), x: snap(world.x - 60), y: snap(world.y - 20), text: '' };
        state.nodes.push(child);
        state.connections.push({ from: connectFromNode.id, to: child.id });
        cancelConnection();
        renderAll();
        const el = infiniteCanvas.querySelector(`.node[data-id="${child.id}"]`);
        selectElement(el, child, 'node');
        setTimeout(() => el.querySelector('.node-text').focus(), 50);
      }
    });

    container.addEventListener('wheel', e => {
      e.preventDefault();
      zoomTo(zoom * (e.deltaY > 0 ? 0.92 : 1.08), e.clientX, e.clientY - 48);
    }, { passive: false });

    window.addEventListener('keydown', e => {
      if (e.target.contentEditable === 'true' || e.target.tagName === 'INPUT') {
        if (e.key === 'Escape') e.target.blur(); return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
        e.preventDefault();
        clearMultiSelect();
        state.nodes.forEach(n => addToMultiSelect(n, 'node'));
        state.notes.forEach(n => addToMultiSelect(n, 'note'));
        state.images.forEach(n => addToMultiSelect(n, 'image'));
        state.cards.forEach(n => addToMultiSelect(n, 'card'));
        state.groups.forEach(n => addToMultiSelect(n, 'group'));
        return;
      }
      if (e.key === 'Delete' || e.key === 'Backspace') {
        e.preventDefault();
        if (multiSelected.length > 0) { deleteMultiSelected(); return; }
        if (selectedMarkId) {
          state.dimMarkers = state.dimMarkers.filter(m => m.id !== selectedMarkId);
          state.dimConnections = state.dimConnections.filter(c => c.fromMarkerId !== selectedMarkId && c.toMarkerId !== selectedMarkId);
          selectedMarkId = null; drawConnections(); return;
        }
        if (selectedDimId) {
          const mids = state.dimMarkers.filter(m => m.dimensionId === selectedDimId).map(m => m.id);
          state.dimConnections = state.dimConnections.filter(c => !mids.includes(c.fromMarkerId) && !mids.includes(c.toMarkerId));
          state.dimMarkers = state.dimMarkers.filter(m => m.dimensionId !== selectedDimId);
          state.dimensions = state.dimensions.filter(d => d.id !== selectedDimId);
          selectedDimId = null; drawConnections(); return;
        }
        deleteSelected();
      }
      if (e.key === 'n' || e.key === 'N') { e.preventDefault(); addNode(); }
      if (e.key === 't' || e.key === 'T') { e.preventDefault(); addNote(); }
      if (e.key === 'k' || e.key === 'K') { e.preventDefault(); addCard(); }
      if (e.key === 'g' || e.key === 'G') { e.preventDefault(); addGroup(); }
      if (e.key === 'Tab' && selectedData && selectedType === 'node') { e.preventDefault(); addChildNode(selectedData); }
      if (e.key === 'Escape') { deselectAll(); if (isConnecting) cancelConnection(); if (isDimConnecting) cancelDimConnect(); hideContextMenu(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveToFile(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'o') { e.preventDefault(); loadFromFile(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'c' && selectedData) { e.preventDefault(); copySelected(); }
      if (e.key === '+' || e.key === '=') zoomIn();
      if (e.key === '-') zoomOut();
      if (e.key === '0') resetView();
    });

    // ─── IMAGE DROP ───
    container.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; dropOverlay.classList.add('active'); });
    container.addEventListener('dragleave', e => { if (e.target === container || !container.contains(e.relatedTarget)) dropOverlay.classList.remove('active'); });
    container.addEventListener('drop', e => {
      e.preventDefault(); dropOverlay.classList.remove('active');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      if (!files.length) return;
      const world = screenToWorld(e.clientX, e.clientY - 48);
      files.forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > 400 || h > 400) { const r = Math.min(400 / w, 400 / h); w = Math.round(w * r); h = Math.round(h * r); }
            addImage(ev.target.result, world.x + i * 20 - w / 2, world.y + i * 20 - h / 2, w, h);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    });
    document.body.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.classList.add('active'); });
    document.body.addEventListener('dragleave', e => { if (!e.relatedTarget || e.relatedTarget === document.documentElement) dropOverlay.classList.remove('active'); });
    document.body.addEventListener('drop', e => { e.preventDefault(); dropOverlay.classList.remove('active'); });

    // ─── DIMENSION DBLCLICK (edit label) ───
    container.addEventListener('dblclick', e => {
      const world = screenToWorld(e.clientX, e.clientY - 48);
      const hitMark = hitTestMarker(world.x, world.y);
      if (hitMark) {
        const lbl = prompt('Markørnavn:', hitMark.label || '');
        if (lbl !== null) { hitMark.label = lbl; drawConnections(); }
        return;
      }
      const hitDim = hitTestDimension(world.x, world.y);
      if (hitDim) {
        const lbl = prompt('Dimensionsnavn:', hitDim.label || '');
        if (lbl !== null) { hitDim.label = lbl; drawConnections(); }
      }
    });

    // ─── CONTEXT MENU ───
    container.addEventListener('contextmenu', e => {
      e.preventDefault();
      contextWorldPos = screenToWorld(e.clientX, e.clientY - 48);
      contextNodeData = null;
      showContextMenu(e.clientX, e.clientY);
    });

    function showContextMenu(x, y) {
      contextMenu.style.left = x + 'px'; contextMenu.style.top = y + 'px'; contextMenu.style.display = 'block';
      contextMenu.querySelector('[data-action="add-child"]').style.display = contextNodeData ? 'flex' : 'none';
      contextMenu.querySelector('[data-action="delete"]').style.display = selectedData ? 'flex' : 'none';
      contextMenu.querySelector('[data-action="copy"]').style.display = selectedData ? 'flex' : 'none';
    }
    function hideContextMenu() { contextMenu.style.display = 'none'; }
    document.addEventListener('click', e => { if (!contextMenu.contains(e.target)) hideContextMenu(); });

    contextMenu.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const a = item.dataset.action;
        if (a === 'add-node') addNode(contextWorldPos.x, contextWorldPos.y);
        if (a === 'add-note') addNote(contextWorldPos.x, contextWorldPos.y);
        if (a === 'add-card') addCard(contextWorldPos.x, contextWorldPos.y);
        if (a === 'add-group') addGroup(contextWorldPos.x, contextWorldPos.y);
        if (a === 'add-child' && contextNodeData) addChildNode(contextNodeData);
        if (a === 'copy') copySelected();
        if (a === 'delete') deleteSelected();
        hideContextMenu();
      });
    });

    // ─── INIT ───
    window.addEventListener('resize', () => updateTransform());
    resetView();
  </script>
  <!-- AI Suite Assistant -->
  <script src="../SMFI_Suite/bus.js?v=3"></script>
  <script src="../SMFI_Suite/google-api.js?v=3"></script>
  <script src="../SMFI_Suite/ai-assistant.js?v=5"></script>

  <!-- Theme Listener + Global Save/Load -->
  <script>
    function applyGlobalTheme(theme) {
      if (theme === 'light') { document.body.classList.add('theme-light'); }
      else { document.body.classList.remove('theme-light'); }
    }
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'THEME_CHANGE') { applyGlobalTheme(event.data.theme); }
    });
    const savedGlobalTheme = localStorage.getItem('smfi-theme');
    if (savedGlobalTheme) { applyGlobalTheme(savedGlobalTheme); }

    // Global Save/Load Listeners
    if (window.bus) {
      window.bus.subscribe('request-state', () => {
        const exportData = {
          version: 3,
          nodes: state.nodes, notes: state.notes, images: state.images,
          cards: state.cards, groups: state.groups,
          connections: state.connections, nextId: state.nextId,
          dimensions: state.dimensions, dimMarkers: state.dimMarkers, dimConnections: state.dimConnections,
          nextDimId,
          view: { pan, zoom }, snapToGrid
        };
        window.bus.publish('state-response', { app: 'Mindmap & Braindump', state: exportData });
      });
      window.bus.subscribe('load-state', (data) => {
        if (data && data.apps && data.apps['Mindmap & Braindump']) {
          const d = data.apps['Mindmap & Braindump'];
          state.nodes = d.nodes || []; state.notes = d.notes || []; state.images = d.images || [];
          state.cards = d.cards || []; state.groups = d.groups || [];
          state.connections = d.connections || []; state.nextId = d.nextId || 1;
          state.dimensions = d.dimensions || []; state.dimMarkers = d.dimMarkers || []; state.dimConnections = d.dimConnections || [];
          if (d.nextDimId) nextDimId = d.nextDimId;
          if (d.view) { pan = d.view.pan || { x: 0, y: 0 }; zoom = d.view.zoom || 1; }
          if (d.snapToGrid !== undefined) { snapToGrid = d.snapToGrid; document.getElementById('snap-toggle').classList.toggle('active', snapToGrid); }
          selectedDimId = null; selectedMarkId = null;
          deselectAll(); updateTransform(); renderAll();
        }
      });
    }
  </script>
