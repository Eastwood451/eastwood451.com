<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eastwood451 Projekter</title>
    <script src="/auth.js"></script>
    <style>
      :root {
        --bg: #07090d;
        --surface: rgba(10, 15, 22, 0.78);
        --line: rgba(255, 255, 255, 0.18);
        --text: #f5f8fc;
        --muted: #a8b6c6;
        --blue: #1eb7ff;
        --orange: #ff8c1a;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 74% 38%, rgba(30, 183, 255, 0.2), transparent 34%),
          radial-gradient(circle at 18% 74%, rgba(255, 140, 26, 0.16), transparent 28%),
          #07090d;
        background-size: 44px 44px, 44px 44px, auto, auto, auto;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        align-content: center;
        width: min(1120px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 56px 0;
      }

      .intro {
        max-width: 760px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.2rem, 6vw, 5rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      p {
        max-width: 660px;
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.55;
      }

      .app-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, 200px);
        gap: 18px;
        align-items: start;
      }

      .app-button {
        display: grid;
        grid-template-rows: 144px 56px;
        overflow: hidden;
        width: 200px;
        height: 200px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: inherit;
        background: #111821;
        text-decoration: none;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .app-button:focus-visible {
        outline: 3px solid var(--blue);
        outline-offset: 4px;
      }

      .app-button:hover,
      .app-button:focus-visible {
        transform: translateY(-3px);
        border-color: rgba(30, 183, 255, 0.48);
        box-shadow: 0 22px 54px rgba(0, 0, 0, 0.46);
      }

      .app-button img {
        display: block;
        width: 100%;
        height: 144px;
        object-fit: cover;
        transition: transform 220ms ease, filter 220ms ease;
      }

      .app-button:hover img,
      .app-button:focus-visible img {
        transform: scale(1.04);
        filter: saturate(1.12) contrast(1.08);
      }

      .app-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
        height: 56px;
        padding: 0 12px;
        border-top: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        font-size: 0.88rem;
        font-weight: 800;
        line-height: 1.15;
      }

      .app-label span:first-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .arrow {
        flex: 0 0 auto;
        color: var(--blue);
        font-size: 1.2rem;
        line-height: 1;
      }

      @media (max-width: 700px) {
        main {
          width: min(100% - 24px, 1120px);
          padding: 28px 0;
        }

        .app-grid {
          grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
          gap: 14px;
        }

        .app-button {
          width: 100%;
          height: 200px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro" aria-labelledby="page-title">
        <h1 id="page-title">Eastwood451 Projekter</h1>
        <p>Vaelg et projekt og aabn det direkte i browseren.</p>
      </section>

      <nav class="app-grid" aria-label="Projektoversigt">
        <a class="app-button" href="jetmotor.html" aria-label="Aabn den interaktive 3D-jetmotor">
          <img src="jet_engine.jpg" alt="Jetmotor" />
          <span class="app-label"><span>3D-jetmotor</span><span class="arrow" aria-hidden="true">&rarr;</span></span>
        </a>

        <a class="app-button" href="calculus/" aria-label="Aabn Calculus Traener">
          <img src="calculus_preview.png" alt="Calculus Traener" />
          <span class="app-label"><span>Calculus Traener</span><span class="arrow" aria-hidden="true">&rarr;</span></span>
        </a>

        <a class="app-button" href="large-number-visualizer/" aria-label="Aabn Large Number Visualizer">
          <img src="large-number-visualizer/133 meter.png" alt="Kortbillede til Large Number Visualizer" />
          <span class="app-label"><span>Large Number</span><span class="arrow" aria-hidden="true">&rarr;</span></span>
        </a>

        <a class="app-button" href="biology/" aria-label="Aabn Biology">
          <img src="biology/Tree of life taksonomi dansk engelsk 78ef38e9-9120-4906-b26c-a301bdaa66fd.png" alt="Biologisk klassifikation" />
          <span class="app-label"><span>Biology</span><span class="arrow" aria-hidden="true">&rarr;</span></span>
        </a>

        <a class="app-button" href="time-travel/" aria-label="Aabn Geologisk Tidssimulator">
          <img src="time-travel-preview.svg" alt="Geologisk Tidssimulator" />
          <span class="app-label"><span>Tidsrejse</span><span class="arrow" aria-hidden="true">&rarr;</span></span>
        </a>

        <a class="app-button" href="SMFI_Suite/index.html" aria-label="Aabn SMFI Omnibus Suite">
          <img src="Dimensionsvisualisering - Antigravity/20260225_063953.jpg" alt="SMFI Omnibus Suite" />
          <span class="app-label"><span>SMFI Suite</span><span class="arrow" aria-hidden="true">&rarr;</span></span>
        </a>

        <a class="app-button" href="braindump/" aria-label="Aabn Braindump Memo">
          <img src="braindump/preview.svg" alt="Braindump Memo" />
          <span class="app-label"><span>Braindump</span><span class="arrow" aria-hidden="true">&rarr;</span></span>
        </a>
      </nav>
    </main>
  </body>
</html>
