<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eastwood451 Projekter</title>
    <style>
      :root {
        --bg: #07090d;
        --surface: rgba(10, 15, 22, 0.74);
        --line: rgba(255, 255, 255, 0.18);
        --text: #f5f8fc;
        --muted: #a8b6c6;
        --blue: #1eb7ff;
        --orange: #ff8c1a;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 74% 38%, rgba(30, 183, 255, 0.2), transparent 34%),
          radial-gradient(circle at 18% 74%, rgba(255, 140, 26, 0.16), transparent 28%),
          #07090d;
        background-size: 44px 44px, 44px 44px, auto, auto, auto;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        align-content: center;
        width: min(1120px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 56px 0;
      }

      .intro {
        max-width: 760px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.2rem, 6vw, 5rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      p {
        max-width: 660px;
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.55;
      }

      .engine-link {
        position: relative;
        display: block;
        overflow: hidden;
        margin-top: 18px;
        min-height: 430px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: inherit;
        background: #111821;
        text-decoration: none;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      }

      .engine-link:first-of-type {
        margin-top: 0;
      }

      .engine-link:focus-visible {
        outline: 3px solid var(--blue);
        outline-offset: 4px;
      }

      .engine-link img {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 430px;
        object-fit: cover;
        transition: transform 420ms ease, filter 420ms ease;
      }

      .engine-link.compact,
      .engine-link.compact img {
        min-height: 320px;
      }

      .engine-link:hover img,
      .engine-link:focus-visible img {
        transform: scale(1.035);
        filter: saturate(1.1) contrast(1.08);
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        align-content: end;
        padding: 28px;
        background: linear-gradient(180deg, rgba(7, 9, 13, 0.02), rgba(7, 9, 13, 0.86));
      }

      .launch {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        width: fit-content;
        max-width: 100%;
        padding: 12px 16px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: var(--surface);
        backdrop-filter: blur(14px);
        font-weight: 800;
      }

      .launch span {
        color: var(--blue);
        font-size: 1.4rem;
        line-height: 1;
      }

      @media (max-width: 700px) {
        main {
          width: min(100% - 24px, 1120px);
          padding: 28px 0;
        }

        .engine-link,
        .engine-link img {
          min-height: 360px;
        }

        .overlay {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro" aria-labelledby="page-title">
        <h1 id="page-title">Eastwood451 Projekter</h1>
        <p>Vaelg et projekt og aabn det direkte i browseren.</p>
      </section>

      <a class="engine-link" href="jetmotor.html" aria-label="Aabn den interaktive 3D-jetmotor">
        <img src="jet_engine.jpg" alt="Jetmotor" />
        <span class="overlay">
          <span class="launch">Aabn 3D-jetmotoren <span aria-hidden="true">&rarr;</span></span>
        </span>
      </a>

      <a class="engine-link compact" href="large-number-visualizer/" aria-label="Aabn Large Number Visualizer">
        <img src="large-number-visualizer/133 meter.png" alt="Kortbillede til Large Number Visualizer" />
        <span class="overlay">
          <span class="launch">Aabn Large Number Visualizer <span aria-hidden="true">&rarr;</span></span>
        </span>
      </a>
    </main>
  </body>
</html>
