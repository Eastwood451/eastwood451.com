/* ── Epistemic propagation ─────────────────────────── */
function computeDeltaS(nodes, edges) {
  const deltaS = {};
  nodes.forEach(node => {
    const conflictEdges = edges.filter(e =>
      e.to === node.id && ["conflict","contradict"].includes(e.operator)
    );
    if (!conflictEdges.length) { deltaS[node.id] = 0; return; }
    const total = conflictEdges.reduce((sum, e) => {
      const sourceDeltaS = deltaS[e.from] ?? 0;
      const edgeDeltaS = e.deltaS ?? 0.5;
      const weight = e.weight ?? 0.7;
      return sum + (edgeDeltaS * weight) + (sourceDeltaS * 0.3);
    }, 0);
    deltaS[node.id] = Math.min(1.0, total);
  });
  return deltaS;
}

function computeStrengths(nodes, edges) {
  const ds = computeDeltaS(nodes, edges);
  const memo = {};
  const visiting = new Set();
  const defaults = { premise:0.70,evidence:0.80,assumption:0.50,hypothesis:0.40,conclusion:0.0,claim:0.50,ytring:0.65,computation:0.70,operator:1.0,junction:1.0,feeling:0.70,schema:0.60,belief:0.65,pro:0.80,con:0.80,fact:0.90,datum:0.85,object:0.80,person:0.80,choice:0.60,desiredstate:0.70,deltaS:0.50,question:0.50 };
  const nonConflict = edges.filter(e=>!["conflict","contradict"].includes(e.operator));
  function compute(id) {
    if (memo[id] !== undefined) return memo[id];
    if (visiting.has(id)) return 0.5;
    visiting.add(id);
    const node = nodes.find(n=>n.id===id);
    if (!node) return (memo[id]=0);
    const inc = nonConflict.filter(e=>e.to===id);
    if (!inc.length) return (memo[id] = Math.max(0, (node.confidence ?? defaults[node.type] ?? 0.5) * (1 - (ds[id]??0)*0.8)));
    const inputs = inc.map(e => compute(e.from) * (e.weight??0.7) * Math.max(0, OP[e.operator]?.discount??0.9));
    const agg = node.type==="junction" ? (node.aggregator??"and") : "max";
    let r;
    if      (agg==="and") r = Math.min(...inputs);
    else if (agg==="or")  r = Math.max(...inputs);
    else if (agg==="avg") r = inputs.reduce((a,b)=>a+b,0)/inputs.length;
    else if (agg==="sum") r = Math.min(1, inputs.reduce((a,b)=>a+b,0));
    else                  r = Math.max(...inputs);
    const penalized = Math.max(0, r * (1 - (ds[id]??0)*0.8));
    return (memo[id] = Math.max(0, Math.min(1, penalized)));
  }
  nodes.forEach(n=>compute(n.id));
  return memo;
}

  if (node.ontologiskNiveau === "selvholon") return "◎";

  if (strength >= 0.40) return "◐";
  return "○";
}

async function callGeminiRaw(prompt){
  const res=await fetch(GEMINI_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7}})});
  if(!res.ok){const d=await res.json().catch(()=>({}));throw new Error(d?.error?.message||`API-fejl ${res.status}`);}

  let t='';for(const p of parts){if(p.text)t+=p.text;}
  if(!t)throw new Error('Tomt svar fra AI');
  return t;
}
async function callGeminiJson(prompt){

}

function getNodeHeight(n) {
  if (n.type === "image") return n.height ?? 150;
  if (n.type === "junction") return JUNC_R * 2;
  const isOp = n.type === "operator";
  const hasText = !!(n.text && n.text.trim());
  const visibleChildren = n.subNodes ?? [];
  const showSub = !isOp && (n.isContainer || visibleChildren.length > 0);
  const inlineCanvasH = showSub ? Math.max(100, 22 + Math.max(visibleChildren.length, 1) * 92) : 0;
  // Increase base height if text is present to avoid handles appearing in the middle of text
  const baseH = isOp ? (hasText?110:84) : (hasText?180:114); 
  return baseH + (inlineCanvasH ? inlineCanvasH + 18 : 0);
}

function getNodeBounds(n, allNodes=[]) {
  const nx = colX(n.slot) + (n.localX ?? COL_PAD), ny = n.y;
  if (n.type === "junction") return { x: nx, y: ny, w: JUNC_R * 2, h: JUNC_R * 2 };
  if (n.type === "image") return { x: nx, y: ny, w: (n.width ?? 200), h: (n.height ?? 150) };
  if (n.type === "cluster") {
    const members = allNodes.filter(m => (n.memberIds ?? []).includes(m.id));
    if (members.length === 0) return { x: nx, y: ny, w: 200, h: 120 };
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    members.forEach(m => {
      const b = getNodeBounds(m, allNodes);
      minX = Math.min(minX, b.x);
      minY = Math.min(minY, b.y);
      maxX = Math.max(maxX, b.x + b.w);
      maxY = Math.max(maxY, b.y + b.h);
    });
    const pad = 24;
    const hdr = 34;
    return { x: minX - pad, y: minY - pad - hdr, w: (maxX - minX) + pad * 2, h: (maxY - minY) + pad * 2 + hdr };
  }
  return { x: nx, y: ny, w: NODE_W, h: getNodeHeight(n) };
}

function nodeCenter(n, allNodes=[]){
  const b = getNodeBounds(n, allNodes);
  return { x: b.x + b.w / 2, y: b.y + b.h / 2 };
}

function handlePos(n, port, allNodes=[]){
  const b = getNodeBounds(n, allNodes);
  const nx = b.x, ny = b.y, W = b.w, H = b.h;
  if (port === "top")    return { x: nx + W / 2, y: ny };
  if (port === "right")  return { x: nx + W,     y: ny + H / 2 };
  if (port === "bottom") return { x: nx + W / 2, y: ny + H };
  if (port === "left")   return { x: nx,         y: ny + H / 2 };
  return { x: nx + W, y: ny + H / 2 };
}
function colX(slot){ return slot * COL_W; }
function slotFromAbsX(ax){ return Math.max(0, Math.floor((ax) / COL_W)); }

const PORTS=["right","left","bottom","top"];
function dist2(a,b){const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy;}
/* Return {fromPort, toPort} that minimise handle-to-handle distance */
function bestPorts(fn,tn,allNodes=[]){
  let best=null,bestD=Infinity;
  for(const fp of PORTS){
    const hp=handlePos(fn,fp,allNodes);
    for(const tp of PORTS){
      const d=dist2(hp,handlePos(tn,tp,allNodes));
      if(d<bestD){bestD=d;best={fromPort:fp,toPort:tp};}
    }
  }
  return best;
}

function makeSlot(label){ return {id:uid(), label}; }

function buildEmptyMap(){
  return {
    id: uid(),
    mapTitle: "Nyt argumentkort",
    slots: [makeSlot("Nyt trin")],
    nodes: [],
    edges: []
  };
}

function normalizeMapState(state){
  const empty = buildEmptyMap();
  const nodes = Array.isArray(state?.nodes) ? state.nodes.map(node=>({
    ...node,
    tag: typeof node?.tag === "string" ? node.tag : "",
    subNodes: Array.isArray(node?.subNodes) ? node.subNodes : [],
    holonType: node?.holonType ?? "entity",
    ontologiskNiveau: node?.ontologiskNiveau ?? "proposition",
    sandhedsStratum: node?.sandhedsStratum ?? null,
    temporalStatus: node?.temporalStatus ?? null,
    isQuestion: node?.isQuestion ?? false,
    customColor: node?.customColor ?? null,
  })) : [];
  let slots;
  if (Array.isArray(state?.slots) && state.slots.length) {
    slots = state.slots;
  } else {
    // Auto-reconstruct slots from node slot indices so no trin are lost
    const maxSlot = nodes.reduce((m, n) => Math.max(m, typeof n.slot === "number" ? n.slot : 0), 0);
    if (maxSlot > 0) {
      slots = Array.from({length: maxSlot + 1}, (_, i) => makeSlot(`Trin ${i + 1}`));
    } else {
      slots = empty.slots;
    }
  }
  return {
    id: state?.id || uid(),
    updatedAt: state?.updatedAt || new Date().toISOString(),
    mapTitle: typeof state?.mapTitle === "string" && state.mapTitle.trim() ? state.mapTitle : empty.mapTitle,
    slots,
    nodes,
    edges: Array.isArray(state?.edges) ? state.edges.map(edge=>({
      ...edge,
      deltaS: edge?.deltaS ?? 0,
      valence: edge?.valence ?? null,
      intensity: edge?.intensity ?? 0.7,
      fromLocked: !!edge?.fromLocked,
      toLocked: !!edge?.toLocked,
    })) : []
  };
}

function isDefaultEmptyMap(state){
  return (
    state &&
    state.mapTitle === "Nyt argumentkort" &&
    Array.isArray(state.nodes) &&
    state.nodes.length === 0 &&
    Array.isArray(state.edges) &&
    state.edges.length === 0 &&
    Array.isArray(state.slots) &&
    state.slots.length === 1 &&
    state.slots[0] &&
    state.slots[0].label === "Nyt trin"
  );
}

function makeNode(p={},slotCount=1){
  const slot = p.slot ?? Math.max(0, slotCount-1);
  const dflt = {premise:1.0,evidence:1.0,assumption:1.0,hypothesis:1.0,conclusion:1.0,claim:1.0,ytring:1.0,computation:1.0,operator:1.0,junction:1.0,feeling:1.0,schema:1.0,belief:1.0,pro:1.0,con:1.0,fact:1.0,datum:1.0,object:1.0,person:1.0,choice:1.0,desiredstate:1.0,deltaS:1.0,question:1.0};
  return {
    id:uid(), parentId:p.parentId??null,
    slot, localX:p.localX??COL_PAD, y:p.y??(100+Math.random()*280),
    type:p.type??"premise", title:p.title??"Ny node", text:p.text??"",
    tag:p.tag??"",
    subNodes:Array.isArray(p.subNodes)?p.subNodes:[],
    confidence:p.confidence??(dflt[p.type??"premise"]??0.5),
    aggregator:p.aggregator??"and", isContainer:p.isContainer??false,
    holonType:p.holonType??"entity",
    ontologiskNiveau:p.ontologiskNiveau??"proposition",
    sandhedsStratum:p.sandhedsStratum??null,
    temporalStatus:p.temporalStatus??null,
    isQuestion:p.isQuestion??false,
    customColor:p.customColor??null,
    imgSrc:p.imgSrc??null,
    width:p.width??null,
    height:p.height??null,
  };
}
function makeEdge(p={}){

function App(){
  const [currentCanvasId, setCurrentCanvasId] = useState(EMPTY_MAP.id);
  const [slots,    setSlots]    = useState(EMPTY_MAP.slots);
  const [nodes,    setNodes]    = useState(EMPTY_MAP.nodes);

  const [connFrom, setConnFrom] = useState(null);
  const [pending,  setPending]  = useState(null);
  const [dragConn, setDragConn] = useState(null);

  const [rightOpen,  setRightOpen]  = useState(true);
  const [leftOpen,   setLeftOpen]   = useState(true);
  const [multiSel,   setMultiSel]   = useState(()=>new Set());
  const multiDragStartRef           = useRef(null);
  const [clipboard,  setClipboard]  = useState(null); // {nodes, edges}

  // ── Undo / Redo ────────────────────────────────────────
  const historyRef      = useRef([]);   // [{nodes, edges}, ...]

  const isRestoringRef  = useRef(false);
  const histDebounceRef = useRef(null);
  const [aiMsgs,     setAiMsgs]     = useState([{role:'ai',text:'Hej! Jeg er din AI-assistent til argumentkortet. Spørg mig om kortet, eller bed mig om at oprette, redigere eller slette noder og forbindelser.'}]);
  const [aiInput,    setAiInput]    = useState('');

  useEffect(() => {
    const onThemeMessage = (event) => {

        applyGlobalTheme(event.data.theme);
      }
    };
    const savedTheme = localStorage.getItem("smfi-theme") || "dark";
    applyGlobalTheme(savedTheme);
    window.addEventListener("message", onThemeMessage);
    return () => window.removeEventListener("message", onThemeMessage);
  }, []);

  const buildSuiteState = useCallback(() => ({
    id: currentCanvasId,
    mapTitle,
    slots,
    nodes,
    edges,
    focusId,
    selNodeId,
    selEdgeId,
    mode,
    activeSlot,
    zoom,
    pan,
    aiOpen,
    aiMsgs
  }), [
    currentCanvasId,
    mapTitle,
    slots,
    nodes,
    edges,
    focusId,
    selNodeId,
    selEdgeId,
    mode,
    activeSlot,
    zoom,
    pan,
    aiOpen,
    aiMsgs
  ]);

  const applySuiteState = useCallback((state) => {
    if (!state || typeof state !== "object") return;
    const next = normalizeMapState(state);
    setCurrentCanvasId(next.id);
    setMapTitle(next.mapTitle);
    setSlots(next.slots);
    setNodes(next.nodes);
    setEdges(next.edges);
    setFocusId(state.focusId ?? null);
    setSelNodeId(state.selNodeId ?? null);
    setSelEdgeId(state.selEdgeId ?? null);
    setMode(typeof state.mode === "string" ? state.mode : "select");
    setActiveSlot(Number.isInteger(state.activeSlot) ? Math.max(0, state.activeSlot) : 0);
    setZoom(typeof state.zoom === "number" ? state.zoom : 0.72);
    setPan(
      state.pan && typeof state.pan.x === "number" && typeof state.pan.y === "number"
        ? state.pan
        : { x: 20, y: 30 }
    );
    setAiOpen(!!state.aiOpen);
    if (Array.isArray(state.aiMsgs) && state.aiMsgs.length) {
      setAiMsgs(state.aiMsgs);
    }
    setPending(null);
    setConnFrom(null);
    setDragConn(null);
    setChipPicker(null);
  }, []);

  const resetViewportState = useCallback(() => {
    setFocusId(null);
    setSelNodeId(null);
    setSelEdgeId(null);
    setMode("select");
    setActiveSlot(0);
    setZoom(0.72);
    setPan({ x: 20, y: 30 });
    setAiOpen(false);
    setPending(null);
    setConnFrom(null);
    setDragConn(null);
    setChipPicker(null);
  }, []);

  const loadCanvasState = useCallback((state) => {
    const next = normalizeMapState(state);
    setCurrentCanvasId(next.id);
    setMapTitle(next.mapTitle);
    setSlots(next.slots);
    setNodes(next.nodes);
    setEdges(next.edges);
    resetViewportState();
  }, [resetViewportState]);

  const visNodes = useMemo(()=>nodes.filter(n=>n.parentId===focusId),[nodes,focusId]);
  const visEdges = useMemo(()=>edges.filter(e=>e.parentId===focusId),[edges,focusId]);
  const selNode  = useMemo(()=>nodes.find(n=>n.id===selNodeId)??null,[nodes,selNodeId]);
  const selEdge  = useMemo(()=>edges.find(e=>e.id===selEdgeId)??null,[edges,selEdgeId]);
  const focusNode= useMemo(()=>nodes.find(n=>n.id===focusId)??null,[nodes,focusId]);
  const crumbs   = useMemo(()=>{const c=[];let cur=focusNode;while(cur){c.unshift(cur);cur=cur.parentId?nodes.find(n=>n.id===cur.parentId):null;}return c;},[focusNode,nodes]);
  const cc       = useCallback(id=>nodes.filter(n=>n.parentId===id).length,[nodes]);
  const strengths= useMemo(()=>computeStrengths(visNodes,visEdges),[visNodes,visEdges]);

  /* ── Slot management ──────────────────────────── */
  const addSlot = ()=>{
    const s=makeSlot("Nyt trin");
    setSlots(prev=>[...prev,s]);
    setActiveSlot(slots.length);
  };
  const renameSlot=(id,label)=>setSlots(prev=>prev.map(s=>s.id===id?{...s,label}:s));
  const deleteSlot=(idx)=>{
    if(slots.length<=1)return;
    // Move nodes in this slot to previous
    setNodes(prev=>prev.map(n=>n.slot===idx?{...n,slot:Math.max(0,idx-1)}:n.slot>idx?{...n,slot:n.slot-1}:n));
    setSlots(prev=>prev.filter((_,i)=>i!==idx));
    setActiveSlot(s=>Math.min(s,slots.length-2));
  };
  const moveSlotLeft=(idx)=>{
    if(idx===0)return;
    // Swap slots[idx] and slots[idx-1], update node slot indices
    setSlots(prev=>{const a=[...prev];[a[idx-1],a[idx]]=[a[idx],a[idx-1]];return a;});
    setNodes(prev=>prev.map(n=>{
      if(n.slot===idx)  return{...n,slot:idx-1};
      if(n.slot===idx-1)return{...n,slot:idx};
      return n;
    }));
  };
  const moveSlotRight=(idx)=>{
    if(idx>=slots.length-1)return;
    setSlots(prev=>{const a=[...prev];[a[idx],a[idx+1]]=[a[idx+1],a[idx]];return a;});
    setNodes(prev=>prev.map(n=>{
      if(n.slot===idx)  return{...n,slot:idx+1};
      if(n.slot===idx+1)return{...n,slot:idx};
      return n;
    }));
  };

  /* ── Node mutations ───────────────────────────── */
  const addNode=useCallback((p={})=>{
    const slot = p.slot ?? activeSlot;
    const n=makeNode({parentId:focusId,slot,localX:COL_PAD,y:60+Math.random()*320,...p},slots.length);
    setNodes(prev=>[...prev,n]);setSelNodeId(n.id);setSelEdgeId(null);return n;
  },[focusId,activeSlot,slots.length]);
  const addChildNode=useCallback((parentId)=>{
    const parent=nodes.find(n=>n.id===parentId);
    if(!parent)return;
    const childCount=(parent.subNodes??[]).length;
    const next=makeNode({
      parentId,
      slot:Math.min(parent.slot??0,slots.length-1),
      localX:COL_PAD,
      y:60+childCount*110,
      type:"premise",
      title:"Ny undernode",
      text:"!(Ny undernode)"
    },slots.length);
    setNodes(prev=>prev.map(n=>n.id===parentId?{...n,isContainer:true,subNodes:[...(n.subNodes??[]),next]}:n).concat(next));
    setSelNodeId(parentId);
    setSelEdgeId(null);
  },[nodes,slots.length]);
  const upNode =useCallback((id,p)=>setNodes(prev=>prev.map(n=>{
    if(n.id===id)return{...n,...p};
    // cascade into parent's subNodes so SubNodeCard re-renders with fresh data
    if(Array.isArray(n.subNodes)&&n.subNodes.some(c=>c.id===id))
      return{...n,subNodes:n.subNodes.map(c=>c.id===id?{...c,...p}:c)};
    return n;
  })),[]);

  const clusterSelected = useCallback(() => {
    if (multiSel.size < 2) return;
    const ids = Array.from(multiSel);
    const cl = makeNode({
      slot: activeSlot,
      localX: 100,
      y: 100,
      type: "cluster",
      title: "Nyt Cluster",
      memberIds: ids
    }, slots.length);
    setNodes(prev => [...prev, cl]);
    setMultiSel(new Set());
    setSelNodeId(cl.id);
  }, [multiSel, activeSlot, slots.length]);
  const delNode=useCallback((id)=>{
    const d=getDesc(id,nodes);
    setNodes(prev=>prev
      .filter(n=>!d.has(n.id))
      .map(n=>Array.isArray(n.subNodes)&&n.subNodes.some(c=>d.has(c.id))
        ?{...n,subNodes:n.subNodes.filter(c=>!d.has(c.id))}
        :n)
    );
    setEdges(prev=>prev.filter(e=>!d.has(e.from)&&!d.has(e.to)));
    if(d.has(focusId))setFocusId(null);
    if(d.has(selNodeId))setSelNodeId(null);
  },[nodes,focusId,selNodeId]);

  const copySelected=useCallback(()=>{
    const ids=multiSel.size>0?multiSel:(selNodeId?new Set([selNodeId]):new Set());
    if(ids.size===0)return;
    const copiedNodes=nodes.filter(n=>ids.has(n.id));
    const copiedEdges=edges.filter(e=>ids.has(e.from)&&ids.has(e.to));
    setClipboard({nodes:copiedNodes,edges:copiedEdges});
  },[multiSel,selNodeId,nodes,edges]);

  const pasteClipboard=useCallback((pasteX=null,pasteY=null)=>{
    if(!clipboard||clipboard.nodes.length===0)return;
    // build id remapping
    const idMap={};
    clipboard.nodes.forEach(n=>{idMap[n.id]=uid();});
    // offset: if a paste position is given, center the group there; otherwise +50/+50
    let offX=50,offY=50;
    if(pasteX!=null&&pasteY!=null){
      const minX=Math.min(...clipboard.nodes.map(n=>colX(n.slot)+(n.localX??COL_PAD)));
      const minY=Math.min(...clipboard.nodes.map(n=>n.y));
      offX=pasteX-minX;
      offY=pasteY-minY;
    }
    const newNodes=clipboard.nodes.map(n=>{
      const absX=colX(n.slot)+(n.localX??COL_PAD)+offX;
      const absY=Math.max(0,n.y+offY);
      const slot=Math.min(Math.max(0,slotFromAbsX(absX)),slots.length-1);
      const localX=Math.max(COL_PAD,absX-colX(slot));
      return{...n,id:idMap[n.id],slot,localX,y:absY,parentId:focusId};
    });
    const newEdges=clipboard.edges.map(e=>({
      ...e,id:uid(),from:idMap[e.from],to:idMap[e.to],parentId:focusId,
    }));
    setNodes(prev=>[...prev,...newNodes]);
    setEdges(prev=>[...prev,...newEdges]);
    setMultiSel(new Set(newNodes.map(n=>n.id)));
  },[clipboard,slots,focusId]);

  const addConnectedNode=useCallback((sourceId)=>{
    const source=nodes.find(n=>n.id===sourceId);
    if(!source)return;
    const newNode=makeNode({
      parentId:focusId,
      slot:source.slot,
      localX:(source.localX??COL_PAD),
      y:(source.y??100)+NODE_H+60,
      type:source.type,
      title:"Ny node",
      text:"",
    },slots.length);
    const newEdge=makeEdge({parentId:focusId,from:sourceId,to:newNode.id,operator:"impl",weight:1.0,fromPort:"bottom",toPort:"top"});
    setNodes(prev=>[...prev,newNode]);
    setEdges(prev=>[...prev,newEdge]);
    setSelNodeId(newNode.id);
    setSelEdgeId(null);
  },[nodes,focusId,slots.length]);

  const commitEdge=useCallback((from,to,op,wt,lbl="",fromPort,toPort,ct="default")=>{
    if(!from||!to||from===to)return;

    setEdges(prev=>[...prev,makeEdge({parentId:focusId,from,to,operator:op,weight:wt,label:lbl,fromPort:fromPort??null,toPort:toPort??null,connectorType:ct})]);
  },[edges,focusId]);
  const upEdge =useCallback((id,p)=>setEdges(prev=>prev.map(e=>e.id===id?{...e,...p}:e)),[]);
  const delEdge=useCallback(id=>setEdges(prev=>prev.filter(e=>e.id!==id&&e.from!=='chip:'+id&&e.to!=='chip:'+id)),[]);

  /* ── Interactions ─────────────────────────────── */
  const onNodeClick=useCallback((nodeId)=>{
    setSelEdgeId(null);setSelNodeId(nodeId);
    if(!multiSel.has(nodeId))setMultiSel(new Set());
    if(mode==="connect"){
      if(!connFrom)setConnFrom(nodeId);
      else if(connFrom!==nodeId){setPending({from:connFrom,to:nodeId});setConnFrom(null);}
    }
  },[mode,connFrom,multiSel]);
  const onEdgeClick=useCallback(id=>{setSelEdgeId(id);setSelNodeId(null);},[]);
  const onDblCanvas=useCallback((ax,ay)=>{
    const slot=Math.min(slots.length-1,slotFromAbsX(ax));
    const localX=Math.max(COL_PAD, Math.min(NODE_W-COL_PAD, ax - colX(slot)));
    addNode({slot,localX,y:ay-NODE_H/2});
  },[slots.length,addNode]);

  const onMultiDragStart=useCallback((leadId)=>{
    if(multiSel.size<2)return;
    const m=new Map();
    nodes.forEach(n=>{if(multiSel.has(n.id))m.set(n.id,{absX:colX(n.slot)+(n.localX??COL_PAD),absY:n.y});});
    multiDragStartRef.current=m;
  },[multiSel,nodes]);

  const onMultiSelect=useCallback(ids=>{
    setMultiSel(new Set(ids));
    if(ids.length>0){setSelNodeId(null);setSelEdgeId(null);}
  },[]);

  /* Reroute edges touching any of the given node IDs using updated nodes array */
  const rerouteEdgesForNodes=useCallback((updatedNodes,movedIds)=>{
    const idSet=new Set(movedIds);
    setEdges(prev=>prev.map(e=>{
      const chipFrom=e.from?.startsWith('chip:'),chipTo=e.to?.startsWith('chip:');
      if(chipFrom||chipTo)return e; // skip meta-edges
      if(!idSet.has(e.from)&&!idSet.has(e.to))return e;
      const fn=updatedNodes.find(n=>n.id===e.from);
      const tn=updatedNodes.find(n=>n.id===e.to);
      if(!fn||!tn)return e;
      const bp=bestPorts(fn,tn,updatedNodes);
      return{
        ...e,
        fromPort: e.fromLocked ? e.fromPort : bp.fromPort,
        toPort: e.toLocked ? e.toPort : bp.toPort
      };
    }));
  },[setEdges]);

  const onMoveNode=useCallback((id,absX,y)=>{
    setNodes(prev=>{
      const node = prev.find(n=>n.id===id);
      if(!node)return prev;
      
      const b = getNodeBounds(node, prev);
      const dx = absX - b.x, dy = y - b.y;
      
      // If movement is negligible, avoid unnecessary state updates
      if(Math.abs(dx) < 0.01 && Math.abs(dy) < 0.01) return prev;

      const movedIds = new Set();
      if(node.type==="cluster"){
        movedIds.add(id);
        (node.memberIds??[]).forEach(mid=>movedIds.add(mid));
      } else if(multiSel.has(id)){
        prev.forEach(n=>{if(multiSel.has(n.id))movedIds.add(n.id);});
      } else {
        movedIds.add(id);
      }

      const next = prev.map(n=>{
        if(!movedIds.has(n.id))return n;
        const nAX = (colX(n.slot)+(n.localX??COL_PAD)) + dx;
        const nAY = Math.max(0, n.y + dy);
        const slot = Math.min(slots.length-1, Math.max(0, slotFromAbsX(nAX)));
        const localX = Math.max(0, nAX - colX(slot));
        return {...n, slot, localX, y:nAY};
      });
      
      // Note: rerouteEdgesForNodes triggers a setEdges update which is technically a side effect
      // but keeping it here for immediate visual feedback during drag as it was before.
      // However, we call it with the 'next' nodes we just computed.
      setTimeout(() => rerouteEdgesForNodes(next, Array.from(movedIds)), 0);
      
      return next;
    });
    
    const s = Math.min(slots.length-1, Math.max(0, slotFromAbsX(absX)));
    if(s !== activeSlot) setActiveSlot(s);
  },[multiSel,slots.length,activeSlot,rerouteEdgesForNodes]);

  const onResizeNode=useCallback((id,w,h,absX,absY)=>{
    const slot=Math.min(slots.length-1,Math.max(0,slotFromAbsX(absX)));
    const localX=Math.max(0, absX - colX(slot));
    upNode(id,{slot,localX,y:Math.max(0,absY),width:Math.round(w),height:Math.round(h)});
  },[slots.length,upNode]);

  const onDropImage=useCallback((dataUrl,x,y)=>{

    img.onload=()=>{

      const W=200, H=Math.round(W/aspect);
      const slot=Math.min(slots.length-1,Math.max(0,slotFromAbsX(x)));
      const localX=Math.max(0, x - colX(slot));
      addNode({type:"image",imgSrc:dataUrl,width:W,height:H,slot,localX,y:Math.max(0,y-H/2),title:"Billede",confidence:1});
    };
    img.src=dataUrl;
  },[slots.length,addNode]);

  const nav=useCallback(id=>{setFocusId(id);setConnFrom(null);setPending(null);setDragConn(null);setPan({x:20,y:30});},[]);

  const updateDragConn=useCallback((cx,cy,targetId,targetPort,hoverChipEdgeId,hoverChipX,hoverChipY)=>{

      dragConnRef.current=next; return next;
    });
  },[]);
  const finishDragConn=useCallback(()=>{
    const d=dragConnRef.current; // synchronously up-to-date — always reflects last onPointerMove
    dragConnRef.current=null; setDragConn(null);
    if(!d)return;
    const{fromId,fromPort,hoverTargetId,hoverPort,chipEdgeId,hoverChipEdgeId}=d;
    if(chipEdgeId&&hoverTargetId){
      setPending({from:'chip:'+chipEdgeId,fromPort:'right',to:hoverTargetId,toPort:hoverPort??'left'});
    }else if(hoverChipEdgeId&&fromId){
      setPending({from:fromId,fromPort:fromPort??'right',to:'chip:'+hoverChipEdgeId,toPort:'left'});
    }else if(fromId&&hoverTargetId&&fromId!==hoverTargetId){
      // Auto-commit with default implicerer at 100% — no EdgePicker popup

  /* ── Import/export ────────────────────────────── */
  const exportJson=()=>dl(`${mapTitle.replace(/\s+/g,"_")}.json`,JSON.stringify({mapTitle,slots,nodes,edges},null,2));
  const exportTxt =()=>{

    function w(n,d){L.push("  ".repeat(d)+`[T${n.slot}][${n.type}|${Math.round((strengths[n.id]??0)*100)}%] ${n.title}: ${n.text}`);nodes.filter(c=>c.parentId===n.id).forEach(c=>w(c,d+1));}
    nodes.filter(n=>n.parentId===null).forEach(r=>w(r,0));
    dl(`${mapTitle.replace(/\s+/g,"_")}.txt`,L.join("\n"),"text/plain");
  };
  const importJson=async(e)=>{const f=e.target.files?.[0];if(!f)return;try{const p=JSON.parse(await f.text());if(p.nodes&&p.edges){loadCanvasState({...p,id:p.id||uid(),mapTitle:p.mapTitle||"Argument Map"});}}catch{alert("Fejl.");}e.target.value="";};
  const resetDemo=()=>{const d=buildDemo();setSlots(d.slots);setNodes(d.nodes);setEdges(d.edges);setFocusId(null);setSelNodeId(null);setSelEdgeId(null);setConnFrom(null);setPending(null);setPan({x:20,y:30});setZoom(0.72);};
  const createNewCanvas = useCallback(() => {

  }, [loadCanvasState]);

  // ── Snapshot effect (debounced 400ms) ──────────────────
  useEffect(()=>{

      if(isRestoringRef.current){isRestoringRef.current=false;return;}
      historyRef.current=historyRef.current.slice(0,historyIdxRef.current+1);
      historyRef.current.push({nodes,edges});
      if(historyRef.current.length>80)historyRef.current.shift();

    },400);
    return()=>clearTimeout(histDebounceRef.current);
  },[nodes,edges]);

  const undoHistory=useCallback(()=>{
    if(historyIdxRef.current<=0)return;
    historyIdxRef.current--;

    if(!snap)return;
    isRestoringRef.current=true;
    setNodes(snap.nodes);
    setEdges(snap.edges);
  },[]);

  const redoHistory=useCallback(()=>{
    if(historyIdxRef.current>=historyRef.current.length-1)return;
    historyIdxRef.current++;

    if(!snap)return;
    isRestoringRef.current=true;
    setNodes(snap.nodes);
    setEdges(snap.edges);
  },[]);

  // ── Keyboard shortcuts ──────────────────────────────────
  useEffect(()=>{

      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;
      if(e.key==="Escape"){setMode("select");setConnFrom(null);setPending(null);setDragConn(null);setChipPicker(null);}
      if(e.key==="Delete"||e.key==="Backspace"){if(selNodeId)delNode(selNodeId);if(selEdgeId)delEdge(selEdgeId);}
      if((e.ctrlKey||e.metaKey)&&e.key==="c"){e.preventDefault();copySelected();}
      if((e.ctrlKey||e.metaKey)&&e.key==="v"){e.preventDefault();pasteClipboard();}
      if((e.ctrlKey||e.metaKey)&&e.key==="z"&&!e.shiftKey){e.preventDefault();undoHistory();}
      if((e.ctrlKey||e.metaKey)&&(e.key==="y"||(e.key==="z"&&e.shiftKey))){e.preventDefault();redoHistory();}
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[selNodeId,selEdgeId,delNode,delEdge,copySelected,pasteClipboard,undoHistory,redoHistory]);

        });

        console.error("Belief-map Save Error:", err);
      }
    };

        if (state) applySuiteState(state);
      } catch (err) {
        console.error("Belief-map Load Error:", err);
      }
    };

    window.bus.subscribe("request-state", handleRequestState);

    return () => {
      window.bus.unsubscribe("request-state", handleRequestState);
      window.bus.unsubscribe("load-state", handleLoadState);
    };
  }, [applySuiteState, buildSuiteState]);

  useEffect(() => {

        setSavedCanvases(parsed.map(item => normalizeMapState(item)));
      }
    } catch (err) {
      console.error("Belief-map Library Restore Error:", err);
    }
  }, []);

  useEffect(() => {
    try {
      const current = normalizeMapState({
        ...buildSuiteState(),
        updatedAt: new Date().toISOString()
      });
      if (isDefaultEmptyMap(current)) return;
      setSavedCanvases(prev => {
        const next = [current, ...prev.filter(item => item.id !== current.id)]
          .sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
        localStorage.setItem(STORAGE_KEY_BELIEF_MAP_LIBRARY, JSON.stringify(next));
        return next;
      });
    } catch (err) {
      console.error("Belief-map Library Save Error:", err);
    }
  }, [buildSuiteState]);

    const ms=JSON.stringify({

      edges:visEdges.map(e=>{const fn=visNodes.find(n=>n.id===e.from),tn=visNodes.find(n=>n.id===e.to);return{id:e.id,from:e.from,fromTitle:fn?.title,to:e.to,toTitle:tn?.title,operator:e.operator,weight:e.weight};})
    },null,2);
    const prompt=`Du er en AI-assistent der hjælper med et argumentkort.\n\nKORTTILSTAND:\n${ms}\n\nNODE-TYPER: ${Object.keys(TYPES).join(', ')}\nOPERATORER: ${OPS.map(o=>o.key+'('+o.sym+')').join(', ')}\nSLOTS: ${slots.map((s,i)=>'T'+(i+1)+'="'+s.label+'"').join(', ')}\n\nSMFI-udvidelser: nodes har holonType (entity/disposition/property), ontologiskNiveau (proposition/talehandling/argument/hypotese/selvholon/socialRelation/valens/holon), sandhedsStratum (§F/§M/§E/§P/§D), temporalStatus (past/present/future_planned/future_possible/future_hypothetical), isQuestion. Kanter har operator (→ ↔ ⇒C ⊢ ⊣ →H ∈ ⊢T ⚡ ⊥ ↝ ⊕ ▶ ±), deltaS (0-1 for ⚡/⊥), valence (positive/negative for ±), intensity (0-1 for ±).\n\nBRUGER: ${input}\n\nSvar på dansk. Hvis brugeren beder om kortændringer, inkludér:\n[ACTIONS]\n{"actions":[{"type":"createNode","slot":0,"nodeType":"premise","title":"...","text":"...","confidence":0.7},{"type":"deleteNode","id":"..."},{"type":"updateNode","id":"...","changes":{"title":"...","text":"...","confidence":0.8,"slot":0,"type":"..."}},{"type":"createEdge","from":"...","to":"...","operator":"impl","weight":0.7},{"type":"deleteEdge","id":"..."}]}\n[/ACTIONS]\nKun actions du faktisk udfører. Forklar altid hvad du gør.`;
    try{
      const reply=await callGeminiRaw(prompt);
      const am=reply.match(/\[ACTIONS\]([\s\S]*?)\[\/ACTIONS\]/);
      let display=reply.replace(/\[ACTIONS\][\s\S]*?\[\/ACTIONS\]/,'').trim();
      if(am){
        try{
          const {actions=[]}=JSON.parse(am[1].trim());
          const log=[];
          for(const act of actions){
            if(act.type==='createNode'){addNode({slot:act.slot??activeSlot,type:act.nodeType??'premise',title:act.title??'Ny node',text:act.text??'',confidence:act.confidence??0.5});log.push('✓ Oprettede: "'+act.title+'"');}
            else if(act.type==='deleteNode'){delNode(act.id);log.push('✓ Slettede node');}
            else if(act.type==='updateNode'){upNode(act.id,act.changes??{});log.push('✓ Opdaterede node');}
            else if(act.type==='createEdge'){commitEdge(act.from,act.to,act.operator??'impl',act.weight??0.7,act.label??'',null,null);log.push('✓ Oprettede forbindelse');}
            else if(act.type==='deleteEdge'){delEdge(act.id);log.push('✓ Slettede forbindelse');}
          }
          if(log.length)display+='\n\n'+log.join('\n');
        }catch(pe){display+='\n\n⚠ Kunne ikke parse handlinger: '+pe.message;}
      }
      setAiMsgs(m=>[...m,{role:'ai',text:display}]);
    }catch(err){
      setAiMsgs(m=>[...m,{role:'ai',text:'Fejl: '+err.message}]);
    }finally{setAiLoading(false);}
  },[aiLoading,mapTitle,slots,visNodes,visEdges,strengths,addNode,delNode,upNode,commitEdge,delEdge,activeSlot]);

  const filteredOps=useMemo(()=>OPS.filter(o=>`${o.sym} ${o.label}`.toLowerCase().includes(opQ.toLowerCase())),[opQ]);

  return(

      {!leftOpen&&(

            zIndex:200,background:'var(--panel-bg)',
            border:'1px solid var(--panel-border)',borderLeft:'none',
            borderRadius:'0 8px 8px 0',color:'var(--text-muted)',

          addConnectedNode={addConnectedNode}

          onDropImage={onDropImage}
          onResizeNode={onResizeNode}

          onCluster={clusterSelected}

      </div>

      {rightOpen&&<RightPanel node={selNode} edge={selEdge} visNodes={visNodes} cc={selNode?cc(selNode.id):0}

      {!rightOpen&&(

          style={{position:'fixed',right:0,top:'50%',transform:'translateY(-50%)',

      {deleteCanvasPrompt&&(
        <ConfirmDialog
          title="Slet canvas?"

/* ══════════════════════════════════════════════════════════
   IMAGE NODE CARD
══════════════════════════════════════════════════════════ */
function ImageNodeCard({node,selected,zoom,onClick,onMove,onConnStart,dragConnActive,isHoverTarget,onResize,isMultiSelected,onMultiDragStart}){
  const drag=useRef(null);
  const resizeDrag=useRef(null);
  const cardRef=useRef(null);
  const absX=colX(node.slot)+(node.localX??COL_PAD);
  const absY=node.y;
  const W=node.width??200;
  const H=node.height??150;

  const onPD=(e)=>{
    if(e.target.closest?.('[data-handle]')||e.target.closest?.('[data-resize]'))return;
    e.stopPropagation();
    drag.current={sx:e.clientX,sy:e.clientY,ax:absX,ay:absY,moved:false};
    if(isMultiSelected)onMultiDragStart?.();
    e.currentTarget.setPointerCapture(e.pointerId);
  };
  const onPM=(e)=>{
    if(resizeDrag.current&&e.buttons===1){
      const{sx,sy,ax0,ay0,w0,h0,dir}=resizeDrag.current;
      const dx=(e.clientX-sx)/zoom,dy=(e.clientY-sy)/zoom;
      let nX=ax0,nY=ay0,nW=w0,nH=h0;
      if(dir.includes("e"))nW=Math.max(60,w0+dx);
      if(dir.includes("s"))nH=Math.max(40,h0+dy);
      if(dir.includes("w")){nW=Math.max(60,w0-dx);nX=ax0+dx;}
      if(dir.includes("n")){nH=Math.max(40,h0-dy);nY=ay0+dy;}
      onResize(nW,nH,nX,nY);
      return;
    }
    if(!drag.current||e.buttons!==1)return;
    const dx=(e.clientX-drag.current.sx)/zoom,dy=(e.clientY-drag.current.sy)/zoom;
    if(Math.abs(dx)>2||Math.abs(dy)>2)drag.current.moved=true;
    onMove(Math.max(0,drag.current.ax+dx),Math.max(0,drag.current.ay+dy));
  };
  const onPU=(e)=>{
    e.stopPropagation();
    if(resizeDrag.current){resizeDrag.current=null;return;}
    if(e.target.closest?.('[data-handle]')||e.target.closest?.('[data-resize]')){drag.current=null;return;}
    if(!drag.current?.moved)onClick();
    drag.current=null;
  };

  const hStyle=(snap)=>({
    position:"absolute",transform:"translate(-50%,-50%)",
    width:8,height:8,borderRadius:"50%",
    background:snap?"#10b981":"#94a3b8",
    border:"1.5px solid #07090f",cursor:"crosshair",zIndex:20,
    boxShadow:snap?"0 0 6px #10b98199":"0 0 3px #94a3b888",
    opacity:dragConnActive?(snap?1:0.40):0.80,
  });
  const connHandles=[
    {lx:W/2,  ly:-4,  cx:absX+W/2, cy:absY,     port:"top"},
    {lx:W+4,  ly:H/2, cx:absX+W,   cy:absY+H/2, port:"right"},
    {lx:W/2,  ly:H+4, cx:absX+W/2, cy:absY+H,   port:"bottom"},
    {lx:-4,   ly:H/2, cx:absX,     cy:absY+H/2, port:"left"},
  ];

  const startResize=(e,dir)=>{
    e.stopPropagation();e.preventDefault();
    // Capture on the card so onPM/onPU receive all events directly
    if(cardRef.current)cardRef.current.setPointerCapture(e.pointerId);
    resizeDrag.current={sx:e.clientX,sy:e.clientY,ax0:absX,ay0:absY,w0:W,h0:H,dir};
  };

  const rS={position:"absolute",width:8,height:8,borderRadius:2,background:"#f97316",border:"1.5px solid #07090f",zIndex:30,transform:"translate(-50%,-50%)"};
  const resizeHandles=selected?[
    {s:"nw",lx:0,  ly:0,  c:"nw-resize"},{s:"n",lx:W/2,ly:0,  c:"n-resize"}, {s:"ne",lx:W,  ly:0,  c:"ne-resize"},
    {s:"e", lx:W,  ly:H/2,c:"e-resize"}, {s:"se",lx:W,  ly:H,  c:"se-resize"},{s:"s", lx:W/2,ly:H,  c:"s-resize"},
    {s:"sw",lx:0,  ly:H,  c:"sw-resize"},{s:"w", lx:0,  ly:H/2,c:"w-resize"},
  ]:[];

  return(
    <div ref={cardRef} onPointerDown={onPD} onPointerMove={onPM} onPointerUp={onPU}
      style={{position:"absolute",left:absX,top:absY,width:W,height:H,
        border:`2px ${selected?"dashed #f97316":isHoverTarget?"solid #10b981":isMultiSelected?"solid #3b82f6":"solid transparent"}`,
        borderRadius:4,cursor:"grab",userSelect:"none",overflow:"visible",
        boxShadow:selected?"0 0 0 2px #f9731444":isHoverTarget?"0 0 0 3px #10b98155":"0 2px 12px rgba(0,0,0,0.5)"}}>
      <img src={node.imgSrc} alt="" draggable={false}
        style={{width:"100%",height:"100%",objectFit:"cover",display:"block",borderRadius:3,pointerEvents:"none"}}/>
      {connHandles.map((h,i)=>(
        <div key={i} data-handle="1" style={{...hStyle(isHoverTarget),left:h.lx,top:h.ly}}
          onPointerDown={e=>{e.stopPropagation();e.preventDefault();e.currentTarget.setPointerCapture?.(e.pointerId);onConnStart(node.id,h.cx,h.cy,h.port);}}/>
      ))}
      {resizeHandles.map(h=>(
        <div key={h.s} data-resize="1" style={{...rS,left:h.lx,top:h.ly,cursor:h.c}}
          onPointerDown={e=>startResize(e,h.s)}/>
      ))}
    </div>
  );
}

function Canvas({nodes,edges,strengths,slots,activeSlot,setActiveSlot,selNodeId,selEdgeId,connFrom,zoom,pan,setPan,setZoom,mode,onNodeClick,onEdgeClick,onDblCanvas,onMoveNode,onOpenNested,cc,dragConn,onConnStart,onConnUpdate,onConnEnd,onUpEdge,onDelEdge,onChipOpen,onChipClose,chipPickerId,onOpenPropTester,addChildNode,addConnectedNode,onDelNode,onDropImage,onResizeNode,multiSel,onMultiSelect,onMultiDragStart,showEdgeLabels=true,onUpNode,clipboard,onCopy,onPaste,onToggleLock,onCluster}){
  const [ctxMenu,setCtxMenu]=React.useState(null);   // {nodeId, x, y}
  const [ctxConfirm,setCtxConfirm]=React.useState(null); // nodeId

  React.useEffect(()=>{
    if(!ctxMenu)return;
    const close=()=>setCtxMenu(null);
    window.addEventListener("pointerdown",close);
    return()=>window.removeEventListener("pointerdown",close);
  },[ctxMenu]);

  const ctxMenuStyle={display:"block",width:"100%",textAlign:"left",padding:"7px 14px",
    background:"transparent",border:"none",cursor:"pointer",fontSize:12,fontFamily:"inherit",color:"var(--text-main)"};
  const ctxSep={height:1,background:"var(--panel-border)",margin:"3px 0"};
  const ref=useRef(null);
  const panR=useRef(null);
  const [selRect,setSelRect]=useState(null);
  const toCanvas=(cx,cy)=>{const r=ref.current.getBoundingClientRect();return{x:(cx-r.left-pan.x)/zoom,y:(cy-r.top-pan.y)/zoom};};
  const handleDragOver=(e)=>{if(e.dataTransfer.types.includes("Files"))e.preventDefault();};
  const handleDrop=(e)=>{
    e.preventDefault();
    const file=[...e.dataTransfer.files].find(f=>f.type.startsWith("image/"));
    if(!file||!onDropImage)return;
    const{x,y}=toCanvas(e.clientX,e.clientY);
    const reader=new FileReader();
    reader.onload=(ev)=>onDropImage(ev.target.result,x,y);
    reader.readAsDataURL(file);
  };
  const findDragHover=useCallback((x,y,dragState)=>{
    let bestId=null,bestPort=null,bestDist=28;
    nodes.forEach(n=>{
      if(n.id===dragState?.fromId)return;
      const nx=colX(n.slot)+(n.localX??COL_PAD),ny=n.y;
      const nW=n.type==="image"?(n.width??200):NODE_W, nH=n.type==="image"?(n.height??150):NODE_H;
      const pts=n.type==="junction"
        ?[{hx:nx+JUNC_R,hy:ny,p:"top"},{hx:nx+JUNC_R*2,hy:ny+JUNC_R,p:"right"},{hx:nx+JUNC_R,hy:ny+JUNC_R*2,p:"bottom"},{hx:nx,hy:ny+JUNC_R,p:"left"}]
        :[{hx:nx+nW/2,hy:ny,p:"top"},{hx:nx+nW,hy:ny+nH/2,p:"right"},{hx:nx+nW/2,hy:ny+nH,p:"bottom"},{hx:nx,hy:ny+nH/2,p:"left"}];
      pts.forEach(pt=>{const d=Math.hypot(x-pt.hx,y-pt.hy);if(d<bestDist){bestDist=d;bestId=n.id;bestPort=pt.p;}});
    });
    let bestChipEdgeId=null,bestChipX=null,bestChipY=null,bestChipDist=22;
    edges.forEach(edge=>{
      const fn=nodes.find(n=>n.id===edge.from),tn=nodes.find(n=>n.id===edge.to);
      if(!fn||!tn)return;
      const ap=edge.fromPort?handlePos(fn,edge.fromPort):nodeCenter(fn);
      const bp=edge.toPort?handlePos(tn,edge.toPort):nodeCenter(tn);
      const fPort=edge.fromPort||"right",tPort=edge.toPort||"left";
      const dx2=bp.x-ap.x,dy2=bp.y-ap.y;
      const off=Math.max(60,Math.abs(dx2)*0.45,Math.abs(dy2)*0.45);
      const pOff=(p)=>p==="right"?{ox:off,oy:0}:p==="left"?{ox:-off,oy:0}:p==="top"?{ox:0,oy:-off}:{ox:0,oy:off};
      const fo=pOff(fPort),to2=pOff(tPort);
      const cp1x=ap.x+fo.ox,cp1y=ap.y+fo.oy,cp2x=bp.x+to2.ox,cp2y=bp.y+to2.oy;
      const cx2=0.125*ap.x+0.375*cp1x+0.375*cp2x+0.125*bp.x;
      const cy2=0.125*ap.y+0.375*cp1y+0.375*cp2y+0.125*bp.y;
      for(const hx of [0,-32,32]){
        const d=Math.hypot(x-(cx2+hx),y-cy2);
        if(d<bestChipDist){bestChipDist=d;bestChipEdgeId=edge.id;bestChipX=cx2;bestChipY=cy2;}
      }
    });
    if(bestChipEdgeId&&bestChipDist<bestDist){
      return{targetId:null,targetPort:null,chipEdgeId:bestChipEdgeId,chipX:bestChipX,chipY:bestChipY};
    }
    return{targetId:bestId,targetPort:bestPort,chipEdgeId:null,chipX:null,chipY:null};
  },[nodes,edges]);
  const onBgDown=(e)=>{
    const isBg=e.target===ref.current||!!e.target.dataset.bg;
    if(!isBg)return;
    if(chipPickerId){onChipClose();return;}
    if(mode==="connect"||dragConn)return;
    if(e.shiftKey){
      const{x,y}=toCanvas(e.clientX,e.clientY);
      setSelRect({x1:x,y1:y,x2:x,y2:y});
      e.currentTarget.setPointerCapture(e.pointerId);
      return;
    }
    onMultiSelect?.([]);
    panR.current={sx:e.clientX,sy:e.clientY,px:pan.x,py:pan.y};
    if(ref.current)ref.current.style.cursor="grabbing";
    e.currentTarget.setPointerCapture(e.pointerId);
  };
  const onBgMove=(e)=>{
    if(selRect){const{x,y}=toCanvas(e.clientX,e.clientY);setSelRect(r=>({...r,x2:x,y2:y}));return;}
    if(!panR.current)return;
    setPan({x:panR.current.px+e.clientX-panR.current.sx,y:panR.current.py+e.clientY-panR.current.sy});
  };
  const onBgUp=(e)=>{
    if(selRect){
      const minX=Math.min(selRect.x1,selRect.x2),maxX=Math.max(selRect.x1,selRect.x2);
      const minY=Math.min(selRect.y1,selRect.y2),maxY=Math.max(selRect.y1,selRect.y2);
      const ids=nodes.filter(n=>{
        const nx=colX(n.slot)+(n.localX??COL_PAD),ny=n.y;
        const nW=n.type==="image"?(n.width??200):NODE_W,nH=n.type==="image"?(n.height??150):NODE_H;
        return nx+nW/2>=minX&&nx+nW/2<=maxX&&ny+nH/2>=minY&&ny+nH/2<=maxY;
      }).map(n=>n.id);
      onMultiSelect?.(ids);
      setSelRect(null);
      return;
    }
    panR.current=null;
    if(ref.current)ref.current.style.cursor=mode==="connect"?"crosshair":"grab";
  };
  const onDbl=(e)=>{if(e.target!==ref.current&&!e.target.dataset.bg)return;const{x,y}=toCanvas(e.clientX,e.clientY);onDblCanvas(x,y);};
  useEffect(()=>{
    const el=ref.current;
    const h=(e)=>{e.preventDefault();const r=el.getBoundingClientRect();const cx=e.clientX-r.left,cy=e.clientY-r.top;const f=e.deltaY<0?1.1:0.9;const nz=Math.max(0.2,Math.min(2.5,zoom*f));const vx=(cx-pan.x)/zoom,vy=(cy-pan.y)/zoom;setPan({x:cx-vx*nz,y:cy-vy*nz});setZoom(nz);};
    el.addEventListener("wheel",h,{passive:false});return()=>el.removeEventListener("wheel",h);
  },[zoom,pan]);
  useEffect(()=>{
    if(!dragConn)return;
    const handleMove=(e)=>{
      if(!ref.current)return;
      const {x,y}=toCanvas(e.clientX,e.clientY);
      const hover=findDragHover(x,y,dragConn);
      onConnUpdate(x,y,hover.targetId,hover.targetPort,hover.chipEdgeId,hover.chipX,hover.chipY);
    };
    const handleUp=()=>onConnEnd();
    window.addEventListener("pointermove",handleMove);
    window.addEventListener("pointerup",handleUp);
    return()=>{
      window.removeEventListener("pointermove",handleMove);
      window.removeEventListener("pointerup",handleUp);
    };
  },[dragConn,toCanvas,findDragHover,onConnUpdate,onConnEnd]);

  const totalW = slots.length * COL_W + 200;
  const totalH = 1800;

  return(
    <div ref={ref} style={{flex:1,minHeight:0,background:"var(--canvas-bg)",borderRadius:10,border:"1px solid var(--panel-border)",position:"relative",overflow:"hidden",cursor:mode==="connect"?"crosshair":"grab"}}
      onPointerDown={onBgDown} onPointerMove={onBgMove} onPointerUp={onBgUp} onDoubleClick={onDbl}
      onDragOver={handleDragOver} onDrop={handleDrop}
      onContextMenu={e=>{if(e.target.closest('.ndrag'))return;e.preventDefault();setCtxMenu({nodeId:null,x:e.clientX,y:e.clientY,canvasX:(e.clientX-(ref.current?.getBoundingClientRect().left??0)-pan.x)/zoom,canvasY:(e.clientY-(ref.current?.getBoundingClientRect().top??0)-pan.y)/zoom});}}>
      {/* Dot grid bg */}
      <div data-bg="1" style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle,var(--canvas-dot) 1px,transparent 1px)",backgroundSize:"24px 24px",pointerEvents:"none"}}/>

      <div data-bg="1" style={{position:"absolute",inset:0,transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`,transformOrigin:"0 0"}}>

        {/* ── TIMELINE COLUMN VISUALS ─────────────────── */}
        {slots.map((slot,i)=>{
          const x=colX(i);
          const isActive=activeSlot===i;
          const isOdd=i%2===1;
          return(
            <g key={slot.id}>
              {/* Column background stripe */}
              <div style={{
                position:"absolute",left:x,top:-HDR_H,width:COL_W,height:totalH+HDR_H,
                background:isActive?"rgba(249,115,22,0.03)":isOdd?"rgba(255,255,255,0.008)":"transparent",
                borderLeft:i===0?"none":`1px solid #1e293b`,
                pointerEvents:"none",
              }}/>
              {/* Column header */}
              <div
                onClick={()=>setActiveSlot(i)}
                style={{
                  position:"absolute",left:x,top:-HDR_H,width:COL_W,height:HDR_H-4,
                  display:"flex",alignItems:"center",gap:6,padding:"0 12px",
                  cursor:"pointer",
                  borderBottom:`2px solid ${isActive?"#f97316":"#1e293b"}`,
                background:isActive?"rgba(249,115,22,0.06)":"color-mix(in srgb, var(--canvas-bg) 88%, transparent)",
              }}>
                <span style={{fontSize:10,color:"var(--text-soft)",fontWeight:800}}>T{i+1}</span>
                <span style={{fontSize:12,fontWeight:isActive?700:500,color:isActive?"#f97316":"var(--text-muted)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{slot.label}</span>
                {/* Node count in slot */}
                <span style={{fontSize:9,color:"var(--panel-border)"}}>{nodes.filter(n=>n.slot===i).length}</span>
              </div>
              {/* Vertical divider arrow hint at right edge */}
              {i<slots.length-1&&(
                <div style={{position:"absolute",left:x+COL_W-12,top:-HDR_H+16,fontSize:11,color:"#f9731644",pointerEvents:"none",userSelect:"none"}}>→</div>
              )}
            </g>
          );
        })}

        {/* ── SELECTION RECT ──────────────────────────── */}
        {selRect&&<div style={{position:"absolute",
          left:Math.min(selRect.x1,selRect.x2),top:Math.min(selRect.y1,selRect.y2),
          width:Math.abs(selRect.x2-selRect.x1),height:Math.abs(selRect.y2-selRect.y1),
          border:"1.5px dashed #3b82f6",background:"rgba(59,130,246,0.07)",
          borderRadius:3,pointerEvents:"none",zIndex:500}}/>}

        {/* ── SVG EDGES ───────────────────────────────── */}
        <EdgeLayer edges={edges} nodes={nodes} selEdgeId={selEdgeId} strengths={strengths}
          onChipClick={(id,e)=>{onEdgeClick(id);onChipOpen(id,e.clientX,e.clientY);}}
          dragConn={dragConn} selChipId={chipPickerId}
          onChipDragStart={(edgeId,chipCanvasX,chipCanvasY)=>onConnStart(null,chipCanvasX,chipCanvasY,'right',{chipEdgeId:edgeId,chipCanvasX,chipCanvasY})}
          showEdgeLabels={showEdgeLabels}
          onToggleLock={onToggleLock}
        />

        {/* ── NODES ───────────────────────────────────── */}
        {nodes.map(node=>node.type==="cluster" && (
          <ClusterCard key={node.id} node={node} nodes={nodes}
            selected={node.id===selNodeId} zoom={zoom}
            onClick={()=>onNodeClick(node.id)}
            onMove={(absX,y)=>onMoveNode(node.id,absX,y)}
            onConnStart={onConnStart}
            dragConnActive={!!dragConn}
            isHoverTarget={dragConn?.hoverTargetId===node.id}
            isMultiSelected={multiSel?.has(node.id)}
            onMultiDragStart={()=>onMultiDragStart?.(node.id)}
            onUpNode={(p)=>onUpNode?.(node.id,p)}
          />
        ))}

        {nodes.map(node=>node.type==="image"?(
          <ImageNodeCard key={node.id} node={node}
            selected={node.id===selNodeId} zoom={zoom}
            onClick={()=>onNodeClick(node.id)}
            onMove={(absX,y)=>onMoveNode(node.id,absX,y)}
            onConnStart={onConnStart}
            dragConnActive={!!dragConn}
            isHoverTarget={dragConn?.hoverTargetId===node.id}
            onResize={(w,h,ax,ay)=>onResizeNode(node.id,w,h,ax,ay)}
            isMultiSelected={multiSel?.has(node.id)}
            onMultiDragStart={()=>onMultiDragStart?.(node.id)}
          />
        ):(
          <NodeCard key={node.id} node={node}
            selected={node.id===selNodeId} connecting={node.id===connFrom}
            isMultiSelected={multiSel?.has(node.id)}
            onMultiDragStart={()=>onMultiDragStart?.(node.id)}
            childCount={cc(node.id)} zoom={zoom} strength={strengths[node.id]??0}
            onClick={()=>onNodeClick(node.id)}
            onOpenNested={()=>onOpenNested(node.id)}
            onCreateChild={(id)=>addChildNode(id??node.id)}
            onMove={(absX,y)=>onMoveNode(node.id,absX,y)}
            onConnStart={onConnStart}
            dragConnActive={!!dragConn}
            isHoverTarget={dragConn?.hoverTargetId===node.id}
            onOpenPropTester={onOpenPropTester}
            selNodeId={selNodeId}
            onSubNodeClick={(id)=>onNodeClick(id)}
            onOpenSubNested={(id)=>onOpenNested(id)}
            onUpNode={(p)=>onUpNode?.(node.id,p)}
            onCtxMenu={(e)=>{e.preventDefault();e.stopPropagation();setCtxMenu({nodeId:node.id,x:e.clientX,y:e.clientY});}}
          />
        ))}
        {/* ── LOCK OVERLAY (on top of nodes) ────────── */}
        <LockUI edges={edges} nodes={nodes} onToggleLock={onToggleLock} />
      </div>

      {/* ── DRAG-CONN OVERLAY ───────────────────────── */}
      {dragConn&&(
        <div style={{position:"absolute",inset:0,zIndex:100,cursor:"crosshair"}}/>
      )}

      {nodes.length===0&&(
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
          <div style={{textAlign:"center",color:"var(--text-soft)"}}><div style={{fontSize:36}}>◈</div><div style={{fontSize:11,marginTop:4}}>Dobbeltklik for at tilføje en node</div></div>
        </div>
      )}

      {/* ── CONTEXT MENU ───────────────────────────── */}
      {ctxMenu&&(
        <div onPointerDown={e=>e.stopPropagation()}
          style={{position:"fixed",left:ctxMenu.x,top:ctxMenu.y,zIndex:9999,
            background:"var(--panel-bg)",border:"1px solid var(--panel-border)",
            borderRadius:9,padding:"4px 0",minWidth:190,
            boxShadow:"0 8px 32px rgba(0,0,0,0.85)",fontFamily:"inherit"}}>
          {ctxMenu.nodeId?(
            <>
              <button style={ctxMenuStyle} onMouseEnter={e=>e.currentTarget.style.background="var(--panel-border)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                onClick={()=>{addConnectedNode&&addConnectedNode(ctxMenu.nodeId);setCtxMenu(null);}}>
                + Tilføj datternode
              </button>
              <button style={ctxMenuStyle} onMouseEnter={e=>e.currentTarget.style.background="var(--panel-border)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                onClick={()=>{onCopy&&onCopy();setCtxMenu(null);}}>
                ⎘ Kopiér node(r)  <span style={{float:"right",opacity:0.5,fontSize:10}}>Ctrl+C</span>
              </button>
              {multiSel.size > 1 && (
                <button style={ctxMenuStyle} onMouseEnter={e=>e.currentTarget.style.background="var(--panel-border)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                  onClick={()=>{onCluster&&onCluster();setCtxMenu(null);}}>
                  ⬚ Opret Cluster
                </button>
              )}
              {clipboard&&clipboard.nodes.length>0&&(
                <button style={ctxMenuStyle} onMouseEnter={e=>e.currentTarget.style.background="var(--panel-border)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                  onClick={()=>{onPaste&&onPaste(ctxMenu.canvasX,ctxMenu.canvasY);setCtxMenu(null);}}>
                  ⎗ Sæt ind  <span style={{float:"right",opacity:0.5,fontSize:10}}>Ctrl+V</span>
                </button>
              )}
              <div style={ctxSep}/>
              <button style={{...ctxMenuStyle,color:"#f87171"}} onMouseEnter={e=>e.currentTarget.style.background="#7f1d1d44"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                onClick={()=>{setCtxConfirm(ctxMenu.nodeId);setCtxMenu(null);}}>
                🗑 Slet node
              </button>
            </>
          ):(
            <>
              {clipboard&&clipboard.nodes.length>0?(
                <button style={ctxMenuStyle} onMouseEnter={e=>e.currentTarget.style.background="var(--panel-border)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                  onClick={()=>{onPaste&&onPaste(ctxMenu.canvasX,ctxMenu.canvasY);setCtxMenu(null);}}>
                  ⎗ Sæt ind  <span style={{marginLeft:24,opacity:0.5,fontSize:10}}>Ctrl+V</span>
                </button>
              ):(
                <div style={{...ctxMenuStyle,opacity:0.4,cursor:"default",pointerEvents:"none"}}>Intet kopieret endnu</div>
              )}
            </>
          )}
        </div>
      )}

      {/* ── DELETE CONFIRMATION ─────────────────────── */}
      {ctxConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",zIndex:10000,
          display:"flex",alignItems:"center",justifyContent:"center"}}
          onPointerDown={()=>setCtxConfirm(null)}>
          <div onPointerDown={e=>e.stopPropagation()}
            style={{background:"var(--panel-bg)",border:"1px solid #7f1d1d",borderRadius:14,
              padding:"24px 28px",maxWidth:360,textAlign:"center",
              boxShadow:"0 12px 48px rgba(0,0,0,0.95)"}}>
            <div style={{fontSize:22,marginBottom:10}}>🗑</div>
            <div style={{fontSize:14,fontWeight:800,color:"var(--text-main)",marginBottom:8}}>Slet node?</div>
            <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:20}}>Er du sikker på, du vil slette noden? Denne handling kan ikke fortrydes.</div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>{onDelNode&&onDelNode(ctxConfirm);setCtxConfirm(null);}}
                style={{padding:"8px 20px",borderRadius:8,border:"none",background:"#ef4444",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>
                Ja, slet
              </button>
              <button onClick={()=>setCtxConfirm(null)}
                style={{padding:"8px 20px",borderRadius:8,border:"1px solid var(--panel-border)",background:"transparent",color:"var(--text-main)",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"inherit"}}>
                Annuller
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* Helper: compute canvas-space midpoint of a chip edge */
function chipMidpoint(edgeId,edges,nodes){
  const e=edges.find(ed=>ed.id===edgeId);if(!e)return null;
  const fn=nodes.find(n=>n.id===e.from),tn=nodes.find(n=>n.id===e.to);if(!fn||!tn)return null;
  const ap=e.fromPort?handlePos(fn,e.fromPort,nodes):nodeCenter(fn,nodes);
  const bp=e.toPort?handlePos(tn,e.toPort,nodes):nodeCenter(tn,nodes);
  const dx=bp.x-ap.x,dy=bp.y-ap.y;
  const fP=e.fromPort||"right",tP=e.toPort||"left";
  const hBase=Math.max(40,Math.abs(dx)*0.45),vBase=Math.max(40,Math.abs(dy)*0.45);
  const pOff=(p)=>{
    if(fP==="right"&&tP==="left"){
      if(dx>=0){const h=Math.max(15,Math.min(dx*0.48,120));return p==="right"?{ox:h,oy:0}:{ox:-h,oy:0};}
      else{const arch=Math.abs(dx)*0.4+80;return p==="right"?{ox:40,oy:-arch}:{ox:-40,oy:-arch};}
    }
    return p==="right"?{ox:hBase,oy:0}:p==="left"?{ox:-hBase,oy:0}:p==="top"?{ox:0,oy:-vBase}:{ox:0,oy:vBase};
  };
  const fo=pOff(fP),to2=pOff(tP);
  const cp1x=ap.x+fo.ox,cp1y=ap.y+fo.oy,cp2x=bp.x+to2.ox,cp2y=bp.y+to2.oy;
  const t=0.5,mt=0.5;
  return{x:mt*mt*mt*ap.x+3*mt*mt*t*cp1x+3*mt*t*t*cp2x+t*t*t*bp.x,
         y:mt*mt*mt*ap.y+3*mt*mt*t*cp1y+3*mt*t*t*cp2y+t*t*t*bp.y};
}

/* ══════════════════════════════════════════════════════════
   EDGE LAYER
══════════════════════════════════════════════════════════ */
function EdgeLayer({edges,nodes,selEdgeId,strengths,onChipClick,dragConn,selChipId,onChipDragStart,showEdgeLabels=true,onToggleLock}){
  return(
    <svg style={{position:"absolute",left:0,top:-HDR_H,width:8000,height:6000,overflow:"visible",pointerEvents:"none"}}>
      <defs>
        <marker id="arrO"   markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#f97316"/></marker>
        <marker id="arrO_r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto-start-reverse"><polygon points="0 0,9 3,0 6" fill="#f97316"/></marker>
        <marker id="arrOs"  markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="rgba(249,115,22,0.4)"/></marker>
        <marker id="arrOs_r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto-start-reverse"><polygon points="0 0,9 3,0 6" fill="rgba(249,115,22,0.4)"/></marker>
        <marker id="arrG"   markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#16a34a"/></marker>
        <marker id="arrG_r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto-start-reverse"><polygon points="0 0,9 3,0 6" fill="#16a34a"/></marker>
        <marker id="arrSl"  markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#94a3b8"/></marker>
        <marker id="arrSl_r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto-start-reverse"><polygon points="0 0,9 3,0 6" fill="#94a3b8"/></marker>
        <marker id="arrPu"  markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#a855f7"/></marker>
        <marker id="arrPu_r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto-start-reverse"><polygon points="0 0,9 3,0 6" fill="#a855f7"/></marker>
        <marker id="arrRed" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="rgba(239,68,68,0.85)"/></marker>
        <marker id="arrRed_r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto-start-reverse"><polygon points="0 0,9 3,0 6" fill="rgba(239,68,68,0.85)"/></marker>
        {EDGE_COLORS.map(c=>[
          <marker key={c.key}     id={`arr_${c.key}`}   markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill={c.color}/></marker>,
          <marker key={c.key+"r"} id={`arr_${c.key}_r`} markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto-start-reverse"><polygon points="0 0,9 3,0 6" fill={c.color}/></marker>,
        ])}
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      {edges.map(edge=>{
        const isChipFrom=edge.from?.startsWith('chip:');
        const isChipTo  =edge.to?.startsWith('chip:');
        const from=isChipFrom?null:nodes.find(n=>n.id===edge.from);
        const to  =isChipTo  ?null:nodes.find(n=>n.id===edge.to);
        let ap,bp;
        if(isChipFrom){const cm=chipMidpoint(edge.from.slice(5),edges,nodes);if(!cm)return null;ap=cm;}
        else{if(!from)return null;ap=edge.fromPort?handlePos(from,edge.fromPort,nodes):nodeCenter(from,nodes);}
        if(isChipTo){const cm=chipMidpoint(edge.to.slice(5),edges,nodes);if(!cm)return null;bp=cm;}
        else{if(!to)return null;bp=edge.toPort?handlePos(to,edge.toPort,nodes):nodeCenter(to,nodes);}
        const a={x:ap.x, y:ap.y+HDR_H};
        const b={x:bp.x, y:bp.y+HDR_H};
        const fromPort=edge.fromPort||"right";
        const toPort  =edge.toPort  ||"left";
        const dx=b.x-a.x,dy=b.y-a.y;
        const hBase=Math.max(40,Math.abs(dx)*0.45);
        const vBase=Math.max(40,Math.abs(dy)*0.45);
        const portOff=(port)=>{
          // right→left: cap horizontal offset at dx/2 so control points never cross (prevents S-curves)
          if(fromPort==="right"&&toPort==="left"){
            if(dx>=0){const h=Math.max(15,Math.min(dx*0.48,120));return port==="right"?{ox:h,oy:0}:{ox:-h,oy:0};}
            else{const arch=Math.abs(dx)*0.4+80;return port==="right"?{ox:40,oy:-arch}:{ox:-40,oy:-arch};}
          }
          if(port==="right")  return{ox:hBase, oy:0};
          if(port==="left")   return{ox:-hBase,oy:0};
          if(port==="top")    return{ox:0,     oy:-vBase};
          if(port==="bottom") return{ox:0,     oy:vBase};
          return{ox:hBase,oy:0};
        };
        const fo=portOff(fromPort), to2=portOff(toPort);
        const cp1x=a.x+fo.ox, cp1y=a.y+fo.oy;
        const cp2x=b.x+to2.ox,cp2y=b.y+to2.oy;
        const t=0.5,mt=0.5;
        const mx=mt*mt*mt*a.x+3*mt*mt*t*cp1x+3*mt*t*t*cp2x+t*t*t*b.x;
        const my=mt*mt*mt*a.y+3*mt*mt*t*cp1y+3*mt*t*t*cp2y+t*t*t*b.y;
        const w=edge.weight??0.7;
        const opM=OP[edge.operator]||OPS[0];
        const effStr=Math.min(1,(strengths[edge.from]??0.5)*w*opM.discount);
        const sel=selEdgeId===edge.id;
        const isChipPick=selChipId===edge.id;
        const alpha=0.25+w*0.75;
        const baseThick=sel?3:1.5+w*1.8;
        const cs=["conflict","contradict"].includes(edge.operator)?CONN_STYLE[edge.operator]:(CONN_STYLE[edge.connectorType]||CONN_STYLE.default);
        const customEC=edge.strokeColor?EDGE_COLORS.find(c=>c.key===edge.strokeColor):null;
        const stroke=customEC?hexToRgba(customEC.color,alpha):cs.stroke(alpha);
        const thick=cs.thick(baseThick);
        const dash=edge.dashed===true?"6 4":edge.dashed===false?"none":cs.dash(w);
        const arrowId=customEC?`arr_${customEC.key}`:cs.arrow(alpha);
        const arrowIdR=customEC?`arr_${customEC.key}_r`:`${arrowId}_r`;
        const arrowMarker=`url(#${arrowId})`;
        const arrowMarkerR=`url(#${arrowIdR})`;
        let markerStart,markerEnd;
        if(edge.arrowDir==="right"){markerStart="none";markerEnd=arrowMarker;}
        else if(edge.arrowDir==="left"){markerStart=arrowMarkerR;markerEnd="none";}
        else if(edge.arrowDir==="none"){markerStart="none";markerEnd="none";}
        else if(edge.arrowDir==="both"){markerStart=arrowMarkerR;markerEnd=arrowMarker;}
        else{markerStart=edge.operator==="bidir"?arrowMarker:"none";markerEnd=edge.operator==="and"?"none":arrowMarker;}
        const chipTop = edge.operator==="weights"
          ? (edge.valence==="negative" ? "±−" : "±+")
          : cs.chipLabel(opM.sym);
        const isConflict = ["conflict","contradict"].includes(edge.operator);
        const chipBot = isConflict ? (edge.deltaS > 0 ? `ΔS${Math.round(edge.deltaS*100)}%` : "") : cs.chipPct(Math.round(effStr*100)+"%");
        const chipTxt=isChipPick?"#93c5fd":cs.chipColor;
        const glowColor=customEC?customEC.color:edge.connectorType==="certain"?"#16a34a":edge.connectorType==="nonzero"?"#a855f7":edge.connectorType==="unknown"?"#94a3b8":"#f97316";

        const ARROW_LEN_START = markerStart !== "none" ? 7.7 * thick : 0;
        const foLen = Math.hypot(fo.ox, fo.oy) || 1;
        const a2 = { x: a.x + (fo.ox/foLen)*ARROW_LEN_START, y: a.y + (fo.oy/foLen)*ARROW_LEN_START };
        
        const ARROW_LEN_END = markerEnd !== "none" ? 7.7 * thick : 0;
        const to2Len = Math.hypot(to2.ox, to2.oy) || 1;
        const b2 = { x: b.x + (to2.ox/to2Len)*ARROW_LEN_END, y: b.y + (to2.oy/to2Len)*ARROW_LEN_END };

        return(
          <g key={edge.id} style={{pointerEvents:"all",cursor:"pointer"}} onClick={e=>onChipClick(edge.id,e)}>
            {sel&&<path d={`M${a2.x} ${a2.y} C${cp1x} ${cp1y},${cp2x} ${cp2y},${b2.x} ${b2.y}`} stroke={glowColor} strokeWidth={thick+8} fill="none" opacity="0.12" filter="url(#glow)"/>}
            
            {(markerStart !== "none" || markerEnd !== "none") && (
              <path d={`M${a.x} ${a.y} C${cp1x} ${cp1y},${cp2x} ${cp2y},${b.x} ${b.y}`}
                stroke="transparent" strokeWidth={thick} fill="none" markerStart={markerStart} markerEnd={markerEnd} />
            )}
            
            <path d={`M${a2.x} ${a2.y} C${cp1x} ${cp1y},${cp2x} ${cp2y},${b2.x} ${b2.y}`}
              stroke={stroke} strokeWidth={thick} fill="none" strokeDasharray={dash}
            />
            <path d={`M${a.x} ${a.y} C${cp1x} ${cp1y},${cp2x} ${cp2y},${b.x} ${b.y}`} stroke="transparent" strokeWidth={20} fill="none"/>
            {showEdgeLabels&&<g transform={`translate(${mx},${my})`} style={{pointerEvents:"all"}}>
              <rect x={-26} y={-14} width={52} height={28} rx={7}
                fill={isChipPick?"#1e3a5f":"white"}
                stroke={isChipPick?"#3b82f6":sel?glowColor:"#d1d5db"}
                strokeWidth={isChipPick||sel?2:1}
                style={{filter:"drop-shadow(0 1px 5px rgba(0,0,0,0.7))"}}/>
              <text x={0} y={chipBot?-2:3} textAnchor="middle" dominantBaseline="middle" fontSize="11" fontWeight="800" fontFamily="monospace" fill={chipTxt}>{chipTop}</text>
              {chipBot&&<text x={0} y={9} textAnchor="middle" dominantBaseline="middle" fontSize="8" fontFamily="monospace" fill={sCol(effStr)}>{chipBot}</text>}
              {/* Meta-connection handles — drag to/from chip to annotate this connection */}
              {(()=>{
                const isDragTarget=dragConn?.hoverChipEdgeId===edge.id;
                const hFill=isDragTarget?"#10b981":"#a78bfa";
                const hOpacity=dragConn?(isDragTarget?1:0.35):0.70;
                const hR=isDragTarget?7:5;
                const mkHD=(hcx)=>(e)=>{e.stopPropagation();e.preventDefault();e.currentTarget.setPointerCapture?.(e.pointerId);onChipDragStart&&onChipDragStart(edge.id,mx+hcx,my-HDR_H);};
                return(<>
                  <circle cx={-32} cy={0} r={hR} fill={hFill} stroke="#07090f" strokeWidth={1.5}
                    style={{cursor:"crosshair",pointerEvents:"all",opacity:hOpacity}}
                    onPointerDown={mkHD(-32)} onClick={e=>e.stopPropagation()}
                  />
                  <circle cx={32} cy={0} r={hR} fill={hFill} stroke="#07090f" strokeWidth={1.5}
                    style={{cursor:"crosshair",pointerEvents:"all",opacity:hOpacity}}
                    onPointerDown={mkHD(32)} onClick={e=>e.stopPropagation()}
                  />
                  {isDragTarget&&<circle cx={0} cy={0} r={22} fill="none" stroke="#10b981" strokeWidth={2} opacity={0.6}/>}
                </>);
              })()}
            </g>}
            {showEdgeLabels&&edge.label&&(()=>{
              const lw=Math.max(36,Math.min(130,edge.label.length*6.2+16));
              const lh=15;
              return(
                <g transform={`translate(${mx},${my+26})`} style={{pointerEvents:"none"}}>
                  <rect x={-lw/2} y={-lh/2} width={lw} height={lh} rx={4} fill="#13131f" stroke={glowColor} strokeWidth={1} opacity={0.93}/>
                  <text x={0} y={0.5} textAnchor="middle" dominantBaseline="middle" fontSize="9" fontWeight="700" fontFamily="inherit" fill={glowColor}>{edge.label}</text>
                </g>
              );
            })()}
          </g>
        );
      })}

      {/* ── LIVE PREVIEW LINE ── */}
      {dragConn&&(()=>{
        // Determine start position: chip source or node source
        let fx, fy;
        if(dragConn.chipEdgeId&&dragConn.chipCanvasX!=null){
          fx=dragConn.chipCanvasX; fy=dragConn.chipCanvasY+HDR_H;
        }else{
          const fn=nodes.find(n=>n.id===dragConn.fromId);
          if(!fn)return null;
          const fp=handlePos(fn,dragConn.fromPort||"right");
          fx=fp.x; fy=fp.y+HDR_H;
        }
        const tx=dragConn.curX;
        const ty=dragConn.curY+HDR_H;
        const hasNodeTarget=!!dragConn.hoverTargetId;
        const hasChipTarget=!!dragConn.hoverChipEdgeId;
        const hasTarget=hasNodeTarget||hasChipTarget;
        // snap end point to target
        let ex=tx,ey=ty;
        if(hasNodeTarget&&dragConn.hoverPort){
          const tn=nodes.find(n=>n.id===dragConn.hoverTargetId);
          if(tn){const tp=handlePos(tn,dragConn.hoverPort);ex=tp.x;ey=tp.y+HDR_H;}
        }else if(hasChipTarget&&dragConn.hoverChipX!=null){
          ex=dragConn.hoverChipX; ey=dragConn.hoverChipY+HDR_H;
        }
        const portOff2=(port,off)=>{
          if(port==="right")  return{ox:off,oy:0};
          if(port==="left")   return{ox:-off,oy:0};
          if(port==="top")    return{ox:0,oy:-off};
          if(port==="bottom") return{ox:0,oy:off};
          return{ox:off,oy:0};
        };
        const off=Math.max(60,Math.abs(ex-fx)*0.45,Math.abs(ey-fy)*0.45);
        const fo=portOff2(dragConn.fromPort||"right",off);
        const to2=portOff2(dragConn.hoverPort||"left",off);
        const cp1x=fx+fo.ox,cp1y=fy+fo.oy;
        const cp2x=ex+to2.ox,cp2y=ey+to2.oy;
        
        const ARROW_LEN_P = 7.7 * 2.5;
        const to2LenP = Math.hypot(to2.ox, to2.oy) || 1;
        // The preview line only has an end marker
        const ex2 = ex + (to2.ox/to2LenP)*ARROW_LEN_P;
        const ey2 = ey + (to2.oy/to2LenP)*ARROW_LEN_P;

        return(
          <g>
            <path d={`M${fx} ${fy} C${cp1x} ${cp1y},${cp2x} ${cp2y},${ex} ${ey}`}
              stroke="transparent" strokeWidth={2.5} fill="none" markerEnd={`url(#${hasTarget?"arrG":"arrO"})`} />
            <path d={`M${fx} ${fy} C${cp1x} ${cp1y},${cp2x} ${cp2y},${ex2} ${ey2}`}
              stroke={hasTarget?"#10b981":"#f97316"} strokeWidth={2.5} fill="none"
              strokeDasharray="7 4" opacity={0.85}
            />
            {hasTarget&&<circle cx={ex} cy={ey} r={10} fill="none" stroke="#10b981" strokeWidth={2} opacity={0.7}/>}
          </g>
        );
      })()}
    </svg>
  );
}

/* ══════════════════════════════════════════════════════════
   LOCK UI (Overlaid on top of nodes)
══════════════════════════════════════════════════════════ */
function LockUI({edges,nodes,onToggleLock}){
  return(
    <svg style={{position:"absolute",left:0,top:-HDR_H,width:8000,height:6000,overflow:"visible",pointerEvents:"none"}}>
      {edges.map(edge=>{
        const fn = nodes.find(n=>n.id===edge.from);
        const tn = nodes.find(n=>n.id===edge.to);
        if(!fn||!tn)return null;
        const a = handlePos(fn,edge.fromPort||'top',nodes);
        const b = handlePos(tn,edge.toPort||'bottom',nodes);
        // Compensate for svg top: -HDR_H
        const ay = a.y+HDR_H, by = b.y+HDR_H;
        
        const renderLock=(px,py,isLocked,side)=>{
          return(
            <g transform={`translate(${px},${py})`} style={{cursor:"pointer",pointerEvents:"all"}}
              onClick={e=>{e.stopPropagation();onToggleLock(edge.id,side);}}>
              <circle r={7} fill={isLocked?"#f97316":"rgba(255,255,255,0.7)"} stroke="var(--panel-border)" strokeWidth={0.5}/>
              <text y={1} textAnchor="middle" dominantBaseline="middle" fontSize="10" fill={isLocked?"white":"#334155"} style={{userSelect:"none"}}>
                {isLocked?"🔒":"🔓"}
              </text>
            </g>
          );
        };
        
        return(
          <React.Fragment key={edge.id}>
            {renderLock(a.x,ay,edge.fromLocked,'from')}
            {renderLock(b.x,by,edge.toLocked,'to')}
          </React.Fragment>
        );
      })}
    </svg>
  );
}

function SubNodeCard({child, selected, strength, topOffset, onSelect, onCreateChild, onOpenNested}) {
