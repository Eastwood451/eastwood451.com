  const sc = sCol(strength);
  return (
    <div onPointerDown={e=>{e.stopPropagation();onSelect();}} onPointerUp={e=>e.stopPropagation()}
      style={{position:"absolute",left:10,right:10,top:topOffset,minHeight:82,borderRadius:9,
        border:`1.5px solid ${selected?meta.color:meta.color+'44'}`,
        background:selected?"rgba(240,255,248,0.96)":"rgba(255,255,255,0.88)",
        boxShadow:selected?`0 0 0 2px ${meta.color}55,0 2px 8px rgba(0,0,0,0.15)`:"0 1px 6px rgba(15,23,42,0.13)",
        padding:"8px 10px 7px",cursor:"pointer",userSelect:"none",
      }}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2.5,background:meta.color,borderRadius:"9px 9px 0 0",opacity:0.85}}/>
      <div style={{display:"flex",alignItems:"flex-start",gap:4,marginBottom:3}}>
        <span style={{flex:1,fontWeight:700,fontSize:11,color:meta.color,lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{child.title}</span>
        <span style={{fontSize:7,background:badgeBg(meta.color),color:meta.color,borderRadius:4,padding:"2px 4px",fontWeight:700,border:`1px solid ${meta.color}33`}}>{meta.label}</span>
      </div>
      {child.text&&child.text!=='!(Ny undernode)'&&(
        <div style={{fontSize:9,color:"var(--text-muted)",overflow:"hidden",maxHeight:20,marginBottom:3,whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{child.text}</div>
      )}
      <div style={{marginBottom:4}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:1}}>
          <span style={{fontSize:7.5,color:sc,fontWeight:700}}>{sPips(strength)} {Math.round(strength*100)}%</span>
          <span style={{fontSize:7,color:sc}}>{sLbl(strength)}</span>
        </div>
        <div style={{height:2.5,background:"#0f172a",borderRadius:2}}>
          <div style={{height:"100%",width:`${strength*100}%`,background:sc,borderRadius:2}}/>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:1}}>
        <span style={{fontSize:8,color:"var(--panel-border)"}}>{(child.subNodes??[]).length>0?`${child.subNodes.length} underled`:""}</span>
        <div style={{display:"flex",gap:3}}>
          <button title="Opret undernode"
            style={{fontSize:9,padding:"1px 5px",borderRadius:5,border:`1px solid ${meta.color}44`,background:"transparent",color:meta.color,cursor:"pointer",fontWeight:800}}
            onPointerDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onCreateChild();}}>+</button>
          <button title="Åbn i nested view"
            style={{fontSize:9,padding:"1px 5px",borderRadius:5,border:`1px solid ${meta.color}33`,background:"transparent",color:meta.color,cursor:"pointer",fontWeight:600}}
            onPointerDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onOpenNested();}}>⤵</button>
        </div>
      </div>
    </div>
  );
}

function NodeCard({node,selected,connecting,childCount,zoom,strength,onClick,onOpenNested,onCreateChild,onMove,onConnStart,dragConnActive,isHoverTarget,onOpenPropTester,selNodeId,onSubNodeClick,onOpenSubNested,isMultiSelected,onMultiDragStart,onUpNode,onCtxMenu}){
  const drag=useRef(null);
  // Absolute canvas position
  const absX = colX(node.slot) + (node.localX??COL_PAD);
  const absY = node.y;

  const onPD=(e)=>{
    // Don't start node drag if clicking a handle
    if(e.target.closest?.('[data-handle]'))return;
    e.stopPropagation();
    drag.current={sx:e.clientX,sy:e.clientY,ax:absX,ay:absY,moved:false};
    if(isMultiSelected)onMultiDragStart?.();
    e.currentTarget.setPointerCapture(e.pointerId);
  };
  const onPM=(e)=>{
    if(!drag.current||e.buttons!==1)return;
    const dx=(e.clientX-drag.current.sx)/zoom,dy=(e.clientY-drag.current.sy)/zoom;
    if(Math.abs(dx)>2||Math.abs(dy)>2)drag.current.moved=true;
    onMove(Math.max(0,drag.current.ax+dx), Math.max(0,drag.current.ay+dy));
  };
  const onPU=(e)=>{
    e.stopPropagation();
    if(e.target.closest?.('[data-handle]')){drag.current=null;return;}
    if(!drag.current?.moved)onClick();
    drag.current=null;
  };
  const sc=sCol(strength);
  const meta=TYPES[node.type]||TYPES.premise;
  const nodeColor=node.type==="junction"?"#94a3b8":(node.customColor||meta.color);
  const stability = holonStabilitet(node, strength);
  const isCollapse = stability === "⊗";
  const tempSym = node.temporalStatus ? temporalSym(node.temporalStatus) : "";
  const stColor = node.sandhedsStratum ? stratumColor(node.sandhedsStratum) : null;
  const stLabel = node.sandhedsStratum ? stratumLabel(node.sandhedsStratum) : null;
  const htRadii = node.holonType === "entity" ? 11 : node.holonType === "disposition" ? 3 : 24;
  const sendToSuiteAi=(e)=>{
    e.stopPropagation();
    if(!window.bus)return;
    const slotLabel=`T${(node.slot??0)+1}`;
    const content=(node.text||"").trim()||"(tom)";
    const query=[
      "Analyser denne boks i Belief-map.",
      "",
      `Type: ${meta.label}`,
      `Titel: ${node.title||"(uden titel)"}`,
      `Indhold: ${content}`,
      `Forklaringskraft: ${Math.round(strength*100)}%`,
      `Trin: ${slotLabel}`,
      "",
      "Forhold dig til denne boks i kontekst af hele suiten, og forklar hvad den betyder, hvilke antagelser den bygger pa, og hvordan den spiller sammen med andet relevant indhold."
    ].join("\n");
    window.bus.publish("ai-focus-analysis",{source:"Belief-map",query});
  };

  // Handles: 30% smaller (8px), match red color, red on drop target
  const hStyle=(snap)=>({
    position:"absolute",transform:"translate(-50%,-50%)",
    width:8,height:8,borderRadius:"50%",
    background:nodeColor,
    border:"1.5px solid #07090f",
    cursor:"crosshair",zIndex:20,
    boxShadow:snap?`0 0 7px ${nodeColor}`:`0 0 3px ${nodeColor}88`,
    opacity:dragConnActive?(snap?1:0.40):0.80,
  });

  /* Junction circle */
  if(node.type==="junction"){
    const D=JUNC_R*2;
    const jHandles=[
      {lx:D/2,  ly:-4,  cx:absX+JUNC_R, cy:absY,        port:"top"},
      {lx:D+4,  ly:D/2, cx:absX+D,      cy:absY+JUNC_R, port:"right"},
      {lx:D/2,  ly:D+4, cx:absX+JUNC_R, cy:absY+D,      port:"bottom"},
      {lx:-4,   ly:D/2, cx:absX,        cy:absY+JUNC_R, port:"left"},
    ];
    return(
      <div className="ndrag" onPointerDown={onPD} onPointerMove={onPM} onPointerUp={onPU}
        style={{position:"absolute",left:absX,top:absY,width:D,height:D,
          background:isHoverTarget?"#07261a":"var(--junction-bg)",
          border:`2.5px solid ${isHoverTarget?"#10b981":selected?"#f97316":connecting?"#a78bfa":"#94a3b8"}`,
          borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",
          cursor:"grab",userSelect:"none",
          boxShadow:selected?"0 0 0 3px #f9731644":isHoverTarget?"0 0 0 3px #10b98155":"0 2px 10px rgba(0,0,0,0.7)",
        }}>
        <span style={{fontSize:19,fontWeight:900,color:isHoverTarget?"#10b981":"var(--text-main)",fontFamily:"monospace",lineHeight:1}}>{node.text||"∧"}</span>
        <span style={{fontSize:7,color:sc,fontWeight:800}}>{Math.round(strength*100)}%</span>
        {jHandles.map((h,i)=>(
          <div key={i} data-handle="1" style={{...hStyle(isHoverTarget),left:h.lx,top:h.ly}}
            onPointerDown={e=>{e.stopPropagation();e.preventDefault();e.currentTarget.setPointerCapture?.(e.pointerId);onConnStart(node.id,h.cx,h.cy,h.port);}}
          />
        ))}
      </div>
    );
  }

  const isOp=node.type==="operator";
  const visibleChildren=[...(node.subNodes??[])].sort((a,b)=>(a.y??0)-(b.y??0));
  const showSubCanvas=!isOp&&(node.isContainer||visibleChildren.length>0);
  const inlineCanvasH=showSubCanvas?Math.max(100,22+Math.max(visibleChildren.length,1)*92):0;
  const cardH=getNodeHeight(node);
  const nHandles=[
    {lx:NODE_W/2, ly:-4,       cx:absX+NODE_W/2, cy:absY,          port:"top"},
    {lx:NODE_W+4, ly:cardH/2,  cx:absX+NODE_W,   cy:absY+cardH/2,  port:"right"},
    {lx:NODE_W/2, ly:cardH+4,  cx:absX+NODE_W/2, cy:absY+cardH,    port:"bottom"},
    {lx:-4,       ly:cardH/2,  cx:absX,          cy:absY+cardH/2,  port:"left"},
  ];
  return(
    <div className="ndrag" onPointerDown={onPD} onPointerMove={onPM} onPointerUp={onPU}
      onContextMenu={onCtxMenu}
      style={{position:"absolute",left:absX,top:absY,width:NODE_W,
        background:isHoverTarget?"#e8fff4":isOp?"var(--operator-bg)":"var(--card-bg)",
        border:`1.5px ${node.isQuestion?"dashed":"solid"} ${isHoverTarget?"#10b981":isCollapse?"#ef4444":selected?nodeColor:connecting?"#a78bfa":isMultiSelected?"#3b82f6":"var(--panel-border)"}`,
        borderRadius:htRadii,
        animation:isCollapse?"pulse-red 1.2s infinite":"none",
        padding:isOp?"8px 11px 7px":"10px 11px 8px",minHeight:cardH,cursor:"grab",userSelect:"none",
        boxShadow:isHoverTarget?"0 0 0 2.5px #10b98177,0 4px 16px rgba(0,0,0,0.5)":selected?`0 0 0 2px ${nodeColor}44,0 4px 16px rgba(0,0,0,0.5)`:"0 2px 8px rgba(0,0,0,0.5)",
      }}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2.5,background:nodeColor,borderRadius:"11px 11px 0 0",opacity:selected?1:0.5}}/>
      {/* Stability symbol — top left */}
      <div style={{position:"absolute",top:5,left:7,fontSize:10,fontWeight:900,color:isCollapse?"#ef4444":stability==="⊙"?"#10b981":stability==="◎"?"#a78bfa":"#94a3b8",lineHeight:1,filter:isCollapse?"drop-shadow(0 0 4px #ef4444)":"none"}}>{node.isQuestion?"?":""}{stability}</div>
      {/* Temporal superscript — top right of title area */}
      {tempSym&&<div style={{position:"absolute",top:4,right:tempSym.length>1?10:14,fontSize:11,fontWeight:700,color:"#94a3b8",lineHeight:1,fontFamily:"serif"}}>{tempSym}</div>}
      {node.tag&&<div style={{position:"absolute",top:8,right:54,fontSize:16,lineHeight:1,filter:"drop-shadow(0 1px 2px rgba(0,0,0,0.45))"}}>{node.tag}</div>}
      <div style={{display:"flex",alignItems:"flex-start",gap:5,marginBottom:4,marginLeft:14}}>
        <span style={{flex:1,fontWeight:700,fontSize:isOp?11:13,color:nodeColor,lineHeight:1.25,fontFamily:isOp?"monospace":"inherit"}}>{node.title}</span>
        <span style={{fontSize:8,background:badgeBg(nodeColor),color:nodeColor,borderRadius:4,padding:"2px 5px",whiteSpace:"nowrap",fontWeight:700,marginTop:1,border:`1px solid ${nodeColor}33`}}>{meta.label}</span>
      </div>
      {stLabel&&<div style={{display:"inline-block",marginBottom:4,padding:"1px 5px",borderRadius:4,background:stColor+"22",border:`1px solid ${stColor}44`,fontSize:8,fontWeight:700,color:stColor}}>{stLabel}</div>}
      {node.text&&<div style={{fontSize:isOp?10.5:11,color:isOp?"var(--text-muted)":"var(--text-muted)",whiteSpace:"pre-wrap",wordBreak:"break-word",lineHeight:1.4,maxHeight:100,overflow:"hidden",fontFamily:isOp?"monospace":"inherit",marginBottom:5}}>{node.text}</div>}

      {showSubCanvas&&(
        <div onPointerDown={e=>e.stopPropagation()} onPointerUp={e=>e.stopPropagation()}
          style={{
            position:"relative",
            height:inlineCanvasH,
            margin:"8px 0 10px",
            border:`1px solid ${nodeColor}22`,
            borderRadius:14,
            background:"radial-gradient(circle, rgba(15,23,42,0.12) 1px, transparent 1px), rgba(255,255,255,0.38)",
            backgroundSize:"20px 20px",
            overflow:"hidden",
          }}>
          {visibleChildren.length===0&&(
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"var(--text-soft)",fontWeight:700,letterSpacing:"0.04em"}}>
              SUB-NODE-CANVAS
            </div>
          )}
          {visibleChildren.map((child,idx)=>(
            <SubNodeCard key={child.id}
              child={child}
              selected={selNodeId===child.id}
              strength={strength*0.85}
              topOffset={12+idx*92}
              onSelect={()=>onSubNodeClick&&onSubNodeClick(child.id)}
              onCreateChild={()=>onCreateChild&&onCreateChild(child.id)}
              onOpenNested={()=>onOpenSubNested&&onOpenSubNested(child.id)}

          ))}
        </div>
      )}

      {/* Strength bar */}
      <div style={{marginBottom:isOp?0:3}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
          <span style={{fontSize:9,color:sc,fontWeight:700}}>{sPips(strength)} {Math.round(strength*100)}%</span>
          <span style={{fontSize:8,color:sc}}>{sLbl(strength)}</span>
        </div>
        <div style={{height:3,background:"#080d18",borderRadius:2}}>
          <div style={{height:"100%",width:`${strength*100}%`,background:sc,borderRadius:2,transition:"width 0.35s"}}/>
        </div>
      </div>

      {!isOp&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}}>
          <span style={{fontSize:9,color:"var(--panel-border)"}}>{childCount>0?`${childCount} underled`:""}</span>
          <div style={{display:"flex",gap:4}}>
            <button title="Opret undernode"
              type="button"
              data-handle="1"
              style={{fontSize:10,padding:"1px 6px",borderRadius:6,border:`1px solid ${nodeColor}44`,background:"transparent",color:nodeColor,cursor:"pointer",fontWeight:800,opacity:0.82,pointerEvents:"auto",touchAction:"manipulation"}}
              onPointerDownCapture={e=>{e.stopPropagation();onCreateChild&&onCreateChild();}}
              onPointerDown={e=>{e.stopPropagation();e.preventDefault();}}
              onClick={e=>{e.stopPropagation();e.preventDefault();}}>+</button>
            <button title="Analysér i suite-chatten"
              style={{fontSize:9,padding:"1px 6px",borderRadius:6,border:`1px solid ${nodeColor}44`,background:"transparent",color:nodeColor,cursor:"pointer",fontWeight:700,opacity:0.82}}

            <button title="Analysér med Propositions-tester"
              style={{fontSize:9,padding:"1px 6px",borderRadius:6,border:`1px solid ${nodeColor}44`,background:"transparent",color:nodeColor,cursor:"pointer",fontWeight:700,opacity:0.75}}
              onPointerDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onOpenPropTester&&onOpenPropTester(node);}}>⊞</button>
            <button style={{fontSize:10,padding:"1px 7px",borderRadius:6,border:`1px solid ${nodeColor}33`,background:"transparent",color:nodeColor,cursor:"pointer",fontWeight:600}}
              onPointerDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onOpenNested();}}>⤵</button>
            {node.type==="ytring"&&(()=>{
              const bubbleOn=node.speechBubble!==false;
              return(
                <button title={bubbleOn?"Skjul taleboble-hak":"Vis taleboble-hak"}
                  style={{fontSize:10,padding:"1px 6px",borderRadius:6,border:`1px solid ${bubbleOn?nodeColor:nodeColor+"44"}`,background:bubbleOn?nodeColor+"22":"transparent",color:bubbleOn?nodeColor:nodeColor+"88",cursor:"pointer",fontWeight:800}}
                  onPointerDown={e=>e.stopPropagation()}
                  onPointerUp={e=>e.stopPropagation()}
                  onClick={e=>{e.stopPropagation();onUpNode&&onUpNode({speechBubble:!bubbleOn});}}>
                  💬
                </button>
              );
            })()}
          </div>
        </div>
      )}

      {/* Double spikes for valg nodes */}
      {node.type==="choice"&&([0.30,0.62]).map((frac,i)=>{
        const top=Math.round(NODE_H*frac)-16;
        const bColor=isHoverTarget?"#10b981":isCollapse?"#ef4444":selected?nodeColor:"var(--panel-border)";
        const fColor=isHoverTarget?"#e8fff4":isOp?"var(--operator-bg)":"var(--card-bg)";
        return(
          <React.Fragment key={i}>
            <div style={{position:"absolute",top,right:-18,width:0,height:0,
              borderTop:"16px solid transparent",borderBottom:"16px solid transparent",
              borderLeft:`18px solid ${bColor}`,
              pointerEvents:"none",zIndex:4}}/>
            <div style={{position:"absolute",top:top+2,right:-15,width:0,height:0,
              borderTop:"14px solid transparent",borderBottom:"14px solid transparent",
              borderLeft:`16px solid ${fColor}`,
              pointerEvents:"none",zIndex:5}}/>
          </React.Fragment>
        );
      })}

      {/* Speech bubble tail for ytring nodes */}
      {node.type==="ytring"&&node.speechBubble!==false&&(
        <>
          {/* Border layer */}
          <div style={{position:"absolute",bottom:-28,right:22,width:0,height:0,
            borderLeft:"12px solid transparent",borderRight:"12px solid transparent",
            borderTop:`28px solid ${isHoverTarget?"#10b981":isCollapse?"#ef4444":selected?nodeColor:"var(--panel-border)"}`,
            pointerEvents:"none",zIndex:4}}/>
          {/* Fill layer */}
          <div style={{position:"absolute",bottom:-26,right:24,width:0,height:0,
            borderLeft:"10px solid transparent",borderRight:"10px solid transparent",
            borderTop:`26px solid ${isHoverTarget?"#e8fff4":isOp?"var(--operator-bg)":"var(--card-bg)"}`,
            pointerEvents:"none",zIndex:5}}/>
        </>
      )}

      {/* 4 handles: top, right, bottom, left */}
      {nHandles.map((h,i)=>(
        <div key={i} data-handle="1" style={{...hStyle(isHoverTarget),left:h.lx,top:h.ly}}
          onPointerDown={e=>{e.stopPropagation();e.preventDefault();e.currentTarget.setPointerCapture?.(e.pointerId);onConnStart(node.id,h.cx,h.cy,h.port);}}
        />
      ))}
    </div>
  );
}

const SYM_LIST="α β γ δ ε ζ η θ ι κ λ μ ν ξ ο π ρ ς σ τ υ φ χ ψ ω → ↔ ← ↝ ↮ ⇒ ∝ ℕ ℤ ℚ ℝ ℂ ∞ ⊂ ⊆ ⊃ ⊇ ∪ ∩ ∈ ∉ ∅ ⌀ ∧ ∨ ⊕ ⊻ ¬ ⊢ □ ◊ ⊣ ⊤ ⊥ ∴ ∵ ∖ ∀ ∃ ∄ ∃! · ! ∆ ∇ = ≤ ≥ ~ & + ∥ ≢ ≡ := ≔ ( ) [ ] { } ⊨ ⊩ ⊙ ◐ ○ ◎ ⊗ ⚡ ΔS ▶ ⊄ ± § ∘ ↺ ⟲ ≺ ≻ ⪯ ⪰ ≈ ≫ ≪ ⦿ ⊛ ↑ ↓ ⟂ ≈ ⇔ ᵖ ⁿ ᶠ".split(" ");

function RightPanel({node,edge,visNodes,cc,strength,slots,activeSlot,onUpNode,onDelNode,onOpenNested,onUpEdge,onDelEdge,onClose}){
  const sc=node?sCol(strength??0):null;
  const [symOpen,setSymOpen]=React.useState(false);
  const textareaRef=React.useRef(null);

  const insertSym=(sym)=>{
    const el=textareaRef.current;
    if(!el)return;
    const start=el.selectionStart??el.value.length;
    const end=el.selectionEnd??el.value.length;
    const before=el.value.slice(0,start);
    const after=el.value.slice(end);
    const next=before+sym+after;
    onUpNode({text:next});
    // restore cursor after React re-render
    requestAnimationFrame(()=>{
      el.focus();
      el.setSelectionRange(start+sym.length,start+sym.length);
    });
  };

  return(
    <div style={S.panel}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:9}}>
        <div style={{fontSize:10,fontWeight:800,color:"var(--text-main)",letterSpacing:"0.07em"}}>⚙ INSPEKTØR</div>
        <button onClick={onClose} title="Luk panel"
          style={{background:"transparent",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 2px",opacity:0.6}}
          onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0.6}>✕</button>
      </div>

      {/* EDGE */}
      {edge&&!node&&(()=>{
        const opM=OP[edge.operator]||OPS[0];
        const w=edge.weight??0.7;
        const eff=w*opM.discount;
        const fromN=visNodes.find(n=>n.id===edge.from);
        const toN  =visNodes.find(n=>n.id===edge.to);
        return(<>
          <div style={{padding:"6px 9px",background:"var(--panel-bg-alt)",border:"1px solid #f9731633",borderRadius:8,marginBottom:9}}>
            <span style={{color:"#f97316",fontWeight:800,fontFamily:"monospace",fontSize:12}}>{opM.sym}</span>
            <span style={{color:"var(--text-muted)",fontSize:10}}> · {opM.label}</span>
            <div style={{fontSize:9,color:"var(--text-soft)",marginTop:1}}>{fromN?.title??"?"} → {toN?.title??"?"}</div>
            <div style={{marginTop:5,fontSize:10,color:"var(--text-muted)"}}>
              {Math.round(w*100)}% × {opM.discount} = <strong style={{color:sCol(eff)}}>{Math.round(eff*100)}% eff.</strong>
            </div>
          </div>
          <label style={S.lbl}>Operator</label>
          <select style={S.inp} value={edge.operator} onChange={e=>onUpEdge({operator:e.target.value})}>
            {OPS.map(o=><option key={o.key} value={o.key}>{o.sym}  {o.label}  (×{o.discount})</option>)}
          </select>
          <label style={{...S.lbl,marginTop:10}}>Kantvægt — {Math.round(w*100)}%</label>
          <input type="range" min={0} max={1} step={0.05} value={w} onChange={e=>onUpEdge({weight:+e.target.value})} style={{width:"100%",accentColor:"#f97316",marginBottom:4}}/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:3,marginBottom:8}}>
            {[1,.8,.6,.4,.2,0].map(v=>(
              <button key={v} style={{padding:"3px 0",borderRadius:5,border:"1px solid var(--panel-border)",background:Math.abs(w-v)<0.01?"var(--slot-active-bg)":"transparent",color:"var(--text-muted)",cursor:"pointer",fontSize:10,fontWeight:600}}
                onClick={()=>onUpEdge({weight:v})}>{Math.round(v*100)}%</button>
            ))}
          </div>
          {opM.key==="abduct"&&<div style={{padding:"6px 9px",background:"#2a1205",border:"1px solid #fb923c44",borderRadius:8,fontSize:10,color:"#fb923c",lineHeight:1.5}}>⚠ Abduktion producerer kun hypoteser — aldrig kendsgerninger. Styrken halveres.</div>}
          {["conflict","contradict"].includes(opM.key)&&(
            <div style={{marginTop:6}}>
              <label style={S.lbl}>ΔS-intensitet — {Math.round((edge.deltaS??0)*100)}%</label>
              <input type="range" min={0} max={1} step={0.05} value={edge.deltaS??0}
                onChange={e=>onUpEdge({deltaS:+e.target.value})}
                style={{width:"100%",accentColor:"#ef4444",marginBottom:4}}/>
              <div style={{fontSize:9,color:"#fca5a5",padding:"4px 7px",background:"rgba(239,68,68,0.08)",borderRadius:6,border:"1px solid rgba(239,68,68,0.2)"}}>
                Høj ΔS reducerer målnodens forklaringskraft og kan trigger ⊗-kollaps
              </div>
            </div>
          )}
          {opM.key==="weights"&&(
            <div style={{marginTop:6}}>
              <label style={S.lbl}>Valens</label>
              <div style={{display:"flex",gap:4,marginBottom:6}}>
                <button style={{flex:1,padding:"4px 0",borderRadius:6,border:`2px solid ${(edge.valence??"positive")==="positive"?"#10b981":"#374151"}`,background:(edge.valence??"positive")==="positive"?"rgba(16,185,129,0.15)":"transparent",color:(edge.valence??"positive")==="positive"?"#10b981":"#9ca3af",fontWeight:800,fontSize:12,cursor:"pointer"}}
                  onClick={()=>onUpEdge({valence:"positive"})}>±+</button>
                <button style={{flex:1,padding:"4px 0",borderRadius:6,border:`2px solid ${edge.valence==="negative"?"#ef4444":"#374151"}`,background:edge.valence==="negative"?"rgba(239,68,68,0.15)":"transparent",color:edge.valence==="negative"?"#ef4444":"#9ca3af",fontWeight:800,fontSize:12,cursor:"pointer"}}
                  onClick={()=>onUpEdge({valence:"negative"})}>±−</button>
              </div>
              <label style={S.lbl}>Intensitet — {Math.round((edge.intensity??0.7)*100)}%</label>
              <input type="range" min={0} max={1} step={0.05} value={edge.intensity??0.7}
                onChange={e=>onUpEdge({intensity:+e.target.value})}
                style={{width:"100%",accentColor:edge.valence==="negative"?"#ef4444":"#10b981"}}/>
            </div>
          )}
          <label style={{...S.lbl,marginTop:9}}>Connector-type</label>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
            {CONN_TYPES.map(c=>{const col={default:"#f97316",unknown:"#94a3b8",nonzero:"#a855f7",certain:"#16a34a"}[c.key];const act=(edge.connectorType??"default")===c.key;return(
              <button key={c.key} title={c.desc}
                style={{padding:"3px 8px",borderRadius:6,border:`2px solid ${act?col:"#374151"}`,background:act?col+"22":"transparent",color:act?col:"#9ca3af",fontWeight:800,fontSize:11,cursor:"pointer"}}
                onClick={()=>onUpEdge({connectorType:c.key})}>{c.label}</button>
            );})}
          </div>
          <label style={{...S.lbl,marginTop:9}}>Label</label>
          <input style={S.inp} value={edge.label??""} onChange={e=>onUpEdge({label:e.target.value})}/>
          <button style={{...S.btnAlt,color:"#f87171",borderColor:"#7f1d1d",width:"100%",marginTop:9}} onClick={onDelEdge}>🗑 Fjern kant</button>
        </>);
      })()}

      {/* NODE */}
      {node&&!edge&&(()=>{
        const meta=TYPES[node.type]||TYPES.premise;
        const isJunc=node.type==="junction";
        return(<>
          {/* Strength */}
          <div style={{padding:"7px 10px",background:"var(--panel-bg-alt)",border:`1px solid ${sc}44`,borderRadius:9,marginBottom:9}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{color:meta.color,fontWeight:700,fontSize:11}}>{meta.label}</span>
              <span style={{color:sCol(strength??0),fontSize:12,fontWeight:800,fontFamily:"monospace"}}>{Math.round((strength??0)*100)}%</span>
            </div>
            <div style={{height:7,background:"var(--panel-border)",borderRadius:4,overflow:"hidden",marginBottom:4}}>
              <div style={{height:"100%",width:`${(strength??0)*100}%`,background:sc,borderRadius:4,transition:"width 0.4s"}}/>
            </div>
            <div style={{fontSize:10,color:sc,fontWeight:700}}>{sPips(strength??0)} {sLbl(strength??0)} forklaringskraft</div>
          </div>

          {/* Slot assignment */}
          <label style={S.lbl}>Tidstrin (T)</label>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:8}}>
            {slots.map((s,i)=>(
              <button key={s.id} style={{padding:"2px 7px",borderRadius:6,border:`1px solid ${node.slot===i?"#f97316":"var(--button-alt-border)"}`,background:node.slot===i?activeDarkBg():"transparent",color:node.slot===i?"#f97316":"var(--button-alt-text)",cursor:"pointer",fontSize:10,fontWeight:node.slot===i?700:400}}
                onClick={()=>onUpNode({slot:i,localX:COL_PAD})}>T{i+1}</button>
            ))}
          </div>

          <label style={S.lbl}>Titel</label>
          <input style={S.inp} value={node.title} onChange={e=>onUpNode({title:e.target.value})}/>
          <label style={{...S.lbl,marginTop:8}}>Tag</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4,marginBottom:8}}>
            <button style={{padding:"5px 0",borderRadius:6,border:`1px solid ${!node.tag?"#f97316":"var(--button-alt-border)"}`,background:!node.tag?"var(--slot-active-bg)":"transparent",color:!node.tag?"#f97316":"var(--button-alt-text)",cursor:"pointer",fontSize:10,fontWeight:700}}
              onClick={()=>onUpNode({tag:""})}>Ingen</button>
            {NODE_TAGS.map(tag=>(
              <button key={tag} style={{padding:"5px 0",borderRadius:6,border:`1px solid ${node.tag===tag?"#f97316":"var(--button-alt-border)"}`,background:node.tag===tag?"var(--slot-active-bg)":"transparent",color:node.tag===tag?"#f97316":"var(--button-alt-text)",cursor:"pointer",fontSize:18,lineHeight:1}}
                onClick={()=>onUpNode({tag})}>{tag}</button>
            ))}
          </div>

          {isJunc?(
            <>
              <label style={{...S.lbl,marginTop:8}}>Symbol</label>
              <div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:3}}>
                {["∧","∨","→H{","→{","}→","∴","⊢"].map(sym=>(
                  <button key={sym} style={{padding:"3px 8px",borderRadius:6,border:`1px solid ${node.text===sym?"#f97316":"var(--button-alt-border)"}`,background:node.text===sym?"var(--slot-active-bg)":"transparent",color:node.text===sym?"#f97316":"var(--button-alt-text)",cursor:"pointer",fontSize:12,fontWeight:800,fontFamily:"monospace"}}
                    onClick={()=>onUpNode({text:sym,title:sym})}>{sym}</button>
                ))}
              </div>
              <label style={{...S.lbl,marginTop:9}}>Aggregator</label>
              <select style={S.inp} value={node.aggregator??"and"} onChange={e=>onUpNode({aggregator:e.target.value})}>
                {AGGREGATORS.map(a=><option key={a.key} value={a.key}>{a.label}</option>)}
              </select>
            </>
          ):(
            <>
              <label style={{...S.lbl,marginTop:8}}>Farve</label>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center",marginBottom:8}}>
                {/* "Ingen override" — viser type-farve */}
                <button title="Standard (type-farve)"
                  style={{width:22,height:22,borderRadius:5,border:`2px solid ${!node.customColor?"#f97316":"#374151"}`,background:meta.color,cursor:"pointer",flexShrink:0,boxShadow:!node.customColor?"0 0 0 2px #f9731644":"none"}}
                  onClick={()=>onUpNode({customColor:null})}/>
                {["#10b981","#22d3ee","#3b82f6","#6366f1","#a78bfa","#f472b6","#f59e0b","#fb923c","#ef4444","#e2e8f0","#94a3b8","#475569","#fde68a","#bbf7d0","#bfdbfe","#fecaca"].map(c=>(
                  <button key={c} title={c}
                    style={{width:22,height:22,borderRadius:5,border:`2px solid ${node.customColor===c?"white":"transparent"}`,background:c,cursor:"pointer",flexShrink:0,boxShadow:node.customColor===c?"0 0 0 2px "+c+"99":"none",outline:node.customColor===c?"2px solid white":"none"}}
                    onClick={()=>onUpNode({customColor:c})}/>
                ))}
                <input type="color" title="Vælg brugerdefineret farve"
                  value={node.customColor||meta.color}
                  onChange={e=>onUpNode({customColor:e.target.value})}
                  style={{width:22,height:22,padding:0,border:"1px solid #374151",borderRadius:5,cursor:"pointer",background:"transparent",flexShrink:0}}/>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:0,marginBottom:2}}>
                <label style={{...S.lbl,marginBottom:0}}>Tekst / notation</label>
                <button onClick={()=>setSymOpen(v=>!v)}
                  style={{fontSize:9,padding:"1px 6px",borderRadius:5,border:`1px solid ${symOpen?"#a78bfa":"var(--input-border)"}`,background:symOpen?"#a78bfa22":"transparent",color:symOpen?"#a78bfa":"var(--text-soft)",cursor:"pointer",fontWeight:700,letterSpacing:"0.03em"}}>
                  Σ Symboler {symOpen?"▲":"▼"}
                </button>
              </div>
              {symOpen&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:2,padding:"5px 6px",background:"var(--input-bg)",border:"1px solid #a78bfa44",borderRadius:7,marginBottom:5,maxHeight:140,overflowY:"auto"}}>
                  {SYM_LIST.map((s,i)=>(
                    <button key={i} onMouseDown={e=>{e.preventDefault();insertSym(s);}}
                      title={s}
                      style={{minWidth:22,padding:"2px 3px",fontSize:11,fontFamily:"monospace",background:"transparent",border:"1px solid var(--panel-border)",borderRadius:4,color:"var(--text-main)",cursor:"pointer",lineHeight:1.3,flexShrink:0}}
                      onMouseEnter={e=>{e.currentTarget.style.background="#a78bfa33";e.currentTarget.style.borderColor="#a78bfa";}}
                      onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="var(--panel-border)";}}>
                      {s}
                    </button>
                  ))}
                </div>
              )}
              <textarea ref={textareaRef} style={{...S.inp,minHeight:80,resize:"vertical",lineHeight:1.4,fontSize:11}} value={node.text} onChange={e=>onUpNode({text:e.target.value})}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:8}}>
                <div>
                  <label style={S.lbl}>Type</label>
                  <select style={S.inp} value={node.type} onChange={e=>onUpNode({type:e.target.value})}>
                    {Object.entries(TYPES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                  </select>
                </div>
                <div>
                  <label style={S.lbl}>Basis-konfidens</label>
                  <div style={{display:"flex",alignItems:"center",gap:4,marginTop:4}}>
                    <input type="range" min={0} max={1} step={0.05} value={node.confidence??0.5} onChange={e=>onUpNode({confidence:+e.target.value})} style={{flex:1,accentColor:meta.color}}/>

                  </div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:8}}>
                <div>
                  <label style={S.lbl}>Holon-type</label>
                  <select style={S.inp} value={node.holonType??"entity"} onChange={e=>onUpNode({holonType:e.target.value})}>
                    {HOLON_TYPE.map(h=><option key={h.key} value={h.key}>{h.label}</option>)}
                  </select>
                </div>
                <div>
                  <label style={S.lbl}>Temporal status</label>
                  <select style={S.inp} value={node.temporalStatus??""} onChange={e=>onUpNode({temporalStatus:e.target.value||null})}>
                    <option value="">— ingen —</option>
                    {TEMPORAL_STATUS.map(t=><option key={t.key} value={t.key}>{t.sym} {t.label}</option>)}
                  </select>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:6}}>
                <div>
                  <label style={S.lbl}>Ontologisk niveau</label>
                  <select style={S.inp} value={node.ontologiskNiveau??"proposition"} onChange={e=>onUpNode({ontologiskNiveau:e.target.value})}>
                    {ONTOLOGISK_NIVEAU.map(n=><option key={n.key} value={n.key}>{n.sym} {n.label.split(" — ")[0]}</option>)}
                  </select>
                </div>
                <div>
                  <label style={S.lbl}>Sandhedsstratum</label>
                  <select style={S.inp} value={node.sandhedsStratum??""} onChange={e=>onUpNode({sandhedsStratum:e.target.value||null})}>
                    <option value="">— ingen —</option>
                    {SANDHEDSSTRATUM.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
                  </select>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                <label style={{...S.lbl,marginBottom:0,cursor:"pointer"}}>
                  <input type="checkbox" checked={node.isQuestion??false} onChange={e=>onUpNode({isQuestion:e.target.checked})} style={{marginRight:4,accentColor:meta.color}}/>
                  Er spørgsmål (?)
                </label>
              </div>
            </>
          )}
          <div style={{display:"grid",gridTemplateColumns:isJunc?"1fr":"1fr 1fr",gap:5,marginTop:9}}>
            {!isJunc&&<button style={S.btn} onClick={onOpenNested}>⤵ Åbn</button>}
            <button style={{...S.btnAlt,color:"#f87171",borderColor:"#7f1d1d",gridColumn:isJunc?"1/3":""}} onClick={onDelNode}>🗑 Slet</button>
          </div>
        </>);
      })()}

      {!node&&!edge&&(
        <div style={{color:"var(--text-soft)",fontSize:11,padding:"16px 0",textAlign:"center",border:"1px dashed var(--panel-border)",borderRadius:9}}>Klik en node eller en kant</div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   TREE ITEM
══════════════════════════════════════════════════════════ */
function TreeItem({node,nodes,selNodeId,focusId,treeQ,depth,onSelect,onOpen,cc,strengths}){
  const [exp,setExp]=useState(depth<2);
  const children=nodes.filter(n=>n.parentId===node.id);
  if(treeQ&&!matches(node,nodes,treeQ))return null;
  const meta=TYPES[node.type]||TYPES.premise;
  const s=strengths?.[node.id]??0;
  return(
    <div style={{marginLeft:depth*9}}>
      <div style={{display:"flex",alignItems:"center",gap:3,padding:"3px 5px",borderRadius:6,background:selNodeId===node.id?"var(--slot-active-bg)":"transparent",marginBottom:2}}>
        <button style={{background:"none",border:"none",padding:0,cursor:"pointer",color:"var(--text-soft)",fontSize:9,minWidth:9,fontFamily:"monospace"}} onClick={()=>setExp(x=>!x)}>{children.length>0?(exp?"▾":"▸"):"·"}</button>
        <span style={{fontSize:8,color:"var(--text-soft)",fontWeight:700,minWidth:18}}>T{(node.slot??0)+1}</span>
        {node.tag&&<span style={{fontSize:11,lineHeight:1,minWidth:14,textAlign:"center"}}>{node.tag}</span>}
        <div style={{flex:1,cursor:"pointer",minWidth:0}} onClick={()=>onSelect(node.id)}>
          <div style={{fontSize:10,fontWeight:600,color:meta.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{node.title}</div>
          <div style={{fontSize:8.5,color:sCol(s)}}>{Math.round(s*100)}% {sLbl(s)}</div>
        </div>
        <button style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-soft)",fontSize:9}} onClick={()=>onOpen(node.id)}>⤵</button>
      </div>
      {exp&&children.map(c=><TreeItem key={c.id} node={c} nodes={nodes} selNodeId={selNodeId} focusId={focusId} treeQ={treeQ} depth={depth+1} onSelect={onSelect} onOpen={onOpen} cc={cc} strengths={strengths}/>)}
    </div>
  );
}

  halo_effect:{type:'bias',da:'Glorieeffekten',desc:'Et positivt indtryk på ét område påvirker bedømmelse på andre.'},
  optimism_bias:{type:'bias',da:'Optimismebias',desc:'At overvurdere sandsynlighed for positive udfald.'},
  sunk_cost:{type:'bias',da:'Tabte omkostninger',desc:'At fortsætte fordi man allerede har investeret selvom det er bedst at stoppe.'},
};
const PT_KEYS=Object.keys(PT_REF);

/* ══════════════════════════════════════════════════════════
   PROPOSITION TESTER MODAL
══════════════════════════════════════════════════════════ */
function PropositionModal({nodeId,nodeTitle,nodeText,onClose}){
  const [tab,setTab]=useState('prop');
  const [propInput,setPropInput]=useState(nodeText||nodeTitle||'');
  const [kvInput,setKvInput]=useState('');
  const [propCells,setPropCells]=useState({te:'',fe:'',tc:'',fc:''});
  const [kvCells,setKvCells]=useState({kk:'',ku:'',uk:'',uu:''});
  const [propFb,setPropFb]=useState(null);
  const [kvFb,setKvFb]=useState(null);
  // Competing hypotheses tab
  const [hypDatum,setHypDatum]=useState(nodeText||nodeTitle||'');
  const [hypotheses,setHypotheses]=useState([{id:uid(),title:'Hypotese 1',cells:{te:'',fe:'',tc:'',fc:''}}]);
  const [hypFb,setHypFb]=useState(null);
  const [loading,setLoading]=useState(false);
  const [loadText,setLoadText]=useState('');
  const [error,setError]=useState('');

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY_PROP_TESTER);
      const store = raw ? JSON.parse(raw) : {};
      const saved = nodeId ? store[nodeId] : null;
      if (saved) {
        setTab(saved.tab || 'prop');
        setPropInput(saved.propInput || nodeText || nodeTitle || '');
        setKvInput(saved.kvInput || '');
        setPropCells(saved.propCells || {te:'',fe:'',tc:'',fc:''});
        setKvCells(saved.kvCells || {kk:'',ku:'',uk:'',uu:''});
        setPropFb(saved.propFb || null);
        setKvFb(saved.kvFb || null);
        setHypDatum(saved.hypDatum || nodeText || nodeTitle || '');
        setHypotheses(saved.hypotheses || [{id:uid(),title:'Hypotese 1',cells:{te:'',fe:'',tc:'',fc:''}}]);
        setHypFb(saved.hypFb || null);
      } else {
        setTab('prop');
        setPropInput(nodeText || nodeTitle || '');
        setKvInput('');
        setPropCells({te:'',fe:'',tc:'',fc:''});
        setKvCells({kk:'',ku:'',uk:'',uu:''});
        setPropFb(null);
        setKvFb(null);
        setHypDatum(nodeText || nodeTitle || '');
        setHypotheses([{id:uid(),title:'Hypotese 1',cells:{te:'',fe:'',tc:'',fc:''}}]);
        setHypFb(null);
      }
      setError('');
    } catch (err) {
      console.error('PropositionModal Restore Error:', err);
    }
  }, [nodeId, nodeText, nodeTitle]);

  useEffect(() => {
    if (!nodeId) return;
    try {
      const raw = localStorage.getItem(STORAGE_KEY_PROP_TESTER);
      const store = raw ? JSON.parse(raw) : {};
      store[nodeId] = {
        nodeTitle,
        nodeText,
        tab,
        propInput,
        kvInput,
        propCells,
        kvCells,
        propFb,
        kvFb,
        hypDatum,
        hypotheses,
        hypFb,
        updatedAt: new Date().toISOString()
      };
      localStorage.setItem(STORAGE_KEY_PROP_TESTER, JSON.stringify(store));
    } catch (err) {
      console.error('PropositionModal Save Error:', err);
    }
  }, [nodeId, nodeTitle, nodeText, tab, propInput, kvInput, propCells, kvCells, propFb, kvFb, hypDatum, hypotheses, hypFb]);

  const PROP_CELLS=[
    {id:'te',key:'sandt_bevis',   label:'Sandt Bevis',    ph:'Sande beviser (ét per linje)…',    bg:'#0a1f14',tc:'#6ee7b7'},
    {id:'fe',key:'falsk_bevis',   label:'Falsk Bevis',    ph:'Falske beviser (ét per linje)…',   bg:'#1a0a0f',tc:'#fda4af'},
    {id:'tc',key:'sandt_modbevis',label:'Sandt Modbevis', ph:'Sande modbeviser (ét per linje)…', bg:'#0a1020',tc:'#7dd3fc'},
    {id:'fc',key:'falsk_modbevis',label:'Falsk Modbevis', ph:'Falske modbeviser (ét per linje)…',bg:'#1a1006',tc:'#fdba74'},
  ];
  const KV_CELLS=[
    {id:'kk',key:'kendt_viden',       label:'Kendt Viden',      ph:'Ting du ved du ved…',          tc:'#6ee7b7'},
    {id:'ku',key:'kendt_ikke_viden',  label:'Kendt Ikke-viden', ph:'Ting du ved du ikke ved…',     tc:'#fda4af'},
    {id:'uk',key:'ukendt_viden',      label:'Ukendt Viden',     ph:'Tavs/ubevidst viden…',         tc:'#7dd3fc'},
    {id:'uu',key:'ukendt_ikke_viden', label:'Ukendt Ikke-viden',ph:'Blinde pletter…',              tc:'#fdba74'},
  ];

  const getLines=(txt)=>txt.trim().split('\n').map(l=>l.trim()).filter(l=>l);

  const renderTag=(key)=>{
    const r=PT_REF[key];if(!r)return null;
    const isFal=r.type==='fallacy';
    return <span title={r.desc} style={{display:'inline-block',marginLeft:4,padding:'1px 5px',fontSize:9,fontWeight:700,borderRadius:4,
      background:isFal?'rgba(239,68,68,.15)':'rgba(251,191,36,.15)',
      color:isFal?'#f87171':'#fbbf24',
      border:`1px solid ${isFal?'rgba(239,68,68,.3)':'rgba(251,191,36,.3)'}`}}>{r.da}</span>;
  };

  const renderCellFb=(key,fb)=>{
    const items=fb?.[key];
    if(!items||!items.length)return null;
    const isEx=!!fb._examples;
    if(isEx)return(
      <div style={{marginTop:6,borderTop:'1px dashed #334155',paddingTop:6}}>
        <ul style={{listStyle:'none',padding:0,margin:0}}>
          {items.map((item,i)=><li key={i} style={{fontSize:11,color:'#94a3b8',padding:'2px 0 2px 10px',position:'relative',marginBottom:2}}>
            <span style={{position:'absolute',left:0,top:'0.55em',width:4,height:4,borderRadius:'50%',background:'#475569',display:'block'}}/>
            {typeof item==='string'?item:item.punkt}{renderTag(typeof item==='object'?item.ref:null)}
          </li>)}
        </ul>
      </div>
    );
    return(
      <div style={{marginTop:6,borderTop:'1px dashed #334155',paddingTop:6}}>
        {items.map((item,i)=>(
          <div key={i} style={{marginBottom:6}}>
            <div style={{fontSize:11,fontWeight:600,color:'#e2e8f0',marginBottom:2}}>{item.korrekt_placeret===false?'❌':'✅'} {item.bruger_tekst||''}</div>
            <div style={{fontSize:10,color:'#c4b5fd',borderLeft:'3px solid #8b5cf6',paddingLeft:6,background:'rgba(139,92,246,.08)',borderRadius:'0 4px 4px 0',lineHeight:1.4}}>
              {item.kommentar||''}{renderTag(item.ref)}
            </div>
          </div>
        ))}
      </div>
    );
  };

  async function runPropSubmit(){
    if(!propInput.trim()){setError('Skriv en proposition.');return;}
    const entries={};let hasAny=false;
    PROP_CELLS.forEach(c=>{const ls=getLines(propCells[c.id]);entries[c.key]=ls;if(ls.length)hasAny=true;});
    if(!hasAny){setError('Udfyld mindst én kvadrant.');return;}
    setLoading(true);setLoadText('Analyserer…');setError('');
    const prompt=`Du er en kritisk sparringspartner ekspert i logiske fejlslutninger og kognitive bias.\n\nPROPOSITION: "${propInput}"\n\nAnalysér brugerens belæg i en 2x2 sandhedsmatrice:\n${PROP_CELLS.map(c=>`"${c.key}": ${JSON.stringify(entries[c.key])}`).join('\n')}\n\nBrug KUN disse ref-nøgler: ${PT_KEYS.join(', ')}\n\nSvar KUN med valid JSON:\n{"sandt_bevis":[{"bruger_tekst":"...","kommentar":"...","ref":"nøgle","korrekt_placeret":true}],"falsk_bevis":[...],"sandt_modbevis":[...],"falsk_modbevis":[]}\n\nSkriv på dansk.`;
    try{const parsed=await callGeminiJson(prompt);setPropFb(parsed);}
    catch(e){setError('Fejl: '+e.message);}
    finally{setLoading(false);}
  }

  async function runPropExamples(){
    if(!propInput.trim()){setError('Skriv en proposition.');return;}
    setLoading(true);setLoadText('Genererer eksempler…');setError('');
    const prompt=`Generer MINDST 7 eksempler per felt i en 2x2 sandhedsmatrice for propositionen: "${propInput}".\n\nFelterne: sandt_bevis (sande fakta der understøtter), falsk_bevis (fejlagtige beviser), sandt_modbevis (sande fakta der modsiger), falsk_modbevis (fejlagtige modbeviser).\n\nSvar KUN med valid JSON:\n{"sandt_bevis":[{"punkt":"...","ref":"nøgle"}],"falsk_bevis":[...],"sandt_modbevis":[...],"falsk_modbevis":[]}\n\nBrug KUN disse ref-nøgler: ${PT_KEYS.join(', ')}\nSkriv på dansk. Mindst 7 per felt.`;
    try{const parsed=await callGeminiJson(prompt);setPropFb({_examples:true,...parsed});}
    catch(e){setError('Fejl: '+e.message);}
    finally{setLoading(false);}
  }

  async function runKvSubmit(){
    if(!kvInput.trim()){setError('Skriv et emne.');return;}
    const entries={};let hasAny=false;
    KV_CELLS.forEach(c=>{const ls=getLines(kvCells[c.id]);entries[c.key]=ls;if(ls.length)hasAny=true;});
    if(!hasAny){setError('Udfyld mindst én kvadrant.');return;}
    setLoading(true);setLoadText('Analyserer…');setError('');
    const prompt=`Du er videns-analytiker.\n\nEMNE: "${kvInput}"\n\nAnalysér brugerens Johari-matrice:\n${KV_CELLS.map(c=>`"${c.key}": ${JSON.stringify(entries[c.key])}`).join('\n')}\n\nBrug KUN disse ref-nøgler: ${PT_KEYS.join(', ')}\n\nSvar KUN med valid JSON:\n{"kendt_viden":[{"bruger_tekst":"...","kommentar":"...","ref":"nøgle","korrekt_placeret":true}],"kendt_ikke_viden":[...],"ukendt_viden":[...],"ukendt_ikke_viden":[]}\n\nSkriv på dansk.`;
    try{const parsed=await callGeminiJson(prompt);setKvFb(parsed);}
    catch(e){setError('Fejl: '+e.message);}
    finally{setLoading(false);}
  }

  async function runKvExamples(){
    if(!kvInput.trim()){setError('Skriv et emne.');return;}
    setLoading(true);setLoadText('Genererer eksempler…');setError('');
    const prompt=`Udfyld en Johari-vindue/Rumsfeld-matrice med MINDST 7 punkter per kvadrant for emnet: "${kvInput}".\n\nKvadranterne: kendt_viden (Known Knowns), kendt_ikke_viden (Known Unknowns), ukendt_viden (Unknown Knowns/tavs viden), ukendt_ikke_viden (Unknown Unknowns/blinde pletter).\n\nSvar KUN med valid JSON:\n{"kendt_viden":[{"punkt":"...","ref":"nøgle"}],"kendt_ikke_viden":[...],"ukendt_viden":[...],"ukendt_ikke_viden":[]}\n\nBrug KUN disse ref-nøgler: ${PT_KEYS.join(', ')}\nSkriv på dansk. Mindst 7 per felt. Vær specifik og overraskende.`;
    try{const parsed=await callGeminiJson(prompt);setKvFb({_examples:true,...parsed});}
    catch(e){setError('Fejl: '+e.message);}
    finally{setLoading(false);}
  }

  // ── Competing hypotheses helpers ───────────────────────
  const addHyp=()=>setHypotheses(h=>[...h,{id:uid(),title:`Hypotese ${h.length+1}`,cells:{te:'',fe:'',tc:'',fc:''}}]);
  const removeHyp=(id)=>setHypotheses(h=>h.filter(x=>x.id!==id));
  const updHypTitle=(id,v)=>setHypotheses(h=>h.map(x=>x.id===id?{...x,title:v}:x));
  const updHypCell=(id,cell,v)=>setHypotheses(h=>h.map(x=>x.id===id?{...x,cells:{...x.cells,[cell]:v}}:x));

  const HYP_COLS=[
    {key:'te',colLabel:'BEVIS',    rowLabel:'SAND',  bg:'#0a1f14',tc:'#6ee7b7',ph:'Sande beviser (ét per linje)…'},
    {key:'tc',colLabel:'MODBEVIS', rowLabel:'SAND',  bg:'#0a1020',tc:'#7dd3fc',ph:'Sande modbeviser (ét per linje)…'},
    {key:'fe',colLabel:'BEVIS',    rowLabel:'FALSK', bg:'#1a0a0f',tc:'#fda4af',ph:'Falske beviser (ét per linje)…'},
    {key:'fc',colLabel:'MODBEVIS', rowLabel:'FALSK', bg:'#1a1006',tc:'#fdba74',ph:'Falske modbeviser (ét per linje)…'},
  ];

  async function runHypSubmit(){
    if(!hypDatum.trim()){setError('Skriv et faktum/datum.');return;}
    if(hypotheses.length===0){setError('Tilføj mindst én hypotese.');return;}
    setLoading(true);setLoadText('Sammenligner hypoteser…');setError('');setHypFb(null);
    const hypData=hypotheses.map(h=>({
      titel:h.title,
      sandt_bevis:getLines(h.cells.te),
      falsk_bevis:getLines(h.cells.fe),
      sandt_modbevis:getLines(h.cells.tc),
      falsk_modbevis:getLines(h.cells.fc),
    }));
    const prompt=`Du er ekspert i "Inference to the Best Explanation" (IBE) og "Analysis of Competing Hypotheses" (ACH).\n\nFAKTUM/DATUM: "${hypDatum}"\n\nKONKURRERENDE HYPOTESER:\n${JSON.stringify(hypData,null,2)}\n\nFor hver hypotese:\n- Vurder hvor godt den forklarer faktumet (styrke 0.0-1.0)\n- Identificer logiske svagheder og styrker\n- Overvej falsificerbarhed\n\nSvar KUN med valid JSON:\n{"analyse":[{"hypotese":"...","styrke":0.0,"styrker":["..."],"svagheder":["..."],"kommentar":"..."}],"konklusion":"...","bedste_hypotese":"..."}\n\nSkriv på dansk.`;
    try{const parsed=await callGeminiJson(prompt);setHypFb(parsed);}
    catch(e){setError('Fejl: '+e.message);}
    finally{setLoading(false);}
  }

  const BtnPri=({onClick,children,dis})=>(
    <button disabled={dis} onClick={onClick} style={{padding:'6px 14px',background:dis?'#1e293b':'linear-gradient(135deg,#3b82f6,#6366f1)',color:dis?'#475569':'#fff',border:'none',borderRadius:7,cursor:dis?'not-allowed':'pointer',fontSize:11,fontWeight:700,flexShrink:0}}>{children}</button>
  );
  const BtnSec=({onClick,children,dis})=>(
    <button disabled={dis} onClick={onClick} style={{padding:'6px 14px',background:dis?'#1e293b':'linear-gradient(135deg,#8b5cf6,#a855f7)',color:dis?'#475569':'#fff',border:'none',borderRadius:7,cursor:dis?'not-allowed':'pointer',fontSize:11,fontWeight:700,flexShrink:0}}>{children}</button>
  );

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.9)',zIndex:10000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:'#0f0f1a',border:'1px solid #1e293b',borderRadius:16,width:'min(1100px,98vw)',maxHeight:'95vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 24px 80px rgba(0,0,0,0.95)'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',borderBottom:'1px solid #1e293b',flexShrink:0,background:'#0a0a14'}}>
          <h2 style={{fontSize:14,fontWeight:800,background:'linear-gradient(135deg,#6ee7b7,#3b82f6)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',margin:0,whiteSpace:'nowrap'}}>⊞ Propositions-tester</h2>
          <span style={{fontSize:11,color:'#475569',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>analyserer: "{nodeTitle}"</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#475569',fontSize:20,cursor:'pointer',lineHeight:1,padding:'0 4px',flexShrink:0}}>✕</button>
        </div>
        {/* Tabs */}
        <div style={{display:'flex',gap:0,padding:'0 16px',borderBottom:'2px solid #1e293b',flexShrink:0,background:'#0a0a14'}}>
          {[['prop','Propositions-tester'],['kv','Kendt Viden-tester'],['hyp','Konkurrerende hypoteser']].map(([k,l])=>(
            <button key={k} onClick={()=>{setTab(k);setError('');}} style={{padding:'8px 16px',border:'none',background:'transparent',color:tab===k?'#e2e8f0':'#475569',fontWeight:tab===k?700:400,fontSize:12,cursor:'pointer',borderBottom:`3px solid ${tab===k?'#3b82f6':'transparent'}`,marginBottom:-2,transition:'color .15s'}}>
              {l}
            </button>
          ))}
        </div>
        {/* Body */}
        <div style={{flex:1,overflow:'auto',padding:14}}>
          {error&&<div style={{color:'#f87171',fontSize:11,marginBottom:8,padding:'6px 10px',background:'rgba(239,68,68,.08)',borderRadius:6}}>{error}</div>}
          {loading&&<div style={{textAlign:'center',padding:'10px',color:'#64748b',fontSize:12,marginBottom:6}}><span style={{animation:'blink 0.7s infinite',display:'inline-block'}}>⟳</span> {loadText}</div>}

          {tab==='prop'&&(
            <>
              <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'center'}}>
                <input value={propInput} onChange={e=>setPropInput(e.target.value)}
                  placeholder='Proposition: f.eks. "Calcium er et metal"'
                  style={{flex:1,padding:'7px 10px',border:'1px solid #1e293b',borderRadius:7,background:'#1a1a2e',color:'#e2e8f0',fontSize:12,outline:'none'}}/>
                <BtnPri onClick={runPropSubmit} dis={loading}>Submit</BtnPri>
                <BtnSec onClick={runPropExamples} dis={loading}>Eksempler</BtnSec>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {[PROP_CELLS.slice(0,2),PROP_CELLS.slice(2,4)].map((col,ci)=>(
                  <div key={ci} style={{display:'grid',gridTemplateRows:'1fr 1fr',gap:8}}>
                    {col.map(c=>(
                      <div key={c.id} style={{background:c.bg,border:'1px solid rgba(255,255,255,0.06)',borderRadius:10,padding:10,display:'flex',flexDirection:'column'}}>
                        <div style={{fontSize:9,fontWeight:800,color:c.tc,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>{c.label}</div>
                        <textarea value={propCells[c.id]} onChange={e=>setPropCells(p=>({...p,[c.id]:e.target.value}))}
                          placeholder={c.ph}
                          style={{width:'100%',minHeight:80,flex:1,background:'transparent',border:'none',color:'#c8ccd4',fontSize:11,resize:'vertical',outline:'none',lineHeight:1.5,fontFamily:'inherit'}}/>
                        {propFb&&renderCellFb(c.key,propFb)}
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </>
          )}

          {tab==='kv'&&(
            <>
              <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'center'}}>
                <input value={kvInput} onChange={e=>setKvInput(e.target.value)}
                  placeholder='Emne: f.eks. "Kunstig intelligens"'
                  style={{flex:1,padding:'7px 10px',border:'1px solid #1e293b',borderRadius:7,background:'#1a1a2e',color:'#e2e8f0',fontSize:12,outline:'none'}}/>
                <BtnPri onClick={runKvSubmit} dis={loading}>Submit</BtnPri>
                <BtnSec onClick={runKvExamples} dis={loading}>Eksempler</BtnSec>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {[KV_CELLS.slice(0,2),KV_CELLS.slice(2,4)].map((col,ci)=>(
                  <div key={ci} style={{display:'grid',gridTemplateRows:'1fr 1fr',gap:8}}>
                    {col.map(c=>(
                      <div key={c.id} style={{background:'#0f0f20',border:'1px solid #1e293b',borderRadius:10,padding:10,display:'flex',flexDirection:'column'}}>
                        <div style={{fontSize:9,fontWeight:800,color:c.tc,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>{c.label}</div>
                        <textarea value={kvCells[c.id]} onChange={e=>setKvCells(p=>({...p,[c.id]:e.target.value}))}
                          placeholder={c.ph}
                          style={{width:'100%',minHeight:80,flex:1,background:'transparent',border:'none',color:'#c8ccd4',fontSize:11,resize:'vertical',outline:'none',lineHeight:1.5,fontFamily:'inherit'}}/>
                        {kvFb&&renderCellFb(c.key,kvFb)}
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </>
          )}
          {tab==='hyp'&&(
            <>
              {/* Datum input */}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:9,fontWeight:800,color:'#94a3b8',letterSpacing:'0.08em',marginBottom:5}}>FAKTUM / DATUM — hvad er det observerede faktum?</div>
                <input value={hypDatum} onChange={e=>setHypDatum(e.target.value)}
                  placeholder='F.eks. "Patienten har feber og hoste"'
                  style={{width:'100%',padding:'8px 12px',border:'1px solid #334155',borderRadius:8,background:'#0f172a',color:'#e2e8f0',fontSize:12,outline:'none',boxSizing:'border-box'}}/>
              </div>

              {/* Hypothesis cards */}
              <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:12}}>
                {hypotheses.map((hyp,hi)=>{
                  const fbItem=hypFb?.analyse?.find(a=>a.hypotese===hyp.title||a.hypotese===`Hypotese ${hi+1}`);
                  return(
                    <div key={hyp.id} style={{border:'1px solid #1e3a5f',borderRadius:12,overflow:'hidden',background:'#080d18'}}>
                      {/* Hypothesis header */}
                      <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'#0d1b2e',borderBottom:'1px solid #1e3a5f'}}>
                        <span style={{fontSize:10,fontWeight:800,color:'#7dd3fc',minWidth:28}}>H{hi+1}</span>
                        <input value={hyp.title} onChange={e=>updHypTitle(hyp.id,e.target.value)}
                          style={{flex:1,background:'transparent',border:'none',color:'#e2e8f0',fontSize:13,fontWeight:700,outline:'none',fontFamily:'inherit'}}/>
                        {fbItem&&(
                          <span style={{fontSize:11,fontWeight:800,padding:'2px 8px',borderRadius:6,
                            background:fbItem.styrke>0.6?'rgba(34,197,94,.15)':fbItem.styrke>0.35?'rgba(251,191,36,.15)':'rgba(239,68,68,.15)',
                            color:fbItem.styrke>0.6?'#4ade80':fbItem.styrke>0.35?'#fbbf24':'#f87171'}}>
                            {Math.round(fbItem.styrke*100)}%
                          </span>
                        )}
                        {hypotheses.length>1&&(
                          <button onClick={()=>removeHyp(hyp.id)} title="Fjern hypotese"
                            style={{background:'transparent',border:'none',color:'#64748b',cursor:'pointer',fontSize:14,padding:'0 4px',lineHeight:1}}>×</button>
                        )}
                      </div>

                      {/* 2×2 matrix */}
                      <div style={{display:'grid',gridTemplateColumns:'auto 1fr 1fr',gridTemplateRows:'auto 1fr 1fr'}}>
                        {/* Corner */}
                        <div style={{background:'#0a0f1a'}}/>
                        {/* Column headers */}
                        {['BEVIS','MODBEVIS'].map(h=>(
                          <div key={h} style={{padding:'5px 0',textAlign:'center',fontSize:9,fontWeight:800,color:'#94a3b8',letterSpacing:'0.08em',background:'#0a0f1a',borderBottom:'1px solid #1e293b'}}>{h}</div>
                        ))}
                        {/* Rows */}
                        {[['SAND','te','tc'],['FALSK','fe','fc']].map(([rowLbl,keyA,keyB])=>(
                          <React.Fragment key={rowLbl}>
                            <div style={{display:'flex',alignItems:'center',justifyContent:'center',writingMode:'vertical-rl',fontSize:9,fontWeight:800,color:'#94a3b8',letterSpacing:'0.1em',padding:'8px 5px',background:'#0a0f1a',borderRight:'1px solid #1e293b'}}>
                              {rowLbl}
                            </div>
                            {[keyA,keyB].map(cellKey=>{
                              const col=HYP_COLS.find(c=>c.key===cellKey);
                              return(
                                <div key={cellKey} style={{background:col.bg,border:'1px solid rgba(255,255,255,0.04)',padding:8,minHeight:80}}>
                                  <textarea value={hyp.cells[cellKey]} onChange={e=>updHypCell(hyp.id,cellKey,e.target.value)}
                                    placeholder={col.ph}
                                    style={{width:'100%',minHeight:70,background:'transparent',border:'none',color:'#c8ccd4',fontSize:11,resize:'vertical',outline:'none',lineHeight:1.5,fontFamily:'inherit',boxSizing:'border-box'}}/>
                                </div>
                              );
                            })}
                          </React.Fragment>
                        ))}
                      </div>

                      {/* AI feedback for this hypothesis */}
                      {fbItem&&(
                        <div style={{padding:'10px 14px',borderTop:'1px solid #1e293b',background:'#060b14'}}>
                          <div style={{fontSize:11,color:'#94a3b8',marginBottom:6,fontStyle:'italic'}}>{fbItem.kommentar}</div>
                          {fbItem.styrker?.length>0&&(
                            <div style={{marginBottom:4}}>
                              {fbItem.styrker.map((s,i)=><div key={i} style={{fontSize:10,color:'#4ade80',paddingLeft:10}}>✓ {s}</div>)}
                            </div>
                          )}
                          {fbItem.svagheder?.length>0&&(
                            <div>
                              {fbItem.svagheder.map((s,i)=><div key={i} style={{fontSize:10,color:'#f87171',paddingLeft:10}}>✗ {s}</div>)}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Add hypothesis + Submit */}
              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10}}>
                <button onClick={addHyp}
                  style={{padding:'6px 14px',background:'#1e293b',color:'#7dd3fc',border:'1px solid #1e3a5f',borderRadius:7,cursor:'pointer',fontSize:11,fontWeight:700}}>
                  + Tilføj hypotese
                </button>
                <BtnPri onClick={runHypSubmit} dis={loading}>⊞ Sammenlign med AI</BtnPri>
              </div>

              {/* Overall conclusion */}
              {hypFb?.konklusion&&(
                <div style={{padding:'12px 16px',background:'linear-gradient(135deg,rgba(59,130,246,.08),rgba(139,92,246,.08))',border:'1px solid #1e3a5f',borderRadius:10}}>
                  <div style={{fontSize:9,fontWeight:800,color:'#7dd3fc',letterSpacing:'0.08em',marginBottom:6}}>KONKLUSION — BEDSTE FORKLARING: {hypFb.bedste_hypotese}</div>
                  <div style={{fontSize:12,color:'#e2e8f0',lineHeight:1.6}}>{hypFb.konklusion}</div>
                </div>
              )}
            </>
          )}

        </div>
      </div>
    </div>
  );
}

function ConfirmDialog({title,message,confirmLabel,cancelLabel,onConfirm,onCancel}){
  return(
    <div
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:10001,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
      onClick={(e)=>{if(e.target===e.currentTarget)onCancel();}}>
      <div style={{width:"min(420px,96vw)",background:"var(--panel-bg)",border:"1px solid var(--panel-border)",borderRadius:14,boxShadow:"0 24px 80px rgba(0,0,0,0.35)",padding:16}}>
        <div style={{fontSize:16,fontWeight:800,color:"var(--text-main)",marginBottom:8}}>{title}</div>
        <div style={{fontSize:12,color:"var(--text-muted)",lineHeight:1.5,marginBottom:16}}>{message}</div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button style={S.btnAlt} onClick={onCancel}>{cancelLabel}</button>
          <button style={{...S.btn,background:"#dc2626"}} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

function AIChatPanel({open,onToggle,msgs,input,setInput,onSend,loading}){
  const endRef=useRef(null);
  useEffect(()=>{if(open&&endRef.current)endRef.current.scrollIntoView({behavior:'smooth'});},[msgs,open]);
  return(
    <>
      {/* Floating toggle button */}
      <button onClick={onToggle} title="AI-assistent til argumentkortet"
        style={{position:'fixed',bottom:20,right:20,zIndex:9990,width:50,height:50,borderRadius:'50%',
          background:open?'#1e293b':'linear-gradient(135deg,#3b82f6,#8b5cf6)',
          border:`2px solid ${open?'#475569':'transparent'}`,color:'#fff',fontSize:open?18:20,cursor:'pointer',
          boxShadow:'0 4px 20px rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',
          transition:'all 0.2s',userSelect:'none'}}>
        {open?'✕':'🤖'}
      </button>

      {/* Panel */}
      {open&&(
        <div style={{position:'fixed',right:20,bottom:82,zIndex:9980,width:360,height:'min(520px,72vh)',
          background:'#0c1220',border:'1px solid #1e293b',borderRadius:14,
          display:'flex',flexDirection:'column',boxShadow:'0 8px 40px rgba(0,0,0,0.9)',overflow:'hidden'}}>
          {/* Header */}
          <div style={{padding:'9px 14px',borderBottom:'1px solid #1e293b',flexShrink:0,background:'#080d18',display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:13,fontWeight:800,color:'#e2e8f0'}}>🤖 AI-Assistent</span>
            <span style={{fontSize:9,color:'#334155',flex:1}}>Gemini · kan redigere kortet</span>
            <button onClick={onToggle} title="Luk"
              style={{background:'transparent',border:'none',color:'#475569',cursor:'pointer',fontSize:15,lineHeight:1,padding:'0 2px'}}
              onMouseEnter={e=>e.currentTarget.style.color='#94a3b8'} onMouseLeave={e=>e.currentTarget.style.color='#475569'}>✕</button>
          </div>
          {/* Messages */}
          <div style={{flex:1,overflow:'auto',padding:'10px 12px',display:'flex',flexDirection:'column',gap:7}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                <div style={{maxWidth:'88%',padding:'7px 11px',borderRadius:10,fontSize:11,lineHeight:1.5,
                  background:m.role==='user'?'#1e3a5f':'#151f30',
                  color:m.role==='user'?'#bfdbfe':'#94a3b8',
                  borderBottomRightRadius:m.role==='user'?2:10,
                  borderBottomLeftRadius:m.role==='ai'?2:10,
                  whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
                  {m.text}
                </div>
              </div>
            ))}
            {loading&&(
              <div style={{display:'flex',justifyContent:'flex-start'}}>
                <div style={{padding:'7px 14px',borderRadius:10,background:'#151f30',color:'#475569',fontSize:13}}>
                  <span style={{animation:'blink 0.7s infinite',display:'inline-block'}}>●●●</span>
                </div>
              </div>
            )}
            <div ref={endRef}/>
          </div>
          {/* Input */}
          <div style={{padding:'8px 10px',borderTop:'1px solid #1e293b',display:'flex',gap:6,flexShrink:0,background:'#080d18'}}>
            <textarea value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();onSend(input);}}}
              placeholder="Spørg om kortet… Enter=send, Shift+Enter=ny linje"
              style={{flex:1,padding:'6px 8px',border:'1px solid #1e293b',borderRadius:8,background:'#07090f',
                color:'#e2e8f0',fontSize:11,resize:'none',outline:'none',minHeight:34,maxHeight:80,
                fontFamily:'inherit',lineHeight:1.4}}/>
            <button onClick={()=>onSend(input)} disabled={loading||!input.trim()}
              style={{padding:'6px 12px',background:loading||!input.trim()?'#1e293b':'#3b82f6',color:'#fff',
                border:'none',borderRadius:8,cursor:loading||!input.trim()?'not-allowed':'pointer',
                fontSize:14,fontWeight:700,opacity:loading||!input.trim()?0.4:1,flexShrink:0,alignSelf:'flex-end'}}>
              ↑
            </button>
          </div>
        </div>
      )}
    </>
  );
}
function ClusterCard({node, nodes, selected, zoom, onClick, onMove, onConnStart, dragConnActive, isHoverTarget, onMultiDragStart, isMultiSelected, onUpNode}){
  const b = getNodeBounds(node, nodes);
  const {x, y, w, h} = b, absX = x, absY = y;
  const nodeColor = TYPES.cluster.color;
  
  const onPD=(e)=>{
    if(e.button!==0)return; e.stopPropagation();
    if(e.shiftKey){ onMultiDragStart?.(); return; }
    const sx=e.clientX, sy=e.clientY;
    const initialPos = {x:absX, y:absY};
    let moved=false;
    const move=(me)=>{
      const dx=(me.clientX-sx)/zoom, dy=(me.clientY-sy)/zoom;
      if(Math.abs(dx)>2||Math.abs(dy)>2)moved=true;
      onMove(initialPos.x+dx, initialPos.y+dy);
    };
    const up=()=>{
      window.removeEventListener("pointermove",move);
      window.removeEventListener("pointerup",up);
      if(!moved)onClick();
    };
    window.addEventListener("pointermove",move);
    window.addEventListener("pointerup",up);
  };

  const hStyle=(snap)=>({
    position:"absolute",transform:"translate(-50%,-50%)",
    width:12,height:12,borderRadius:"50%",
    background:snap?"#10b981":nodeColor,
    border:"2.5px solid #07090f",cursor:"crosshair",zIndex:20,
    boxShadow:snap?"0 0 10px #10b981":"0 0 5px rgba(0,0,0,0.4)",
    opacity:dragConnActive?(snap?1:0.35):0.85,
  });

  const nHandles=[
    {lx:w/2, ly:-4,   cx:absX+w/2, cy:absY,    port:"top"},
    {lx:w+4, ly:h/2,  cx:absX+w,   cy:absY+h/2, port:"right"},
    {lx:w/2, ly:h+4,  cx:absX+w/2, cy:absY+h,   port:"bottom"},
    {lx:-4,  ly:h/2,  cx:absX,     cy:absY+h/2, port:"left"},
  ];

  return(
    <div onPointerDown={onPD}
      style={{position:"absolute",left:absX,top:absY,width:w,height:h,
        background:"rgba(249, 115, 22, 0.04)",
        border:`2px ${selected?"dashed":"solid"} ${selected?"#f97316":isHoverTarget?"#10b981":isMultiSelected?"#3b82f6":"#f9731633"}`,
        borderRadius:22,cursor:"grab",zIndex:1,
        backdropFilter:"blur(2px)",
        boxShadow:selected?"0 0 0 4px #f9731622":isHoverTarget?"0 0 0 4px #10b98122":"0 4px 24px rgba(0,0,0,0.3)"}}>
      <div style={{height:34,background:"rgba(249, 115, 22, 0.08)",borderBottom:"1px solid #f9731633",borderRadius:"20px 20px 0 0",display:"flex",alignItems:"center",padding:"0 18px"}}>
        <span style={{fontSize:11,fontWeight:900,color:"#f97316",letterSpacing:"0.08em",textTransform:"uppercase"}}>{node.title}</span>
        <button onClick={e=>{e.stopPropagation();if(confirm("Slet cluster? (Noderne slettes ikke)"))onUpNode({deleted:true});}}
          style={{marginLeft:"auto",background:"transparent",border:"none",color:"#f9731666",cursor:"pointer",fontSize:13}}>✕</button>
      </div>
      {nHandles.map((h,i)=>(
        <div key={i} data-handle="1" style={{...hStyle(isHoverTarget && dragConnActive),left:h.lx,top:h.ly}}
          onPointerDown={e=>{e.stopPropagation();e.preventDefault();onConnStart(node.id,h.cx,h.cy,h.port);}}/>
      ))}
    </div>
  );
}
