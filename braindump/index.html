<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Braindump Memo</title>
    <script src="/auth.js"></script>
    <style>
      :root {
        --bg: #0b0f14;
        --panel: #111820;
        --panel-2: #18222d;
        --line: rgba(255, 255, 255, 0.16);
        --text: #f4f7fb;
        --muted: #98a8b9;
        --accent: #74d7ff;
        --accent-strong: #31bfff;
        --mark: #9de4ff;
        --danger: #ff645f;
        --shadow: rgba(0, 0, 0, 0.36);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        color: var(--text);
        background:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          #0b0f14;
        background-size: 32px 32px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body.light-theme {
        --bg: #eef4f8;
        --panel: #ffffff;
        --panel-2: #d9e8ef;
        --line: rgba(34, 58, 74, 0.2);
        --text: #152532;
        --muted: #607486;
        --accent: #0d8fbd;
        --accent-strong: #007fba;
        --shadow: rgba(32, 54, 68, 0.18);
        background:
          linear-gradient(rgba(20, 54, 76, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(20, 54, 76, 0.08) 1px, transparent 1px),
          #eef4f8;
        background-size: 32px 32px;
      }

      button {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        height: 100%;
      }

      .topbar {
        z-index: 10;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 14px;
        min-height: 64px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
        background: rgba(13, 18, 24, 0.92);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .home {
        display: inline-grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel);
        text-decoration: none;
      }

      .home:focus-visible,
      .home:hover {
        outline: 0;
        border-color: var(--accent);
      }

      .home svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        margin: 0;
        font-size: 1rem;
        line-height: 1.1;
      }

      .tools {
        display: flex;
        justify-content: center;
        gap: 8px;
        min-width: 0;
      }

      .tool-button,
      .command-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-width: 42px;
        height: 38px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel);
        cursor: pointer;
      }

      .tool-button svg,
      .command-button svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .tool-button:hover,
      .tool-button:focus-visible,
      .command-button:hover,
      .command-button:focus-visible {
        outline: 0;
        border-color: var(--accent);
      }

      .tool-button.is-active {
        border-color: var(--accent-strong);
        background: #123140;
        color: #eefdff;
      }

      body.light-theme .tool-button.is-active {
        background: #d8f1fb;
        color: #123140;
      }

      .actions {
        display: flex;
        justify-content: end;
        gap: 8px;
      }

      .command-button.is-danger {
        color: #fff0ef;
      }

      .command-button.is-danger:hover,
      .command-button.is-danger:focus-visible {
        border-color: var(--danger);
      }

      #workspace {
        position: relative;
        overflow: hidden;
        min-width: 0;
        background:
          radial-gradient(circle at 50% 50%, rgba(116, 215, 255, 0.06), transparent 38%),
          transparent;
      }

      body.light-theme #workspace {
        background:
          radial-gradient(circle at 50% 50%, rgba(13, 143, 189, 0.12), transparent 38%),
          transparent;
      }

      #workspace.is-drop-target {
        outline: 3px solid var(--accent);
        outline-offset: -8px;
      }

      #pan {
        position: absolute;
        inset: 0;
        transform-origin: 0 0;
      }

      .empty-state {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        color: rgba(244, 247, 251, 0.36);
        font-size: clamp(2rem, 8vw, 5.8rem);
        font-weight: 900;
        letter-spacing: 0;
        pointer-events: none;
        user-select: none;
      }

      .image-node {
        position: absolute;
        left: 0;
        top: 0;
        width: 320px;
        height: 220px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: #06090d;
        box-shadow: 0 22px 54px var(--shadow);
        touch-action: none;
        user-select: none;
      }

      body.light-theme .image-node {
        background: #f8fbfd;
        border-color: rgba(34, 58, 74, 0.24);
      }

      .image-node.is-selected {
        border-color: var(--accent);
        box-shadow: 0 24px 62px rgba(49, 191, 255, 0.22);
      }

      .image-node img {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 7px;
        object-fit: fill;
        pointer-events: none;
      }

      .mark-layer {
        position: absolute;
        inset: 0;
        overflow: visible;
        border-radius: 7px;
        pointer-events: auto;
      }

      .mark-layer rect,
      .mark-layer path {
        vector-effect: non-scaling-stroke;
        cursor: grab;
        transition: fill 120ms ease;
      }

      .mark-layer rect:active,
      .mark-layer path:active {
        cursor: grabbing;
      }

      .mark-layer .mark.is-empty {
        fill: transparent;
      }

      .draw-preview {
        pointer-events: none;
        vector-effect: non-scaling-stroke;
      }

      .mark-resize-handle {
        fill: var(--accent);
        stroke: #092431;
        stroke-width: 2;
        vector-effect: non-scaling-stroke;
      }

      .mark-resize-handle[data-corner="nw"],
      .mark-resize-handle[data-corner="se"] {
        cursor: nwse-resize;
      }

      .mark-resize-handle[data-corner="ne"],
      .mark-resize-handle[data-corner="sw"] {
        cursor: nesw-resize;
      }

      body.light-theme .mark-resize-handle {
        stroke: #e7f7fc;
      }

      .resize-handle {
        position: absolute;
        width: 15px;
        height: 15px;
        border: 2px solid #092431;
        border-radius: 4px;
        background: var(--accent);
        opacity: 0;
        pointer-events: none;
      }

      body.light-theme .resize-handle {
        border-color: #e7f7fc;
      }

      .image-node.is-selected .resize-handle {
        opacity: 1;
        pointer-events: auto;
      }

      .resize-handle[data-corner="nw"] {
        left: -8px;
        top: -8px;
        cursor: nwse-resize;
      }

      .resize-handle[data-corner="ne"] {
        right: -8px;
        top: -8px;
        cursor: nesw-resize;
      }

      .resize-handle[data-corner="sw"] {
        left: -8px;
        bottom: -8px;
        cursor: nesw-resize;
      }

      .resize-handle[data-corner="se"] {
        right: -8px;
        bottom: -8px;
        cursor: nwse-resize;
      }

      .status {
        position: absolute;
        left: 12px;
        bottom: 12px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--muted);
        background: rgba(13, 18, 24, 0.82);
        font-size: 0.78rem;
        pointer-events: none;
      }

      body.light-theme .status {
        background: rgba(255, 255, 255, 0.86);
      }

      .context-menu {
        position: absolute;
        z-index: 30;
        min-width: 170px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(13, 18, 24, 0.96);
        box-shadow: 0 18px 44px var(--shadow);
        backdrop-filter: blur(16px);
      }

      .context-menu[hidden] {
        display: none;
      }

      .context-menu button {
        display: flex;
        align-items: center;
        width: 100%;
        min-height: 34px;
        border: 0;
        border-radius: 6px;
        padding: 0 10px;
        color: #fff0ef;
        background: transparent;
        cursor: pointer;
        font: inherit;
        font-size: 0.86rem;
        font-weight: 800;
        text-align: left;
      }

      .context-menu button:hover,
      .context-menu button:focus-visible {
        outline: 0;
        background: rgba(255, 100, 95, 0.16);
      }

      body.light-theme .context-menu {
        background: rgba(255, 255, 255, 0.96);
      }

      @media (max-width: 720px) {
        .topbar {
          grid-template-columns: 1fr;
          align-items: stretch;
        }

        .brand,
        .actions {
          justify-content: center;
        }

        .tools {
          flex-wrap: wrap;
        }

        .tool-button,
        .command-button {
          flex: 1 1 112px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <a class="home" href="../index.html" aria-label="Til start">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" /></svg>
          </a>
          <h1>Braindump Memo</h1>
        </div>

        <nav class="tools" aria-label="Værktøjer">
          <button class="tool-button is-active" type="button" data-tool="move" aria-pressed="true" title="Flyt">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v20M2 12h20M5 9l-3 3 3 3M19 9l3 3-3 3M9 5l3-3 3 3M9 19l3 3 3-3" /></svg>
            <span>Flyt</span>
          </button>
          <button class="tool-button" type="button" data-tool="rect" aria-pressed="false" title="Rektangel">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="1" /></svg>
            <span>Rektangel</span>
          </button>
          <button class="tool-button" type="button" data-tool="free" aria-pressed="false" title="Frihånd">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 17c2-8 5-10 7-7 2 4 3 7 9-3" /></svg>
            <span>Frihånd</span>
          </button>
        </nav>

        <div class="actions">
          <button class="command-button" type="button" id="themeToggle" title="Lyst tema" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19" /></svg>
            <span>Lys</span>
          </button>
          <button class="command-button" type="button" id="addDemo" title="Nyt felt">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
            <span>Memo</span>
          </button>
          <button class="command-button is-danger" type="button" id="clearBoard" title="Ryd">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15" /></svg>
          </button>
        </div>
      </header>

      <section id="workspace" aria-label="Braindump canvas">
        <div id="pan"></div>
        <div class="empty-state" id="emptyState">Braindump</div>
        <div class="status" id="status">Klar</div>
        <div class="context-menu" id="markContextMenu" hidden>
          <button type="button" id="deleteMark">Slet markering</button>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = 'eastwood451-braindump-memo-v1';
      const MARK_FILL = '#9de4ff';
      const MARK_STROKE = '#31bfff';
      const MARK_RECT_STROKE_WIDTH = 2;
      const MARK_FREE_STROKE_WIDTH = 3;
      const MIN_IMAGE_SIZE = 90;

      const workspace = document.getElementById('workspace');
      const pan = document.getElementById('pan');
      const emptyState = document.getElementById('emptyState');
      const statusEl = document.getElementById('status');
      const themeToggle = document.getElementById('themeToggle');
      const markContextMenu = document.getElementById('markContextMenu');
      const deleteMarkButton = document.getElementById('deleteMark');
      const toolButtons = Array.from(document.querySelectorAll('.tool-button'));

      const state = {
        tool: 'move',
        theme: 'dark',
        images: [],
        selectedId: null,
        selectedMarkId: null,
        contextMark: null,
      };

      let dragSession = null;
      let markDragSession = null;
      let markResizeSession = null;
      let resizeSession = null;
      let drawSession = null;
      let saveTimer = 0;

      function uid(prefix) {
        return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function scheduleSave() {
        window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(saveBoard, 180);
      }

      function saveBoard() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            images: state.images,
            selectedId: state.selectedId,
            selectedMarkId: state.selectedMarkId,
            theme: state.theme,
          }));
          setStatus('Gemt');
        } catch (error) {
          setStatus('Kunne ikke gemme lokalt');
        }
      }

      function loadBoard() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
          if (!saved || !Array.isArray(saved.images)) return;
          state.images = saved.images;
          state.selectedId = saved.selectedId || null;
          state.selectedMarkId = saved.selectedMarkId || null;
          state.theme = saved.theme === 'light' ? 'light' : 'dark';
        } catch (error) {
          state.images = [];
        }
      }

      function applyTheme() {
        const isLight = state.theme === 'light';
        document.body.classList.toggle('light-theme', isLight);
        themeToggle.setAttribute('aria-pressed', String(isLight));
        themeToggle.title = isLight ? 'Morkt tema' : 'Lyst tema';
        themeToggle.querySelector('span').textContent = isLight ? 'Mork' : 'Lys';
      }

      function toggleTheme() {
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        applyTheme();
        scheduleSave();
      }

      function setTool(tool) {
        state.tool = tool;
        toolButtons.forEach((button) => {
          const isActive = button.dataset.tool === tool;
          button.classList.toggle('is-active', isActive);
          button.setAttribute('aria-pressed', String(isActive));
        });
        workspace.style.cursor = tool === 'move' ? 'default' : 'crosshair';
      }

      function selectImage(id) {
        state.selectedId = id;
        if (!id) {
          state.selectedMarkId = null;
        } else {
          const image = getImage(id);
          if (!image?.marks.some((mark) => mark.id === state.selectedMarkId)) {
            state.selectedMarkId = null;
          }
        }

        document.querySelectorAll('.image-node').forEach((node) => {
          node.classList.toggle('is-selected', node.dataset.id === id);
        });
        scheduleSave();
      }

      function selectMark(imageId, markId) {
        state.selectedId = imageId;
        state.selectedMarkId = markId;
        document.querySelectorAll('.image-node').forEach((node) => {
          node.classList.toggle('is-selected', node.dataset.id === imageId);
        });
        scheduleSave();
      }

      function hideContextMenu() {
        markContextMenu.hidden = true;
        state.contextMark = null;
      }

      function showContextMenu(event, imageId, markId) {
        event.preventDefault();
        event.stopPropagation();
        const point = boardPointFromEvent(event);
        const menuWidth = 180;
        const menuHeight = 48;
        const x = clamp(point.x, 8, Math.max(8, workspace.clientWidth - menuWidth - 8));
        const y = clamp(point.y, 8, Math.max(8, workspace.clientHeight - menuHeight - 8));

        state.contextMark = { imageId, markId };
        selectMark(imageId, markId);
        render();
        markContextMenu.style.left = `${x}px`;
        markContextMenu.style.top = `${y}px`;
        markContextMenu.hidden = false;
      }

      function deleteSelectedMark() {
        const target = state.contextMark || (state.selectedId && state.selectedMarkId
          ? { imageId: state.selectedId, markId: state.selectedMarkId }
          : null);
        if (!target) return;

        const image = getImage(target.imageId);
        if (!image) return;
        image.marks = image.marks.filter((mark) => mark.id !== target.markId);
        state.selectedId = image.id;
        state.selectedMarkId = null;
        hideContextMenu();
        render();
        scheduleSave();
        setStatus('Markering slettet');
      }

      function removeMarkResizeHandles() {
        document.querySelectorAll('.mark-resize-handles').forEach((group) => group.remove());
      }

      function getImage(id) {
        return state.images.find((image) => image.id === id);
      }

      function boardPointFromEvent(event) {
        const rect = workspace.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top,
        };
      }

      function localPointFromEvent(node, event) {
        const target = node.querySelector('.mark-layer') || node;
        const rect = target.getBoundingClientRect();
        return {
          x: clamp(event.clientX - rect.left, 0, rect.width),
          y: clamp(event.clientY - rect.top, 0, rect.height),
          width: rect.width,
          height: rect.height,
        };
      }

      function toNormalized(point) {
        const width = Math.max(point.width || 1, 1);
        const height = Math.max(point.height || 1, 1);
        return {
          x: clamp(point.x / width, 0, 1),
          y: clamp(point.y / height, 0, 1),
        };
      }

      function svgPoint(point) {
        return `${(point.x * 1000).toFixed(1)},${(point.y * 1000).toFixed(1)}`;
      }

      function freehandPath(points) {
        if (!points.length) return '';
        return `M ${points.map(svgPoint).join(' L ')}`;
      }

      function markBounds(mark) {
        if (mark.type === 'rect') {
          return {
            minX: mark.x,
            maxX: mark.x + mark.w,
            minY: mark.y,
            maxY: mark.y + mark.h,
          };
        }

        return mark.points.reduce((bounds, point) => ({
          minX: Math.min(bounds.minX, point.x),
          maxX: Math.max(bounds.maxX, point.x),
          minY: Math.min(bounds.minY, point.y),
          maxY: Math.max(bounds.maxY, point.y),
        }), { minX: 1, maxX: 0, minY: 1, maxY: 0 });
      }

      function updateMarkElement(element, mark) {
        element.setAttribute('fill', mark.filled ? MARK_FILL : 'transparent');

        if (mark.type === 'rect') {
          element.setAttribute('x', String(mark.x * 1000));
          element.setAttribute('y', String(mark.y * 1000));
          element.setAttribute('width', String(mark.w * 1000));
          element.setAttribute('height', String(mark.h * 1000));
        } else {
          element.setAttribute('d', freehandPath(mark.points));
        }
      }

      function rectFromPoints(start, end) {
        const x = Math.min(start.x, end.x);
        const y = Math.min(start.y, end.y);
        const w = Math.abs(end.x - start.x);
        const h = Math.abs(end.y - start.y);
        return { x, y, w, h };
      }

      function createMarkResizeHandles(image, mark) {
        const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        group.classList.add('mark-resize-handles');
        group.dataset.imageId = image.id;
        group.dataset.markId = mark.id;

        const bounds = markBounds(mark);
        const handleSize = 34;
        const handles = [
          ['nw', bounds.minX, bounds.minY],
          ['ne', bounds.maxX, bounds.minY],
          ['sw', bounds.minX, bounds.maxY],
          ['se', bounds.maxX, bounds.maxY],
        ];

        handles.forEach(([corner, x, y]) => {
          const handle = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          handle.classList.add('mark-resize-handle');
          handle.dataset.corner = corner;
          handle.dataset.imageId = image.id;
          handle.dataset.markId = mark.id;
          handle.setAttribute('x', String(x * 1000 - handleSize / 2));
          handle.setAttribute('y', String(y * 1000 - handleSize / 2));
          handle.setAttribute('width', String(handleSize));
          handle.setAttribute('height', String(handleSize));
          handle.setAttribute('rx', '6');
          group.appendChild(handle);
        });

        return group;
      }

      function refreshMarkResizeHandles(image, mark) {
        const svg = document.querySelector(`.image-node[data-id="${image.id}"] .mark-layer`);
        if (!svg) return;
        svg.querySelectorAll('.mark-resize-handles').forEach((group) => group.remove());
        svg.appendChild(createMarkResizeHandles(image, mark));
      }

      function render() {
        pan.innerHTML = '';
        emptyState.hidden = state.images.length > 0;

        state.images.forEach((image) => {
          const node = document.createElement('article');
          node.className = 'image-node';
          node.dataset.id = image.id;
          node.style.transform = `translate(${image.x}px, ${image.y}px)`;
          node.style.width = `${image.w}px`;
          node.style.height = `${image.h}px`;
          node.classList.toggle('is-selected', image.id === state.selectedId);

          const img = document.createElement('img');
          img.src = image.src;
          img.alt = '';
          node.appendChild(img);

          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.classList.add('mark-layer');
          svg.setAttribute('viewBox', '0 0 1000 1000');
          svg.setAttribute('preserveAspectRatio', 'none');
          svg.dataset.imageId = image.id;

          image.marks.forEach((mark) => {
            const element = createMarkElement(mark);
            svg.appendChild(element);
          });

          if (image.id === state.selectedId && state.selectedMarkId) {
            const mark = image.marks.find((item) => item.id === state.selectedMarkId);
            if (mark) svg.appendChild(createMarkResizeHandles(image, mark));
          }

          node.appendChild(svg);

          ['nw', 'ne', 'sw', 'se'].forEach((corner) => {
            const handle = document.createElement('span');
            handle.className = 'resize-handle';
            handle.dataset.corner = corner;
            handle.setAttribute('aria-hidden', 'true');
            node.appendChild(handle);
          });

          pan.appendChild(node);
        });
      }

      function createMarkElement(mark) {
        const element = document.createElementNS('http://www.w3.org/2000/svg', mark.type === 'rect' ? 'rect' : 'path');
        element.classList.add('mark');
        element.dataset.markId = mark.id;
        element.setAttribute('stroke', MARK_STROKE);
        element.setAttribute('stroke-width', String(MARK_RECT_STROKE_WIDTH));
        element.setAttribute('stroke-linejoin', 'round');
        element.setAttribute('stroke-linecap', 'round');

        if (mark.type === 'rect') {
          updateMarkElement(element, mark);
        } else {
          element.setAttribute('stroke-width', String(MARK_FREE_STROKE_WIDTH));
          updateMarkElement(element, mark);
        }

        return element;
      }

      function addImage(src, naturalWidth, naturalHeight, position = null) {
        const bounds = workspace.getBoundingClientRect();
        const maxW = Math.max(220, bounds.width * 0.42);
        const maxH = Math.max(180, bounds.height * 0.48);
        const ratio = Math.min(maxW / naturalWidth, maxH / naturalHeight, 1);
        const width = Math.max(180, Math.round(naturalWidth * ratio));
        const height = Math.max(120, Math.round(naturalHeight * ratio));
        const count = state.images.length;

        const image = {
          id: uid('image'),
          src,
          x: Math.round(position ? position.x - width / 2 : 44 + count * 26),
          y: Math.round(position ? position.y - height / 2 : 44 + count * 26),
          w: width,
          h: height,
          aspect: naturalWidth / naturalHeight,
          marks: [],
        };

        state.images.push(image);
        state.selectedId = image.id;
        render();
        scheduleSave();
        setStatus('Billede indsat');
      }

      function readImageFile(file, position = null) {
        if (!file || !file.type.startsWith('image/')) return;

        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => addImage(reader.result, img.naturalWidth || 640, img.naturalHeight || 480, position);
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      }

      function addMemoTile() {
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fbff"/><stop offset="1" stop-color="#dceef7"/></linearGradient></defs><rect width="900" height="620" fill="url(#g)"/><path d="M90 112h720M90 205h720M90 298h720M90 391h720M90 484h720" stroke="#9bb9c8" stroke-width="5"/><text x="90" y="76" fill="#243746" font-size="42" font-family="Arial, sans-serif" font-weight="700">Memo</text></svg>`;
        const src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
        addImage(src, 900, 620);
      }

      function readPastedImage(event) {
        const items = Array.from(event.clipboardData?.items || []);
        const imageItem = items.find((item) => item.type.startsWith('image/'));
        if (!imageItem) return;

        event.preventDefault();
        const file = imageItem.getAsFile();
        readImageFile(file);
      }

      function beginDrag(event, node, image) {
        const start = boardPointFromEvent(event);
        dragSession = {
          id: image.id,
          pointerId: event.pointerId,
          startX: start.x,
          startY: start.y,
          imageX: image.x,
          imageY: image.y,
        };
        node.setPointerCapture(event.pointerId);
      }

      function beginMarkDrag(event, node, image, markElement) {
        const local = localPointFromEvent(node, event);
        const mark = image.marks.find((item) => item.id === markElement.dataset.markId);
        if (!mark) return;

        selectMark(image.id, mark.id);
        markDragSession = {
          imageId: image.id,
          markId: mark.id,
          pointerId: event.pointerId,
          start: toNormalized(local),
          moved: false,
          rect: mark.type === 'rect' ? { x: mark.x, y: mark.y, w: mark.w, h: mark.h } : null,
          points: mark.type === 'free' ? mark.points.map((point) => ({ ...point })) : null,
        };
        node.setPointerCapture(event.pointerId);
      }

      function beginMarkResize(event, node, image, handle) {
        event.stopPropagation();
        const mark = image.marks.find((item) => item.id === handle.dataset.markId);
        if (!mark) return;

        selectMark(image.id, mark.id);
        markResizeSession = {
          imageId: image.id,
          markId: mark.id,
          pointerId: event.pointerId,
          corner: handle.dataset.corner,
          bounds: markBounds(mark),
          rect: mark.type === 'rect' ? { x: mark.x, y: mark.y, w: mark.w, h: mark.h } : null,
          points: mark.type === 'free' ? mark.points.map((point) => ({ ...point })) : null,
        };
        node.setPointerCapture(event.pointerId);
      }

      function beginResize(event, node, image, corner) {
        event.stopPropagation();
        const start = boardPointFromEvent(event);
        resizeSession = {
          id: image.id,
          pointerId: event.pointerId,
          corner,
          startX: start.x,
          startY: start.y,
          imageX: image.x,
          imageY: image.y,
          imageW: image.w,
          imageH: image.h,
        };
        node.setPointerCapture(event.pointerId);
      }

      function beginDraw(event, node, image) {
        const local = localPointFromEvent(node, event);
        const point = toNormalized(local);
        drawSession = {
          id: image.id,
          pointerId: event.pointerId,
          tool: state.tool,
          start: point,
          points: [point],
          preview: null,
        };

        const svg = node.querySelector('.mark-layer');
        drawSession.preview = document.createElementNS('http://www.w3.org/2000/svg', state.tool === 'rect' ? 'rect' : 'path');
        drawSession.preview.classList.add('draw-preview');
        drawSession.preview.setAttribute('fill', MARK_FILL);
        drawSession.preview.setAttribute('stroke', MARK_STROKE);
        drawSession.preview.setAttribute('stroke-width', state.tool === 'rect' ? String(MARK_RECT_STROKE_WIDTH) : String(MARK_FREE_STROKE_WIDTH));
        drawSession.preview.setAttribute('stroke-linejoin', 'round');
        drawSession.preview.setAttribute('stroke-linecap', 'round');
        svg.appendChild(drawSession.preview);
        node.setPointerCapture(event.pointerId);
      }

      function updateDraw(event) {
        if (!drawSession) return;
        const image = getImage(drawSession.id);
        const node = document.querySelector(`.image-node[data-id="${drawSession.id}"]`);
        if (!image || !node) return;

        const point = toNormalized(localPointFromEvent(node, event));
        if (drawSession.tool === 'rect') {
          const rect = rectFromPoints(drawSession.start, point);
          updateMarkElement(drawSession.preview, { type: 'rect', filled: true, ...rect });
        } else {
          const last = drawSession.points[drawSession.points.length - 1];
          const distance = Math.hypot(point.x - last.x, point.y - last.y);
          if (distance > 0.006) {
            drawSession.points.push(point);
            drawSession.preview.setAttribute('d', freehandPath(drawSession.points));
          }
        }
      }

      function finishDraw(event) {
        if (!drawSession) return;
        const image = getImage(drawSession.id);
        const node = document.querySelector(`.image-node[data-id="${drawSession.id}"]`);
        if (!image || !node) {
          drawSession = null;
          return;
        }

        const point = toNormalized(localPointFromEvent(node, event));
        drawSession.preview.remove();

        if (drawSession.tool === 'rect') {
          const rect = rectFromPoints(drawSession.start, point);
          if (rect.w > 0.012 && rect.h > 0.012) {
            const mark = { id: uid('mark'), type: 'rect', filled: true, ...rect };
            image.marks.push(mark);
            state.selectedMarkId = mark.id;
          }
        } else if (drawSession.points.length > 2) {
          const mark = { id: uid('mark'), type: 'free', filled: true, points: drawSession.points };
          image.marks.push(mark);
          state.selectedMarkId = mark.id;
        }

        drawSession = null;
        render();
        selectImage(image.id);
        scheduleSave();
      }

      function toggleMark(imageId, markId) {
        const image = getImage(imageId);
        if (!image) return;
        const mark = image.marks.find((item) => item.id === markId);
        if (!mark) return;
        mark.filled = !mark.filled;
        state.selectedMarkId = markId;
        render();
        selectImage(imageId);
        scheduleSave();
      }

      workspace.addEventListener('pointerdown', (event) => {
        if (event.button !== 0) return;

        if (!markContextMenu.hidden && !event.target.closest?.('.context-menu')) {
          hideContextMenu();
        }

        const markResizeHandle = event.target.closest?.('.mark-resize-handle');
        const markElement = event.target.closest?.('.mark');
        const node = event.target.closest?.('.image-node');
        if (!node) {
          selectImage(null);
          return;
        }

        const image = getImage(node.dataset.id);
        if (!image) return;
        selectImage(image.id);

        if (markResizeHandle) {
          beginMarkResize(event, node, image, markResizeHandle);
          return;
        }

        if (markElement && !drawSession) {
          if (state.tool === 'move') {
            beginMarkDrag(event, node, image, markElement);
          } else {
            const svg = markElement.closest('.mark-layer');
            toggleMark(svg.dataset.imageId, markElement.dataset.markId);
          }
          event.stopPropagation();
          return;
        }

        const handle = event.target.closest?.('.resize-handle');
        if (handle) {
          state.selectedMarkId = null;
          removeMarkResizeHandles();
          beginResize(event, node, image, handle.dataset.corner);
          return;
        }

        if (state.tool === 'move') {
          state.selectedMarkId = null;
          removeMarkResizeHandles();
          beginDrag(event, node, image);
        } else {
          state.selectedMarkId = null;
          removeMarkResizeHandles();
          beginDraw(event, node, image);
        }
      });

      workspace.addEventListener('pointermove', (event) => {
        if (markResizeSession) {
          const image = getImage(markResizeSession.imageId);
          const node = document.querySelector(`.image-node[data-id="${markResizeSession.imageId}"]`);
          const mark = image?.marks.find((item) => item.id === markResizeSession.markId);
          if (!image || !node || !mark) return;

          const point = toNormalized(localPointFromEvent(node, event));
          const minSize = 0.012;
          const bounds = markResizeSession.bounds;
          const corner = markResizeSession.corner;
          const anchorX = corner.includes('w') ? bounds.maxX : bounds.minX;
          const anchorY = corner.includes('n') ? bounds.maxY : bounds.minY;
          let movingX = point.x;
          let movingY = point.y;

          if (corner.includes('w')) {
            movingX = clamp(movingX, 0, anchorX - minSize);
          } else {
            movingX = clamp(movingX, anchorX + minSize, 1);
          }

          if (corner.includes('n')) {
            movingY = clamp(movingY, 0, anchorY - minSize);
          } else {
            movingY = clamp(movingY, anchorY + minSize, 1);
          }

          const newBounds = {
            minX: Math.min(anchorX, movingX),
            maxX: Math.max(anchorX, movingX),
            minY: Math.min(anchorY, movingY),
            maxY: Math.max(anchorY, movingY),
          };
          const newW = newBounds.maxX - newBounds.minX;
          const newH = newBounds.maxY - newBounds.minY;

          if (mark.type === 'rect') {
            mark.x = newBounds.minX;
            mark.y = newBounds.minY;
            mark.w = newW;
            mark.h = newH;
          } else {
            const originW = Math.max(bounds.maxX - bounds.minX, minSize);
            const originH = Math.max(bounds.maxY - bounds.minY, minSize);
            mark.points = markResizeSession.points.map((item) => ({
              x: newBounds.minX + ((item.x - bounds.minX) / originW) * newW,
              y: newBounds.minY + ((item.y - bounds.minY) / originH) * newH,
            }));
          }

          const element = document.querySelector(`.image-node[data-id="${markResizeSession.imageId}"] .mark[data-mark-id="${markResizeSession.markId}"]`);
          if (element) updateMarkElement(element, mark);
          refreshMarkResizeHandles(image, mark);
          setStatus('Skalerer markering');
          return;
        }

        if (markDragSession) {
          const image = getImage(markDragSession.imageId);
          const node = document.querySelector(`.image-node[data-id="${markDragSession.imageId}"]`);
          const element = document.querySelector(`.image-node[data-id="${markDragSession.imageId}"] .mark[data-mark-id="${markDragSession.markId}"]`);
          const mark = image?.marks.find((item) => item.id === markDragSession.markId);
          if (!image || !node || !element || !mark) return;

          const point = toNormalized(localPointFromEvent(node, event));
          let dx = point.x - markDragSession.start.x;
          let dy = point.y - markDragSession.start.y;

          if (Math.abs(dx) > 0.003 || Math.abs(dy) > 0.003) {
            markDragSession.moved = true;
          }

          const originBounds = markDragSession.rect
            ? {
                minX: markDragSession.rect.x,
                maxX: markDragSession.rect.x + markDragSession.rect.w,
                minY: markDragSession.rect.y,
                maxY: markDragSession.rect.y + markDragSession.rect.h,
              }
            : markBounds({ type: 'free', points: markDragSession.points });

          dx = clamp(dx, -originBounds.minX, 1 - originBounds.maxX);
          dy = clamp(dy, -originBounds.minY, 1 - originBounds.maxY);

          if (mark.type === 'rect') {
            mark.x = markDragSession.rect.x + dx;
            mark.y = markDragSession.rect.y + dy;
          } else {
            mark.points = markDragSession.points.map((item) => ({
              x: item.x + dx,
              y: item.y + dy,
            }));
          }

          updateMarkElement(element, mark);
          setStatus('Flytter markering');
          return;
        }

        if (dragSession) {
          const image = getImage(dragSession.id);
          const node = document.querySelector(`.image-node[data-id="${dragSession.id}"]`);
          if (!image || !node) return;
          const point = boardPointFromEvent(event);
          image.x = Math.round(dragSession.imageX + point.x - dragSession.startX);
          image.y = Math.round(dragSession.imageY + point.y - dragSession.startY);
          node.style.transform = `translate(${image.x}px, ${image.y}px)`;
          setStatus('Flytter');
          return;
        }

        if (resizeSession) {
          const image = getImage(resizeSession.id);
          const node = document.querySelector(`.image-node[data-id="${resizeSession.id}"]`);
          if (!image || !node) return;
          const point = boardPointFromEvent(event);
          const dx = point.x - resizeSession.startX;
          const dy = point.y - resizeSession.startY;
          const aspect = image.aspect || resizeSession.imageW / resizeSession.imageH;

          const widthDelta = resizeSession.corner.includes('e') ? dx : -dx;
          const heightDelta = resizeSession.corner.includes('s') ? dy : -dy;
          let width;
          let height;
          let x = resizeSession.imageX;
          let y = resizeSession.imageY;

          if (Math.abs(widthDelta) >= Math.abs(heightDelta)) {
            width = resizeSession.imageW + widthDelta;
            height = width / aspect;
          } else {
            height = resizeSession.imageH + heightDelta;
            width = height * aspect;
          }

          if (width < MIN_IMAGE_SIZE) {
            width = MIN_IMAGE_SIZE;
            height = width / aspect;
          }

          if (height < MIN_IMAGE_SIZE) {
            height = MIN_IMAGE_SIZE;
            width = height * aspect;
          }

          if (resizeSession.corner.includes('w')) x = resizeSession.imageX + resizeSession.imageW - width;
          if (resizeSession.corner.includes('n')) y = resizeSession.imageY + resizeSession.imageH - height;

          image.x = Math.round(x);
          image.y = Math.round(y);
          image.w = Math.round(width);
          image.h = Math.round(height);
          node.style.transform = `translate(${image.x}px, ${image.y}px)`;
          node.style.width = `${image.w}px`;
          node.style.height = `${image.h}px`;
          setStatus('Skalerer');
          return;
        }

        updateDraw(event);
      });

      workspace.addEventListener('pointerup', (event) => {
        if (drawSession) {
          finishDraw(event);
          return;
        }

        if (markResizeSession) {
          markResizeSession = null;
          scheduleSave();
          setStatus('Gemt');
          return;
        }

        if (markDragSession) {
          const session = markDragSession;
          markDragSession = null;
          if (session.moved) {
            scheduleSave();
            setStatus('Gemt');
          } else {
            toggleMark(session.imageId, session.markId);
          }
          return;
        }

        if (dragSession) {
          dragSession = null;
          scheduleSave();
          setStatus('Gemt');
        }

        if (resizeSession) {
          resizeSession = null;
          scheduleSave();
          setStatus('Gemt');
        }
      });

      workspace.addEventListener('pointercancel', () => {
        if (drawSession?.preview) drawSession.preview.remove();
        drawSession = null;
        dragSession = null;
        markDragSession = null;
        markResizeSession = null;
        resizeSession = null;
      });

      workspace.addEventListener('contextmenu', (event) => {
        const markElement = event.target.closest?.('.mark');
        if (!markElement) {
          hideContextMenu();
          return;
        }

        const svg = markElement.closest('.mark-layer');
        if (!svg) return;
        showContextMenu(event, svg.dataset.imageId, markElement.dataset.markId);
      });

      toolButtons.forEach((button) => {
        button.addEventListener('click', () => setTool(button.dataset.tool));
      });

      document.getElementById('addDemo').addEventListener('click', addMemoTile);
      themeToggle.addEventListener('click', toggleTheme);
      deleteMarkButton.addEventListener('click', deleteSelectedMark);

      document.getElementById('clearBoard').addEventListener('click', () => {
        state.images = [];
        state.selectedId = null;
        state.selectedMarkId = null;
        hideContextMenu();
        localStorage.removeItem(STORAGE_KEY);
        render();
        setStatus('Ryddet');
      });

      document.addEventListener('paste', readPastedImage);

      workspace.addEventListener('dragenter', (event) => {
        if (!Array.from(event.dataTransfer?.items || []).some((item) => item.type.startsWith('image/'))) return;
        event.preventDefault();
        workspace.classList.add('is-drop-target');
        setStatus('Slip billede her');
      });

      workspace.addEventListener('dragover', (event) => {
        if (!Array.from(event.dataTransfer?.items || []).some((item) => item.type.startsWith('image/'))) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = 'copy';
      });

      workspace.addEventListener('dragleave', (event) => {
        if (workspace.contains(event.relatedTarget)) return;
        workspace.classList.remove('is-drop-target');
      });

      workspace.addEventListener('drop', (event) => {
        event.preventDefault();
        workspace.classList.remove('is-drop-target');
        const files = Array.from(event.dataTransfer?.files || []).filter((file) => file.type.startsWith('image/'));
        const dropPoint = boardPointFromEvent(event);
        files.forEach((file, index) => {
          readImageFile(file, { x: dropPoint.x + index * 24, y: dropPoint.y + index * 24 });
        });
        if (files.length) setStatus('Indsaetter billede');
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          hideContextMenu();
        }

        if (event.key === 'Delete' || event.key === 'Backspace') {
          if (!state.selectedId || ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
          state.images = state.images.filter((image) => image.id !== state.selectedId);
          state.selectedId = null;
          render();
          scheduleSave();
        }

        if (event.key === '1') setTool('move');
        if (event.key === '2') setTool('rect');
        if (event.key === '3') setTool('free');
      });

      loadBoard();
      applyTheme();
      render();
      setTool(state.tool);
      if (!state.images.length) setStatus('Klar');
    </script>
  </body>
</html>
