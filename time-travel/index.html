<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geologisk Tidssimulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #e8ecf1; font-family: 'Outfit', sans-serif; user-select: none; -webkit-user-select: none; }
  canvas { display: block; }

  #hud {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 24px 18px; pointer-events: none; z-index: 10;
  }
  .controls-panel {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
    border: 1px solid rgba(0,0,0,0.1); border-radius: 16px;
    padding: 10px 16px; pointer-events: all;
  }
  .slider-edge-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700;
    color: rgba(0,0,0,0.35); white-space: nowrap;
  }
  .move-btn {
    width: 56px; height: 56px;
    border: 1px solid rgba(0,0,0,0.12); border-radius: 12px;
    background: rgba(0,0,0,0.04); color: #334;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .move-btn:hover { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.2); }
  .move-btn.active { background: rgba(20,100,180,0.15); border-color: rgba(20,100,180,0.4); box-shadow: 0 0 16px rgba(20,100,180,0.12); }
  .divider { width: 1px; height: 36px; background: rgba(0,0,0,0.1); margin: 0 4px; }
  .speed-btn {
    height: 40px; padding: 0 14px;
    border: 1px solid rgba(0,0,0,0.1); border-radius: 10px;
    background: rgba(0,0,0,0.03); color: rgba(0,0,0,0.45);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
  }
  .speed-btn:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.7); }
  .speed-btn.active { background: rgba(20,100,180,0.12); border-color: rgba(20,100,180,0.35); color: rgba(20,100,180,0.95); font-weight: 700; }
  .arrow-icon { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  #info-hud {
    position: fixed; top: 20px; left: 20px; z-index: 10;
    color: rgba(0,0,0,0.5);
    font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.8;
    background: rgba(255,255,255,0.8); backdrop-filter: blur(12px);
    border: 1px solid rgba(0,0,0,0.08); border-radius: 12px;
    padding: 14px 18px;
  }
  #info-hud .value { color: #1565c0; font-weight: 700; }

  #geo-panel {
    position: fixed; top: 20px; right: 20px; z-index: 10;
    width: 340px; max-height: calc(100vh - 120px); overflow-y: auto;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(16px);
    border: 1px solid rgba(0,0,0,0.08); border-radius: 14px;
    padding: 18px 20px; font-size: 14px;
    color: rgba(0,0,0,0.6); line-height: 1.6;
  }
  #geo-panel::-webkit-scrollbar { width: 4px; }
  #geo-panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

  .geo-era-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(0,0,0,0.35); margin-bottom: 4px; }
  .geo-period-name { font-size: 22px; font-weight: 700; margin-bottom: 2px; transition: color 0.4s ease; }
  .geo-years { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; margin-bottom: 14px; }
  .geo-divider { height: 1px; background: rgba(0,0,0,0.08); margin: 12px 0; }
  .geo-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(0,0,0,0.3); margin-bottom: 6px; margin-top: 14px; }
  .geo-fact { padding: 6px 0; color: rgba(0,0,0,0.55); font-size: 13.5px; line-height: 1.5; }
  .geo-highlight { display: inline-block; padding: 3px 8px; margin: 3px 4px 3px 0; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; font-size: 12px; color: rgba(0,0,0,0.55); }
  .geo-event { padding: 8px 10px; margin: 6px 0; background: rgba(0,0,0,0.03); border-left: 2px solid; border-radius: 0 6px 6px 0; font-size: 13px; cursor: pointer; transition: background 0.15s ease; }
  .geo-event:hover { background: rgba(0,0,0,0.06); }

  #jump-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(0,0,0,0.08); }
  #jump-section label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(0,0,0,0.3); margin-bottom: 6px; }
  .jump-row { display: flex; gap: 8px; }
  #jump-input {
    flex: 1; padding: 8px 12px;
    border: 1px solid rgba(0,0,0,0.12); border-radius: 8px;
    background: rgba(0,0,0,0.04); color: #1565c0;
    font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700;
    outline: none; -webkit-user-select: text; user-select: text;
  }
  #jump-input:focus { border-color: rgba(20,100,180,0.4); }
  #jump-btn {
    padding: 8px 14px; border: 1px solid rgba(20,100,180,0.3); border-radius: 8px;
    background: rgba(20,100,180,0.1); color: #1565c0;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
  }
  #jump-btn:hover { background: rgba(20,100,180,0.18); }
  #eta-line { margin-top: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(0,0,0,0.4); line-height: 1.6; }
  #eta-line .value { color: #1565c0; font-weight: 700; }

  .event-nav-btn {
    padding: 3px 10px; border: 1px solid rgba(20,100,180,0.25); border-radius: 6px;
    background: rgba(20,100,180,0.08); color: #1565c0;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
    cursor: pointer; transition: all 0.15s ease; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
  }
  .event-nav-btn:hover { background: rgba(20,100,180,0.16); border-color: rgba(20,100,180,0.4); }

  .horizon-btn {
    height: 40px; padding: 0 14px;
    border: 1px solid rgba(20,100,180,0.3); border-radius: 10px;
    background: rgba(20,100,180,0.08); color: #1565c0;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
    cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
  }
  .horizon-btn:hover { background: rgba(20,100,180,0.15); }

  .slider-wrap {
    display: flex; align-items: center; gap: 10px;
  }
  #speed-slider {
    -webkit-appearance: none; appearance: none;
    width: 360px; height: 6px; border-radius: 3px;
    background: rgba(0,0,0,0.1); outline: none;
    cursor: pointer;
  }
  #speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: #1565c0; border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    cursor: pointer;
  }
  #speed-slider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: #1565c0; border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    cursor: pointer;
  }
  .slider-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    color: #1565c0; white-space: nowrap; min-width: 72px;
  }

  #speedo-panel {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 8px;
    background: rgba(255,255,255,0.8); backdrop-filter: blur(12px);
    border: 1px solid rgba(0,0,0,0.08); border-radius: 12px;
    padding: 10px 14px;
  }
</style>
</head>
<body>

<div id="info-hud">
  <div>År siden: <span class="value" id="pos-display">0</span></div>
  <div>Hastighed: <span class="value" id="speed-display">50</span> år/s</div>
</div>

<div id="speedo-panel">
  <canvas id="speedo-100" width="110" height="130"></canvas>
  <canvas id="speedo-1000" width="110" height="130"></canvas>
  <canvas id="speedo-100000" width="110" height="130"></canvas>
  <canvas id="speedo-1000000" width="110" height="130"></canvas>
</div>

<div id="geo-panel">
  <div class="geo-era-label" id="geo-era"></div>
  <div class="geo-period-name" id="geo-period"></div>
  <div class="geo-years" id="geo-years"></div>
  <div id="geo-content"></div>
  <div id="jump-section">
    <label>Hop til år siden:</label>
    <div class="jump-row">
      <input type="text" id="jump-input" placeholder="f.eks. 65000000" />
      <button id="jump-btn">HOP</button>
    </div>
    <div id="eta-line"></div>
  </div>
</div>

<div id="hud">
  <div class="controls-panel">
    <button class="move-btn" id="btn-up" title="Kamera op">
      <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
    <button class="move-btn" id="btn-down" title="Kamera ned">
      <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
    </button>
    <div class="divider"></div>
    <button class="speed-btn" data-speed="-1000">-1000</button>
    <button class="speed-btn" data-speed="-500">-500</button>
    <button class="speed-btn" data-speed="-50">-50</button>
    <button class="speed-btn active" data-speed="0">STOP</button>
    <button class="speed-btn" data-speed="50">+50</button>
    <button class="speed-btn" data-speed="500">+500</button>
    <button class="speed-btn" data-speed="1000">+1000</button>
  </div>
  <div class="controls-panel" style="margin-top:8px;">
    <span class="slider-edge-label">← Nutid 100K</span>
    <div class="slider-wrap">
      <input type="range" id="speed-slider" min="-10100" max="10100" value="0" step="10" />
    </div>
    <span class="slider-edge-label">Fortid 100K →</span>
    <span class="slider-label" id="slider-label">0 år/s</span>
    <div class="divider"></div>
    <button class="horizon-btn" id="horizon-btn" title="Skift horisontens retning">Horisont: Fortid &#8594;</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  function getPeriodForYear(y) {
    const a = Math.abs(y);
    for (const p of PERIODS) { if (a >= p.from && a < p.to) return p; }
    return a >= 4600000000 ? PERIODS[PERIODS.length-1] : PERIODS[0];
  }

  function formatYears(n) {
    n = Math.round(Math.abs(n));
    if (n >= 1e9) return (n/1e9).toFixed(2) + ' mia.';
    if (n >= 1e6) return (n/1e6).toFixed(n >= 1e8 ? 0 : n >= 1e7 ? 1 : 2) + ' mio.';
    if (n >= 1e3) return n.toLocaleString('da-DK');
    return n.toString();
  }

  // All events sorted for next/prev navigation

  for (const p of PERIODS) { if (p.events) for (const e of p.events) allEvents.push({y:e.y, t:e.t, color:p.color}); }
  allEvents.sort((a,b) => a.y - b.y);

  function findNextEvent(curY) {
    const a = Math.abs(curY);
    for (const e of allEvents) { if (e.y > a + 0.5) return e; }
    return null;
  }
  function findPrevEvent(curY) {
    const a = Math.abs(curY);
    for (let i = allEvents.length-1; i >= 0; i--) { if (allEvents[i].y < a - 0.5) return allEvents[i]; }
    return null;

  // --- TRACK CHUNKS (relative to worldGroup) ---
  function createTrackChunk(localStart, localEnd) {
    const g = new THREE.Group();
    const len = localEnd - localStart;
    const bm = new THREE.Mesh(
      new THREE.PlaneGeometry(TRACK_WIDTH, len),
      new THREE.MeshStandardMaterial({ color: 0xeaeff4, roughness: 0.85, metalness: 0.05 })
    );
    bm.rotation.x = -Math.PI / 2;
    bm.position.set(0, -0.01, (localStart + localEnd) / 2);
    bm.receiveShadow = true;
    g.add(bm);

    const lmx = new THREE.LineBasicMaterial({ color: 0xa0b0c0, transparent: true, opacity: 0.5 });
    for (let z = localStart; z <= localEnd; z += 1) {
      g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-HALF_WIDTH, 0.005, z), new THREE.Vector3(HALF_WIDTH, 0.005, z)
      ]), lmx));
    }
    const lmz = new THREE.LineBasicMaterial({ color: 0xa0b0c0, transparent: true, opacity: 0.5 });
    for (let x = -HALF_WIDTH; x <= HALF_WIDTH; x += 1) {
      g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x, 0.005, localStart), new THREE.Vector3(x, 0.005, localEnd)
      ]), lmz));
    }
    const em = new THREE.LineBasicMaterial({ color: 0x2979b0, transparent: true, opacity: 0.6 });
    for (let s of [-1, 1]) {
      g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(s * HALF_WIDTH, 0.02, localStart), new THREE.Vector3(s * HALF_WIDTH, 0.02, localEnd)
      ]), em));
    }
    const mm = new THREE.LineBasicMaterial({ color: 0x1565c0, transparent: true, opacity: 0.5 });
    for (let z = localStart; z <= localEnd; z += 50) {
      if (z === 0 && localStart === 0) continue;
      g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-HALF_WIDTH, 0.02, z), new THREE.Vector3(HALF_WIDTH, 0.02, z)
      ]), mm));
    }
    return g;
  }

  const CHUNK_SIZE = 200;

  const chunks = new Map();

  function updateChunks() {
    // We always want chunks around local z=0 (camera is at origin)
    const needed = new Set();
    for (let o = -CHUNK_SIZE * 2; o <= CHUNK_SIZE * 3; o += CHUNK_SIZE) {
      needed.add(o);
    }
    for (const [k, c] of chunks) {
      if (!needed.has(k)) { worldGroup.remove(c); chunks.delete(k); }
    }
    for (const k of needed) {
      if (!chunks.has(k)) {
        const c = createTrackChunk(k, k + CHUNK_SIZE);
        worldGroup.add(c);
        chunks.set(k, c);
      }
    }
  }

  const LAMP_INTERVAL = 10; // every 10 rows
  const TALL_EVERY = 10;    // every 10th lamppost is tall

  const normalPostGeo = new THREE.CylinderGeometry(0.06, 0.1, 4, 6);
  const tallPostGeo = new THREE.CylinderGeometry(0.08, 0.12, 8, 6);

  function createLamppost(z, isTall) {
    const group = new THREE.Group();
    const height = isTall ? 8 : 4;
    const pGeo = isTall ? tallPostGeo : normalPostGeo;
    const gGeo = isTall ? tallGlowGeo : normalGlowGeo;
    const aGeo = isTall ? tallArmGeo : normalArmGeo;
    const armLen = isTall ? 1.5 : 1.2;

    for (const s of [-1, 1]) {
      const x = s * (HALF_WIDTH + 0.8);

      // Pole
      const pole = new THREE.Mesh(pGeo, postMat);
      pole.position.set(x, height / 2, z);
      pole.castShadow = true;
      group.add(pole);

      // Arm (horizontal, pointing inward over track)
      const arm = new THREE.Mesh(aGeo, postMat);
      arm.rotation.z = Math.PI / 2;
      arm.position.set(x - s * (armLen / 2), height + 0.02, z);
      group.add(arm);

      // Glow at end of arm
      const glow = new THREE.Mesh(gGeo, glowMat.clone());
      glow.position.set(x - s * armLen, height + 0.02, z);
      group.add(glow);
    }
    return group;
  }

  // Lampposts are generated per-chunk and stored alongside chunks

  function createLampsForChunk(localStart, chunkOrigin) {
    const group = new THREE.Group();
    // Absolute range this chunk covers
    const absStart = chunkOrigin + localStart;
    const absEnd = absStart + CHUNK_SIZE;
    // Find the first lamppost row >= absStart
    const firstRow = Math.ceil(absStart / LAMP_INTERVAL) * LAMP_INTERVAL;
    for (let absZ = firstRow; absZ < absEnd; absZ += LAMP_INTERVAL) {
      const lampIndex = absZ / LAMP_INTERVAL;
      const isTall = (lampIndex % TALL_EVERY === 0) && absZ !== 0;
      const localZ = absZ - chunkOrigin; // place at local coordinate
      group.add(createLamppost(localZ, isTall));
    }
    return group;
  }

  // Create a text texture using canvas
  function createSignTexture(text, yearNum) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 512;
    canvas.height = 128;

    // Background
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.roundRect(4, 4, 504, 120, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(4, 4, 504, 120, 10);
    ctx.stroke();

    // Year
    ctx.fillStyle = '#1565c0';
    ctx.font = 'bold 28px sans-serif';
    ctx.fillText(formatYears(yearNum) + ' år', 20, 42);

    // Text
    ctx.fillStyle = '#222';
    ctx.font = '22px sans-serif';
    // Word wrap
    const words = text.split(' ');
    let line = '';
    let y = 75;
    for (const w of words) {
      const test = line + w + ' ';
      if (ctx.measureText(test).width > 470 && line) {
        ctx.fillText(line, 20, y);
        line = w + ' ';
        y += 28;
      } else {
        line = test;
      }
    }
    ctx.fillText(line, 20, y);

    const tex = new THREE.CanvasTexture(canvas);
    tex.minFilter = THREE.LinearFilter;
    return tex;
  }

  // Create a 3D sign at a given Z

    // Sign board — two planes back-to-back so text reads correctly from both sides
    const tex = createSignTexture(sd.text, sd.year);
    const boardGeo = new THREE.PlaneGeometry(signWidth, signHeight);
    const boardMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
    const yPos = poleHeight + signHeight / 2 + 0.05;

    // Front face (facing -Z, towards camera when horizonIsPast)

    boardFront.position.set(x, yPos, sd.z - 0.01);

    const boardBack = new THREE.Mesh(boardGeo, boardMat);
    boardBack.position.set(x, yPos, sd.z + 0.01);
    boardBack.rotation.y = 0;
    group.add(boardBack);

    return group;
  }

  const geoEra = document.getElementById('geo-era'), geoPeriod = document.getElementById('geo-period');
  const geoYears = document.getElementById('geo-years'), geoContent = document.getElementById('geo-content');
  const speedSlider = document.getElementById('speed-slider');
  const sliderLabel = document.getElementById('slider-label');

  function applySlider(val) {
    const speed = sliderToSpeed(val);
    const dir = val > 0 ? 1 : val < 0 ? -1 : 0;
    currentSpeed = speed;
    trackDirection = dir;
    const displaySpeed = speed === 100000 ? '100.000' : speed.toLocaleString('da-DK');
    if (dir === 0) {
      speedDisplay.textContent = '0';
      sliderLabel.textContent = 'Stoppet';
    } else if (dir > 0) {
      speedDisplay.textContent = displaySpeed;
      sliderLabel.textContent = displaySpeed + ' år/s → Fortid';
    } else {
      speedDisplay.textContent = displaySpeed;
      sliderLabel.textContent = displaySpeed + ' år/s ← Nutid';
    }
    // Highlight matching preset
    speedBtns.forEach(b => {
      const bv = parseInt(b.dataset.speed);
      b.classList.toggle('active', bv === val || (bv === 0 && val === 0));
    });
    updateETA();
  }

  speedSlider.addEventListener('input', () => {
    applySlider(parseInt(speedSlider.value));
  });

  // Preset buttons set slider and apply
  speedBtns.forEach(btn => { btn.addEventListener('click', () => {
    const val = parseInt(btn.dataset.speed);
    speedSlider.value = val;
    applySlider(val);
  }); });

  // Camera vertical movement
  let verticalDirection = 0;
  let cameraY = 2;

  function updateVerticalButtons() {
    btnUp.classList.toggle('active', verticalDirection === 1);
    btnDown.classList.toggle('active', verticalDirection === -1);
  }

  btnUp.addEventListener('click', () => { verticalDirection = verticalDirection===1?0:1; updateVerticalButtons(); });
  btnDown.addEventListener('click', () => { verticalDirection = verticalDirection===-1?0:-1; updateVerticalButtons(); });

  document.addEventListener('keydown', (e) => {
    if (e.target === jumpInput) return;
    if (e.key==='ArrowUp'||e.key==='w') { verticalDirection=verticalDirection===1?0:1; updateVerticalButtons(); }
    if (e.key==='ArrowDown'||e.key==='s') { verticalDirection=verticalDirection===-1?0:-1; updateVerticalButtons(); }
    if (e.key==='n'||e.key==='N') { const ev=findNextEvent(getYears()); if(ev)jumpToYear(ev.y); }
    if (e.key==='f'||e.key==='F') { const ev=findPrevEvent(getYears()); if(ev)jumpToYear(ev.y); }
  });

  // Horizon direction toggle
  const horizonBtn = document.getElementById('horizon-btn');
  function updateHorizonLabel() {
    horizonBtn.innerHTML = horizonIsPast
      ? 'Horisont: Fortid &#8594;'
      : 'Horisont: Nutid &#8592;';
  }
  horizonBtn.addEventListener('click', () => {
    horizonIsPast = !horizonIsPast;
    updateHorizonLabel();
    camera.rotation.set(
      horizonIsPast ? -0.35 : 0.35,
      horizonIsPast ? 0 : Math.PI,
      0
    );
  });

  function parseNumber(s) { return parseInt(s.replace(/[\s.]/g, '')); }

  function jumpToYear(y) {
    positionZ = y / 10;
    speedSlider.value = 0;
    applySlider(0);
    lastPeriodName = '';
    updateGeoPanel(getYears());
    updateETA();
  }

  jumpBtn.addEventListener('click', () => {
    const val = parseNumber(jumpInput.value);
    if (!isNaN(val) && val > 0) jumpToYear(val);
  });
  jumpInput.addEventListener('keydown', (e) => { if (e.key==='Enter') jumpBtn.click(); });

  function formatDuration(ts) {
    if (!isFinite(ts)||ts<0) return '—';
    const y=Math.floor(ts/(365.25*24*3600)); let r=ts-y*365.25*24*3600;
    const d=Math.floor(r/86400);r-=d*86400;const h=Math.floor(r/3600);r-=h*3600;
    const m=Math.floor(r/60),s=Math.floor(r-m*60),p=[];
    if(y>0)p.push(y.toLocaleString('da-DK')+' år');if(d>0)p.push(d+' dage');
    if(h>0)p.push(h+' t');if(m>0)p.push(m+' min');
    if(p.length===0||(y===0&&d===0))p.push(s+' sek');
    return p.join(', ');
  }

  function updateETA() {
    const val = parseNumber(jumpInput.value||'0');
    if (isNaN(val)||val<=0) { etaLine.innerHTML=''; return; }
    const currentYears = getYears();
    const remaining = Math.max(0, val - currentYears);
    const secs = remaining / currentSpeed;
    etaLine.innerHTML = `Resterende: <span class="value">${formatYears(remaining)}</span> år<br>Tid: <span class="value">${formatDuration(secs)}</span>`;
  }
  jumpInput.addEventListener('input', updateETA);

  // --- GEO PANEL ---
  function updateGeoPanel(y) {
    const absY = Math.abs(y);
    const period = getPeriodForYear(y);
    if (period.name === lastPeriodName) return;
    lastPeriodName = period.name;

    geoEra.textContent = period.era;
    geoPeriod.textContent = period.name;
    geoPeriod.style.color = period.color;
    geoYears.style.color = period.color;
    geoYears.textContent = formatYears(period.from) + ' – ' + formatYears(period.to) + ' år siden';

    let html = `<div class="geo-fact" style="margin-bottom:10px">${period.desc}</div><div class="geo-divider"></div>`;
    html += '<div class="geo-section-title">Livsformer</div><div style="display:flex;flex-wrap:wrap;gap:0">';
    for (const l of period.life) html += `<span class="geo-highlight">${l}</span>`;
    html += '</div>';

    if (period.events && period.events.length > 0) {
      html += '<div class="geo-section-title" style="display:flex;align-items:center;justify-content:space-between;">Begivenheder <span style="display:flex;gap:6px;">';
      html += '<button class="event-nav-btn" id="prev-event-btn">&#8592; Forrige</button>';
      html += '<button class="event-nav-btn" id="next-event-btn">Næste &#8594;</button>';
      html += '</span></div>';
      for (const e of period.events) {
        const isCur = Math.abs(e.y - absY) < 2;
        html += `<div class="geo-event" style="border-color:${period.color};${isCur?'background:rgba(255,255,255,0.06);':''}" data-jump-year="${e.y}"><span style="color:${period.color};font-weight:700;font-family:'JetBrains Mono',monospace;font-size:11px">${formatYears(e.y)} år siden</span><br>${e.t}</div>`;
      }
    }

    if (period.civs && period.civs.length > 0) {
      html += '<div class="geo-section-title">Civilisationer</div><div style="display:flex;flex-wrap:wrap;gap:0">';
      for (const c of period.civs) html += `<span class="geo-highlight">${c}</span>`;
      html += '</div>';
    }

    geoContent.innerHTML = html;

    // Bind nav buttons
    const nb = document.getElementById('next-event-btn');
    const pb = document.getElementById('prev-event-btn');
    if (nb) nb.addEventListener('click', () => { const e=findNextEvent(getYears()); if(e)jumpToYear(e.y); });
    if (pb) pb.addEventListener('click', () => { const e=findPrevEvent(getYears()); if(e)jumpToYear(e.y); });

    // Click-to-jump on events
    geoContent.querySelectorAll('[data-jump-year]').forEach(el => {
      el.addEventListener('click', () => { const yr=parseInt(el.dataset.jumpYear); if(!isNaN(yr))jumpToYear(yr); });
    });
  }

  updateGeoPanel(getYears());
  applySlider(0);

  // =============================================
  // ANIMATION — origin rebasing
  // =============================================
  // =============================================
  // SPEEDOMETERS — analog dials showing year position
  // =============================================
  const speedos = [
    { canvas: document.getElementById('speedo-100'), range: 100, label: '100 år' },
    { canvas: document.getElementById('speedo-1000'), range: 1000, label: '1.000 år' },
    { canvas: document.getElementById('speedo-100000'), range: 100000, label: '100.000 år' },
    { canvas: document.getElementById('speedo-1000000'), range: 1000000, label: '1 mio. år' },
  ];

  function drawSpeedo(s, years) {
    const ctx = s.canvas.getContext('2d');
    const w = s.canvas.width, h = s.canvas.height;
    const cx = w / 2, cy = h / 2 + 4;
    const r = 40;
    ctx.clearRect(0, 0, w, h);

    // Fraction around the dial (0-1)
    const fraction = (years % s.range) / s.range;
    const rotations = Math.floor(years / s.range);

    // 12 o'clock = top = start. Clockwise.
    // Angle: 0 fraction = top (-PI/2), 1 fraction = full circle back to top
    const startAngle = -Math.PI / 2;

    // Tick marks (12 ticks around full circle)
    for (let i = 0; i < 12; i++) {
      const a = startAngle + (i / 12) * Math.PI * 2;
      const isMajor = (i % 3 === 0);
      const innerR = isMajor ? r - 10 : r - 6;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR);
      ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
      ctx.strokeStyle = isMajor ? 'rgba(0,0,0,0.35)' : 'rgba(0,0,0,0.12)';
      ctx.lineWidth = isMajor ? 1.5 : 1;
      ctx.stroke();
    }

    // Full circle track
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 4;
    ctx.stroke();

    // Progress arc (clockwise from top)
    const needleAngle = startAngle + fraction * Math.PI * 2;
    if (fraction > 0.001) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, startAngle, needleAngle, false);
      ctx.strokeStyle = '#1565c0';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Needle
    const nx = cx + Math.cos(needleAngle) * (r - 8);
    const ny = cy + Math.sin(needleAngle) * (r - 8);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(nx, ny);
    ctx.strokeStyle = '#c62828';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#c62828';
    ctx.fill();

    // Label (range) above center
    ctx.font = 'bold 10px "JetBrains Mono", monospace';
    ctx.fillStyle = '#1565c0';
    ctx.textAlign = 'center';
    ctx.fillText(s.label, cx, cy - 12);

    // Rotation count below center
    if (rotations > 0) {
      ctx.font = 'bold 9px "JetBrains Mono", monospace';
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillText('×' + rotations.toLocaleString('da-DK'), cx, cy + 14);
    }
  }

  function updateSpeedos(years) {
    for (const s of speedos) drawSpeedo(s, years);
  }

  let frameCount = 0;

  function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    if (trackDirection !== 0) {
      // Speed is in years/s. 10 years = 1 meter on track.
      // Positive slider = trackDirection +1 = positionZ increases = deeper into past.
      // Horizon setting only affects camera view direction, not movement.
      const trackSpeed = currentSpeed / 10;
      positionZ += trackDirection * trackSpeed * dt;
    }
    if (positionZ < 0) positionZ = 0;

    // Vertical camera movement
    if (verticalDirection !== 0) {
      cameraY += verticalDirection * 5 * dt; // 5 m/s vertical speed
      if (cameraY < 0.5) cameraY = 0.5;     // min height
      camera.position.y = cameraY;
    }

    // ORIGIN REBASING:
    // Camera stays at (0, 2, 0). We offset the worldGroup so that
    // local chunk z=0 lines up with wherever the camera "should" be.
    // We compute a fractional offset within the current chunk neighborhood.
    const chunkOrigin = Math.floor(positionZ / CHUNK_SIZE) * CHUNK_SIZE;
    const localOffset = positionZ - chunkOrigin;

    // Move worldGroup so that the camera (at z=0) sees the right position
    worldGroup.position.z = -localOffset;

    // Rebuild chunks centered on localOffset=0
    // Chunks are always placed at local coords 0, ±200, ±400, etc.
    // But we need to rebuild when chunkOrigin changes.
    // We track this:
    if (worldGroup.userData.lastChunkOrigin !== chunkOrigin) {
      // Clear and rebuild all chunk types
      for (const [k, c] of chunks) { worldGroup.remove(c); }
      chunks.clear();
      for (const [k, c] of lampChunks) { worldGroup.remove(c); }
      lampChunks.clear();
      for (const [k, c] of signChunks) { worldGroup.remove(c); }
      signChunks.clear();

      const needed = [];
      for (let o = -CHUNK_SIZE * 2; o <= CHUNK_SIZE * 3; o += CHUNK_SIZE) {
        needed.push(o);
      }
      for (const k of needed) {
        const c = createTrackChunk(k, k + CHUNK_SIZE);
        worldGroup.add(c);
        chunks.set(k, c);

        // Lampposts for this chunk
        const lc = createLampsForChunk(k, chunkOrigin);
        worldGroup.add(lc);
        lampChunks.set(k, lc);

        // Signs for this chunk
        const sc = createSignsForChunk(k, chunkOrigin);
        worldGroup.add(sc);
        signChunks.set(k, sc);
      }

      worldGroup.userData.lastChunkOrigin = chunkOrigin;
    }

    // Ground follows camera
    ground.position.z = 0;

    // Stars stay around camera
    stars.position.z = 0;

    // Light follows
    dirLight.position.z = 30;
    dirLight.target.position.z = 0;
    dirLight.target.updateMatrixWorld();

    // HUD — show years
    const years = getYears();
    posDisplay.textContent = formatYears(years);

    // Speedometers
    if (frameCount % 3 === 0) updateSpeedos(years);

    // Update ETA periodically
    if (frameCount % 30 === 0 && jumpInput.value) updateETA();

    frameCount++;
    if (frameCount % 10 === 0) updateGeoPanel(years);

    renderer.render(scene, camera);
  }

  worldGroup.userData.lastChunkOrigin = -Infinity; // force initial build
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
